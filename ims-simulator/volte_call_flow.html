<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoLTE 4G+IMS Call Flow Visualizer</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --s1ap: #4CAF50; --nas: #26C6DA; --gtpc: #FF9800;
  --diameter: #AB47BC; --sip: #42A5F5; --rtp: #EF5350;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOP BAR ── */
#topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#topbar h1 { font-size: 15px; font-weight: 700; color: #58a6ff; white-space: nowrap; }
.ctrl-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background .15s; }
.ctrl-btn:hover { background: #2d333b; }
.ctrl-btn.active { background: #1f6feb; border-color: #388bfd; }
#step-counter { color: var(--muted); font-size: 12px; margin-left: auto; }
.phase-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 11px; transition: all .15s; }
.phase-btn:hover, .phase-btn.active { color: var(--text); background: #2d333b; }
#speed-label { color: var(--muted); font-size: 12px; }
#speed-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 6px; font-size: 12px; }

/* ── MAIN LAYOUT ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── DIAGRAM PANEL ── */
#diagram-wrap { flex: 1; overflow: auto; position: relative; }
#diagram { position: relative; min-width: max-content; }

/* ── NODE HEADER ── */
#node-header { display: flex; position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 2px solid var(--border); padding: 0; }
.node-col { width: 90px; min-width: 90px; display: flex; flex-direction: column; align-items: center; padding: 8px 2px 10px; border-right: 1px solid var(--border); }
.node-col:first-child { min-width: 110px; width: 110px; }
.node-icon { font-size: 22px; margin-bottom: 2px; }
.node-name { font-size: 11px; font-weight: 700; text-align: center; line-height: 1.2; }
.node-sub { font-size: 9px; color: var(--muted); text-align: center; margin-top: 1px; }
.node-ip { font-size: 9px; font-family: monospace; text-align: center; margin-top: 2px; padding: 1px 4px; background: var(--surface2); border-radius: 3px; }
.node-port { font-size: 8px; color: var(--muted); font-family: monospace; text-align: center; }

/* ── SEQUENCE BODY ── */
#seq-body { position: relative; }
.lifelines { display: flex; position: absolute; top: 0; bottom: 0; left: 0; pointer-events: none; }
.lifeline { width: 90px; min-width: 90px; border-right: 1px dashed #21262d; }
.lifeline:first-child { width: 110px; min-width: 110px; }

/* ── PHASE BANNER ── */
.phase-banner { display: flex; align-items: center; padding: 6px 10px; font-size: 11px; font-weight: 700; letter-spacing: .5px; border-top: 2px solid; position: relative; z-index: 2; }
.phase-banner .ph-num { font-size: 9px; opacity: .7; margin-right: 6px; }

/* ── MESSAGE ROW ── */
.msg-row { display: flex; align-items: center; height: 36px; position: relative; opacity: 0; transform: translateY(4px); transition: opacity .3s ease, transform .3s ease; }
.msg-row.visible { opacity: 1; transform: translateY(0); }
.msg-row.dim { opacity: .35; }
.msg-row.highlight { opacity: 1; }

/* The arrow line */
.arrow { position: absolute; height: 2px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; pointer-events: none; }
.arrow::after { content: ''; position: absolute; right: -1px; width: 0; height: 0; }
.arrow.right::after { border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 8px solid currentColor; right: -8px; }
.arrow.left::after { border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-right: 8px solid currentColor; left: -8px; }
.arrow-line { flex: 1; height: 2px; background: currentColor; position: relative;
  animation: none; }

/* Animated draw */
.msg-row.visible .arrow-line { animation: drawLine .4s ease forwards; }
@keyframes drawLine { from { transform: scaleX(0); transform-origin: left; } to { transform: scaleX(1); } }
.msg-row.visible .arrow.left .arrow-line { animation: drawLineRight .4s ease forwards; }
@keyframes drawLineRight { from { transform: scaleX(0); transform-origin: right; } to { transform: scaleX(1); } }

/* Message label */
.msg-label { position: absolute; top: 2px; font-size: 10px; font-weight: 600; white-space: nowrap; text-shadow: 0 0 6px var(--bg), 0 0 10px var(--bg); cursor: pointer; padding: 1px 4px; border-radius: 3px; z-index: 3; }
.msg-label:hover { background: rgba(255,255,255,.1); }
.msg-label .proto-badge { font-size: 8px; opacity: .8; margin-left: 3px; font-weight: 400; }

/* Port label on arrow */
.port-label { position: absolute; bottom: 2px; font-size: 8px; font-family: monospace; color: var(--muted); white-space: nowrap; }

/* Active step indicator */
.msg-row.active-step { background: rgba(31,111,235,.08); border-radius: 4px; }
.msg-row.active-step .msg-label { background: rgba(31,111,235,.2); }

/* ── IE PANEL ── */
#ie-panel { width: 340px; min-width: 340px; border-left: 1px solid var(--border); overflow-y: auto; background: var(--surface); display: flex; flex-direction: column; }
#ie-panel.collapsed { width: 0; min-width: 0; overflow: hidden; }
#ie-header { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 5; }
#ie-title { font-size: 13px; font-weight: 700; }
#ie-proto-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
#ie-close { cursor: pointer; color: var(--muted); font-size: 16px; }
#ie-close:hover { color: var(--text); }
#ie-body { padding: 12px 14px; flex: 1; }
#ie-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
#ie-nodes { font-size: 10px; color: var(--muted); margin-bottom: 10px; font-family: monospace; }
.ie-section { margin-bottom: 14px; }
.ie-section-title { font-size: 10px; font-weight: 700; letter-spacing: .5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.ie-table { width: 100%; border-collapse: collapse; }
.ie-table th { font-size: 9px; font-weight: 700; color: var(--muted); text-align: left; padding: 3px 6px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
.ie-table td { font-size: 11px; padding: 4px 6px; border-bottom: 1px solid #21262d; vertical-align: top; }
.ie-table td:first-child { font-family: monospace; font-size: 10px; color: #58a6ff; font-weight: 600; width: 35%; }
.ie-table td:nth-child(2) { font-family: monospace; font-size: 10px; color: #d2a679; width: 30%; }
.ie-table td:last-child { font-size: 10px; color: var(--muted); line-height: 1.4; }
.ie-ref { font-size: 10px; color: var(--muted); margin-top: 8px; font-style: italic; }
#ie-placeholder { padding: 40px 14px; text-align: center; color: var(--muted); font-size: 12px; }

/* ── LEGEND ── */
#legend { display: flex; gap: 12px; padding: 6px 14px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
.leg-dot { width: 10px; height: 3px; border-radius: 2px; }

/* ── TOOLTIP ── */
#tooltip { position: fixed; background: var(--surface2); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 11px; pointer-events: none; display: none; z-index: 100; max-width: 260px; line-height: 1.5; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>📡 VoLTE 4G+IMS Call Flow</h1>
  <button class="ctrl-btn" id="btn-play" onclick="playAll()">▶ Play</button>
  <button class="ctrl-btn" id="btn-step" onclick="stepNext()">⏭ Step</button>
  <button class="ctrl-btn" onclick="resetAll()">⏮ Reset</button>
  <div style="width:1px;background:var(--border);height:20px;margin:0 4px"></div>
  <button class="phase-btn active" onclick="filterPhase('all',this)">All</button>
  <button class="phase-btn" onclick="filterPhase('lte',this)" style="border-color:#FF9800;color:#FF9800">LTE Attach</button>
  <button class="phase-btn" onclick="filterPhase('ims_pdn',this)" style="border-color:#26C6DA;color:#26C6DA">IMS PDN</button>
  <button class="phase-btn" onclick="filterPhase('ims_reg',this)" style="border-color:#AB47BC;color:#AB47BC">IMS Reg</button>
  <button class="phase-btn" onclick="filterPhase('volte',this)" style="border-color:#42A5F5;color:#42A5F5">VoLTE Call</button>
  <button class="phase-btn" onclick="filterPhase('teardown',this)" style="border-color:#EF5350;color:#EF5350">Teardown</button>
  <div style="width:1px;background:var(--border);height:20px;margin:0 4px"></div>
  <span id="speed-label">Speed:</span>
  <select id="speed-select" onchange="setSpeed(this.value)">
    <option value="2000">Slow</option>
    <option value="1200" selected>Normal</option>
    <option value="600">Fast</option>
    <option value="200">Very Fast</option>
  </select>
  <span id="step-counter">Step 0 / 0</span>
</div>

<!-- MAIN -->
<div id="main">
  <div id="diagram-wrap">
    <div id="diagram">
      <div id="node-header"></div>
      <div id="seq-body">
        <div class="lifelines" id="lifelines"></div>
        <div id="messages"></div>
      </div>
    </div>
  </div>
  <div id="ie-panel">
    <div id="ie-header">
      <span id="ie-title">Message Details</span>
      <span id="ie-proto-badge"></span>
      <span id="ie-close" onclick="closePanel()">✕</span>
    </div>
    <div id="ie-body">
      <div id="ie-placeholder">Click any message arrow to see its<br>headers, IEs, and what they mean</div>
      <div id="ie-content" style="display:none">
        <div id="ie-desc"></div>
        <div id="ie-nodes"></div>
        <div class="ie-section">
          <div class="ie-section-title">Important IEs / Headers</div>
          <table class="ie-table">
            <thead><tr><th>Field</th><th>Value</th><th>Why it matters</th></tr></thead>
            <tbody id="ie-rows"></tbody>
          </table>
        </div>
        <div id="ie-ref" class="ie-ref"></div>
      </div>
    </div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#4CAF50"></div>S1AP/NAS</div>
  <div class="leg-item"><div class="leg-dot" style="background:#26C6DA"></div>NAS</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FF9800"></div>GTP-C</div>
  <div class="leg-item"><div class="leg-dot" style="background:#AB47BC"></div>Diameter</div>
  <div class="leg-item"><div class="leg-dot" style="background:#42A5F5"></div>SIP</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EF5350"></div>RTP</div>
  <div class="leg-item" style="margin-left:auto;font-style:italic">Click any message for IE details &nbsp;|&nbsp; Tip: Phase buttons filter the flow</div>
</div>

<div id="tooltip"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// NODE DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const NODES = [
  {id:'ue_a',   label:'UE-A',     sub:'Caller Phone',       ip:'10.0.0.1',  port:'5060 / RTP:50000', color:'#4CAF50', icon:'📱'},
  {id:'enb',    label:'eNB',      sub:'Base Station',       ip:'10.0.0.2',  port:'36412 (S1AP)',     color:'#29B6F6', icon:'📡'},

  {id:'ue_b',   label:'UE-B',     sub:'Callee Phone',       ip:'10.0.0.2*', port:'5060 / RTP:60000', color:'#66BB6A', icon:'📱'},

// Column width in px
const COL_W = 90;
const FIRST_COL_W = 110;
const ROW_H = 36;
const HEADER_H = 72;

function nodeIndex(id) { return NODES.findIndex(n => n.id === id); }

function nodeLeft(idx) {
  if (idx === 0) return FIRST_COL_W / 2;
  return FIRST_COL_W + (idx - 1) * COL_W + COL_W / 2;
}

// ═══════════════════════════════════════════════════════════════

const MSGS = [

// ═══════════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════════
let currentStep = 0;
let playTimer = null;
let stepDelay = 1200;
let activePhase = 'all';
let visibleMsgs = [];

function init() {
  renderHeader();
  renderMessages();
  updateCounter();
}

function renderHeader() {
  const hdr = document.getElementById('node-header');
  const ll = document.getElementById('lifelines');
  hdr.innerHTML = '';
  ll.innerHTML = '';
  NODES.forEach((n, i) => {
    const w = i === 0 ? FIRST_COL_W : COL_W;
    const col = document.createElement('div');
    col.className = 'node-col';
    col.style.cssText = `width:${w}px;min-width:${w}px;border-top:3px solid ${n.color}`;
    col.innerHTML = `<div class="node-icon">${n.icon}</div>
      <div class="node-name" style="color:${n.color}">${n.label}</div>
      <div class="node-sub">${n.sub}</div>
      <div class="node-ip">${n.ip}</div>
      <div class="node-port">${n.port}</div>`;
    hdr.appendChild(col);

    const lifeline = document.createElement('div');
    lifeline.className = 'lifeline';
    lifeline.style.cssText = `width:${w}px;min-width:${w}px;border-right:1px dashed ${n.color}22`;
    ll.appendChild(lifeline);
  });
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  visibleMsgs = [];

  let currentPhaseKey = null;
  let rowIndex = 0;

  MSGS.forEach((msg, i) => {
    if (activePhase !== 'all' && msg.phase !== activePhase) return;

    // Phase banner
    if (msg.phase !== currentPhaseKey) {
      currentPhaseKey = msg.phase;
      const ph = PHASES[msg.phase];
      const banner = document.createElement('div');
      banner.className = 'phase-banner';
      banner.style.cssText = `color:${ph.color};border-color:${ph.color};background:${ph.color}11;margin-top:${rowIndex===0?0:8}px`;
      banner.innerHTML = `<span class="ph-num">${Object.keys(PHASES).indexOf(msg.phase)+1}</span><span>${ph.label}</span><span style="font-weight:400;margin-left:8px;font-size:10px;opacity:.7">${ph.desc}</span>`;
      container.appendChild(banner);
    }

    const fromIdx = nodeIndex(msg.from);
    const toIdx   = nodeIndex(msg.to);
    const fromX   = nodeLeft(fromIdx);
    const toX     = nodeLeft(toIdx);
    const goRight = toX > fromX;
    const left    = Math.min(fromX, toX);
    const width   = Math.abs(toX - fromX);
    const midX    = (fromX + toX) / 2;
    const totalW  = FIRST_COL_W + (NODES.length - 1) * COL_W;

    const row = document.createElement('div');
    row.className = 'msg-row';
    row.dataset.msgIdx = visibleMsgs.length;
    row.style.height = `${ROW_H}px`;

    // Arrow
    const arrow = document.createElement('div');
    arrow.className = `arrow ${goRight ? 'right' : 'left'}`;
    arrow.style.cssText = `left:${left}px;width:${width}px;color:${msg.color}`;
    const line = document.createElement('div');
    line.className = 'arrow-line';
    line.style.background = msg.color;
    arrow.appendChild(line);
    row.appendChild(arrow);

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.style.cssText = `left:${midX - 80}px;color:${msg.color};width:160px;text-align:center`;
    lbl.innerHTML = `${msg.label}<span class="proto-badge" style="color:${msg.color}99">[${msg.proto}]</span>`;
    lbl.onclick = () => showPanel(msg);
    row.appendChild(lbl);

    // Port label
    const port = document.createElement('div');
    port.className = 'port-label';
    port.style.cssText = `left:${midX - 30}px;width:60px;text-align:center`;
    port.textContent = `:${msg.port}`;
    row.appendChild(port);

    container.appendChild(row);
    visibleMsgs.push({row, msg});
    rowIndex++;
  });

  // Set lifeline height
  const totalH = container.offsetHeight || visibleMsgs.length * ROW_H + 200;
  document.getElementById('lifelines').style.height = `${totalH}px`;
}

function showPanel(msg) {
  document.getElementById('ie-placeholder').style.display = 'none';
  document.getElementById('ie-content').style.display = 'block';
  document.getElementById('ie-title').textContent = msg.label;
  const badge = document.getElementById('ie-proto-badge');
  badge.textContent = msg.proto;
  badge.style.cssText = `background:${msg.color}33;color:${msg.color}`;
  document.getElementById('ie-desc').textContent = msg.desc;
  document.getElementById('ie-nodes').textContent =
    `${NODES[nodeIndex(msg.from)].label} (${NODES[nodeIndex(msg.from)].ip}) → ${NODES[nodeIndex(msg.to)].label} (${NODES[nodeIndex(msg.to)].ip})   Port: ${msg.port}`;
  document.getElementById('ie-ref').textContent = msg.ref;

  const tbody = document.getElementById('ie-rows');
  tbody.innerHTML = (msg.ies || []).map(ie =>
    `<tr><td>${ie.f}</td><td>${ie.v}</td><td>${ie.w}</td></tr>`
  ).join('');
}

function closePanel() {
  document.getElementById('ie-placeholder').style.display = 'block';
  document.getElementById('ie-content').style.display = 'none';
}

// ─── STEP CONTROLS ───────────────────────────────────────────
function stepNext() {
  if (currentStep >= visibleMsgs.length) return;
  const {row, msg} = visibleMsgs[currentStep];
  row.classList.add('visible', 'active-step');
  // Dim previous steps
  visibleMsgs.slice(0, currentStep).forEach(m => {
    m.row.classList.remove('active-step');
    m.row.classList.add('dim');
  });
  showPanel(msg);
  row.scrollIntoView({behavior:'smooth', block:'nearest'});
  currentStep++;
  updateCounter();
  document.getElementById('diagram-wrap').scrollTop += 0; // trigger repaint
}

function playAll() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; document.getElementById('btn-play').textContent = '▶ Play'; return; }
  document.getElementById('btn-play').textContent = '⏸ Pause';
  playTimer = setInterval(() => {
    if (currentStep >= visibleMsgs.length) {
      clearInterval(playTimer); playTimer = null;
      document.getElementById('btn-play').textContent = '▶ Play';
      return;
    }
    stepNext();
  }, stepDelay);
}

function resetAll() {
  clearInterval(playTimer); playTimer = null;
  document.getElementById('btn-play').textContent = '▶ Play';
  currentStep = 0;
  visibleMsgs.forEach(m => m.row.classList.remove('visible','active-step','dim'));
  updateCounter();
  closePanel();
  document.getElementById('diagram-wrap').scrollTop = 0;
}

function filterPhase(phase, btn) {
  activePhase = phase;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetAll();
  renderMessages();
  updateCounter();
}

function setSpeed(v) { stepDelay = parseInt(v); }

function updateCounter() {
  document.getElementById('step-counter').textContent =
    `Step ${currentStep} / ${visibleMsgs.length}`;
}

// Show all on Alt+click
document.getElementById('diagram-wrap').addEventListener('dblclick', () => {
  resetAll();
  visibleMsgs.forEach(m => { m.row.classList.add('visible'); m.row.classList.remove('dim'); });
  currentStep = visibleMsgs.length;
  updateCounter();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.key === ' ') { e.preventDefault(); playAll(); }
  if (e.key === 'ArrowRight' || e.key === 'n') stepNext();
  if (e.key === 'r' || e.key === 'Escape') resetAll();
});

init();
</script>
