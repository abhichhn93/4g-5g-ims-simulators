    and choose appropriately
- id: q006
  domain: cpp
  subdomain: oop
  tags:
  - cpp-oop
  level: engineer
  question: What is a friend class and a friend function? When would you use them?
  answer: A friend function is a non-member function granted access to private and
    protected members via a friend declaration inside the class. A friend class similarly
    grants all its member functions that access. Both are used sparingly — typical
    uses include operator overloading (operator<<) and tightly coupled helper classes
    where encapsulation would otherwise force unnecessary public exposure.
  spec: null
