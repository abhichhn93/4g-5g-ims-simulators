  level: engineer
  question: What is an abstract class, and when should you use it?
  answer: An abstract class has at least one pure virtual function and cannot be instantiated
    directly; it defines a contract that all concrete derived classes must fulfill.
    Use abstract classes to enforce a specific interface across a hierarchy, enable
    polymorphism through base-class pointers, and share common data or partial implementations.
  spec: null
