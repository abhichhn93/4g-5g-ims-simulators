- id: q009
  domain: cpp
  subdomain: oop
  tags:
  - cpp-oop
  - virtual
  - polymorphism
  level: beginner
  question: What is the difference between function overriding and function overloading?
  answer: Overloading defines multiple functions with the same name but different
    parameter lists in the same scope; the compiler selects the correct version at
    compile time. Overriding redefines a base-class virtual function in a derived
    class with the same signature; the correct version is selected at runtime. Use
    the override specifier in C++11 to let the compiler catch signature mismatches.
  spec: null
  simulator_trigger: Simulator event handler methods — distinguishing overloaded event
    constructors from overridden handlers
  interview_context: Entry-level check to distinguish compile-time from runtime polymorphism
- id: q010
  domain: cpp
  subdomain: oop
  tags:
  - cpp-oop
  - virtual
  - polymorphism
  level: engineer
  question: What is the override and final specifier in C++?
  answer: override on a derived-class function signals intent to override a base virtual;
    the compiler emits an error if no matching virtual exists in the base class. final
    on a virtual function prevents further overriding; final on a class prevents subclassing.
    Both improve clarity and catch signature-mismatch bugs at compile time.
  spec: null
  simulator_trigger: Simulator node message handler classes using override on handle_s1ap(),
    handle_ngap() methods
  interview_context: Tests knowledge of modern C++ specifiers that prevent subtle
    override bugs
