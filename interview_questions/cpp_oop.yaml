  level: engineer
  question: What is the difference between virtual functions and pure virtual functions?
  answer: A virtual function has a definition in the base class and can be overridden
    in derived classes; derived classes are not required to override it. A pure virtual
    function is declared with = 0, has no base-class body, and must be overridden
    by any concrete derived class. A class with at least one pure virtual function
    is abstract and cannot be instantiated directly.
  spec: null
