  level: senior
  question: What is the diamond problem in multiple inheritance, and how does virtual
    inheritance solve it?
  answer: 'The diamond problem arises when class D inherits from both B and C, which
    both inherit from a common base A, resulting in two copies of A''s members in
    D — causing ambiguity and extra memory. Virtual inheritance (class B : virtual
    public A) tells the compiler to create only one shared subobject of A regardless
    of how many paths lead to it.'
  spec: null
