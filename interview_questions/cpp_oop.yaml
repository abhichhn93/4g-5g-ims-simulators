- id: q005
  domain: cpp
  subdomain: oop
  tags:
  - cpp-oop
  - virtual
  - polymorphism
  level: engineer
  question: What are the different types of polymorphism in C++?
  answer: 'C++ has two categories: compile-time polymorphism via function overloading
    and operator overloading, where the compiler resolves the call; and runtime polymorphism
    via virtual functions and overriding, where the vtable resolves the call at runtime.
    Static binding is faster; dynamic binding is more flexible and extensible.'
  spec: null
