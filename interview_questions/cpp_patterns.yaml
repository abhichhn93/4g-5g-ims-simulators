    object in PGW node for different bearer selection algorithms
  interview_context: Tests behavioral pattern knowledge needed for designing configurable
    simulator policies
- id: q044
  domain: cpp
  subdomain: design_patterns
  tags:
  - design-pattern
  level: senior
  question: What is CRTP (Curiously Recurring Template Pattern) and when do you use
    it?
  answer: 'CRTP is a compile-time polymorphism technique where a base template class
    takes the derived class as its own template parameter: template<class D> class
    Base { void interface() { static_cast<D*>(this)->impl(); } }; class Concrete :
    public Base<Concrete>. The base can call derived methods via static_cast at zero
    runtime cost — no vtable overhead. Use CRTP for performance-critical libraries
    and static duck typing; the trade-off is you cannot store heterogeneous CRTP types
    in a vector<Base*>.'
  spec: null
  simulator_trigger: Simulator high-frequency message serializer using CRTP to avoid
    vtable cost on the 10M-events-per-second hot path
  interview_context: Tests advanced template technique for performance-critical simulator
    components
- id: q045
  domain: cpp
  subdomain: design_patterns
  tags:
  - design-pattern
  level: senior
  question: What is the Flyweight pattern, and when do you use it?
  answer: The Flyweight pattern minimizes memory by separating state into intrinsic
    (shared, stored in the flyweight) and extrinsic (unique per client, passed at
    use time). A FlyweightFactory backed by an unordered_map returns a cached instance
    when a flyweight with given intrinsic state exists, rather than creating a new
    one. Use it when your system creates millions of similar objects — e.g., character
    objects in a text editor, particle instances in a simulation, or reusable codec
    descriptors in a telecom simulator.
  spec: null
