  level: senior
  question: How would you design a scalable, high-performance server in C++?
  answer: A scalable C++ server typically uses an event-driven, non-blocking I/O model
    (epoll on Linux) combined with a thread pool — one thread per CPU core handles
    I/O events and dispatches work tasks to minimize context switching. Protect shared
    state with std::shared_mutex for read-heavy data structures; use RAII via custom
    handles for sockets and file descriptors; and use custom memory allocators or
    tcmalloc to reduce fragmentation. At the architecture level, partition data by
    client/session ID to minimize cross-thread sharing (share-nothing design).
  spec: null
