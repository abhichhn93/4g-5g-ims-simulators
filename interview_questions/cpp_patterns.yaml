  level: senior
  question: How do you implement a thread-safe Singleton in modern C++?
  answer: 'The simplest C++11 approach exploits the guaranteed thread-safe initialization
    of function-local static variables: static Singleton& getInstance() { static Singleton
    instance; return instance; }. The runtime ensures exactly one construction even
    under concurrent calls. Mark copy constructor and assignment operator = delete
    to prevent duplication; avoid the pre-C++11 Double-Checked Locking Pattern which
    was broken without the C++11 memory model.'
  spec: null
