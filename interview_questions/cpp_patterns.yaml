  - mutex
  level: senior
  question: How does connection pooling work, and what concurrency issues does it
    introduce?
  answer: A connection pool pre-creates a fixed number of connections at startup and
    lends them to requesting threads, returning them on completion — avoiding connection-establishment
    latency per request. Thread-safety requires a mutex protecting the pool's queue
    and a condition_variable to block callers when all connections are in use. Critical
    failure modes include connection leaks (use RAII wrappers), pool exhaustion under
    peak load, and stale connections (require periodic health checks or reconnection
    logic).
