  level: senior
  question: Describe the producer-consumer pattern and its C++ implementation strategies.
  answer: The producer-consumer pattern decouples production from consumption via
    a thread-safe bounded buffer — producers block when full, consumers block when
    empty. Classic implementation uses a std::queue protected by a mutex plus two
    condition_variables (not_full, not_empty). For high throughput, a lock-free ring
    buffer using atomic read/write indices eliminates mutex contention entirely for
    single-producer-single-consumer cases. Key design decisions are buffer sizing
    to absorb bursts, graceful shutdown via atomic stop flag, and consumer error handling.
  spec: null
