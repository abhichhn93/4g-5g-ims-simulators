    message dispatch architecture
- id: q049
  domain: cpp
  subdomain: design_patterns
  tags:
  - system-design
  - scalability
  - cpp-concurrency
  - mutex
  - shared-mutex
  level: senior
  question: How do you handle concurrency in a multithreaded C++ application at the
    architecture level?
  answer: Prefer a share-nothing or message-passing architecture where each thread
    owns its data and communicates via queues — this eliminates most data races by
    design. When sharing is unavoidable, use std::atomic for single-variable flags/counters,
    std::shared_mutex for read-heavy data structures, and std::mutex for complex invariants.
    Follow the lock-ordering principle — assign a global rank to mutexes and always
    acquire in ascending order. Use std::scoped_lock when acquiring multiple locks
    simultaneously.
