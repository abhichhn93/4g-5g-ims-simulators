    the broken pre-C++11 versions
- id: q041
  domain: cpp
  subdomain: design_patterns
  tags:
  - design-pattern
  - factory
  level: senior
  question: Explain the Factory Method and Abstract Factory patterns. When do you
    use each?
  answer: Factory Method defines a virtual method in a base creator class that subclasses
    override to produce a specific product — the base controls the workflow but delegates
    instantiation. Abstract Factory provides an interface for creating families of
    related objects (e.g., WindowsWidgetFactory vs MacWidgetFactory) without specifying
    concrete classes, allowing the entire product family to be swapped. Use Factory
    Method when a class cannot anticipate its product type; use Abstract Factory when
    products from a family must be used together.
  spec: null
