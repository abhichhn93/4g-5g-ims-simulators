  question: What is std::jthread and stop_token in C++20?
  answer: std::jthread is an improved thread class that automatically joins on destruction
    (unlike std::thread which calls std::terminate if joinable on destruction), solving
    the most common std::thread resource leak. It also carries a std::stop_source
    internally; call jthread::request_stop() to set the stop token. Thread functions
    accept std::stop_token as a first parameter and poll token.stop_requested() to
    cooperatively exit. This enables clean cancellation without shared flags or condition
    variables. In telecom NF worker threads, jthread simplifies graceful shutdown
    during rolling upgrades or SIGTERM handling.
  spec: null
  simulator_trigger: TelecomException hierarchy in telecom_exception.h — jthread worker
    lifecycle in 5G NF simulator graceful shutdown
  interview_context: std::jthread is the standard replacement for the hand-rolled
    join-on-exit pattern in every long-running telecom daemon
