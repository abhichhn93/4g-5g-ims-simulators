  level: engineer
  question: What is std::span and when should you use it instead of passing a pointer+size
    pair?
  answer: std::span<T> is a non-owning, lightweight view over a contiguous sequence
    (array, vector, C array) described by a pointer and a length. It carries both
    pointer and size without any ownership or allocation, eliminating the error-prone
    pointer+size convention. Unlike vector<T>&, span works on any contiguous storage
    and avoids inadvertent copies. It is bounds-checkable in debug builds. Use std::span
    whenever a function needs read or write access to a contiguous range but must
    not own or extend it — common in serialisation/deserialisation of protocol buffers
    and NAS message encoding in 4G/5G stacks.
  spec: null
  simulator_trigger: TelecomException hierarchy in telecom_exception.h — std::span
    for zero-copy buffer passing in NAS encoder
  interview_context: Replacing raw pointer+length APIs with span improves safety and
