  question: What are C++20 Concepts and how do they improve templates?
  answer: A Concept is a named compile-time predicate that constrains template parameters,
    expressed as a boolean expression evaluated at compile time. You define them with
    'concept' and use them in requires clauses or directly as type constraints. Unlike
    SFINAE, Concepts check constraints before the template body is instantiated, producing
    clear targeted error messages. Concepts participate in partial ordering during
    overload resolution — a more constrained template is preferred over a less constrained
    one, cleanly replacing tag dispatch. Standard library concepts include std::integral,
    std::floating_point, std::ranges::range, std::invocable.
  spec: null
