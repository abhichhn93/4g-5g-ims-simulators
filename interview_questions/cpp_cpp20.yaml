  question: What is the C++20 Ranges library and how does pipe syntax work?
  answer: 'The Ranges library introduces views — lazy, composable transformations
    over sequences that do not materialise intermediate containers. Views are applied
    via range adaptors such as std::views::filter and std::views::transform, chained
    with the pipe operator (|). The evaluation is lazy: no iteration happens until
    the result is consumed (e.g., by a range-for or std::ranges::to). Unlike manual
    iterator loops, ranges compose cleanly: auto result = data | std::views::filter(pred)
    | std::views::transform(fn). This replaces verbose iterator pairs and eliminates
    temporary containers, reducing allocations in protocol message processing pipelines.'
  spec: null
  simulator_trigger: TelecomException hierarchy in telecom_exception.h — Ranges pipeline
    for message filtering in simulator
  interview_context: Ranges replace manual loop-plus-copy patterns in 5G NF message
    parsing, reducing both code size and allocations
