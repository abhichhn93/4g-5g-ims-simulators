  question: How do C++20 coroutines work and what are co_await, co_yield, and co_return?
  answer: A C++20 coroutine is a function that can suspend and resume without blocking
    a thread. co_await suspends execution until the awaitable completes (useful for
    async I/O). co_yield suspends and produces a value (used to implement lazy generators).
    co_return finalises the coroutine and optionally returns a value. The compiler
    transforms the coroutine body into a state machine and allocates a coroutine frame
    on the heap unless the Heap Allocation eLision Optimisation (HALO) applies. The
    return type must be a promise type (e.g., std::generator<T> or a custom Task<T>)
    that defines promise_type methods. Coroutines enable async I/O handlers without
    callback spaghetti in 5G NF implementations.
  spec: null
