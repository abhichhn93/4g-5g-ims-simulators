  level: senior
  question: What is std::atomic, and when should you use it instead of a mutex?
  answer: std::atomic provides lock-free atomic read-modify-write operations using
    hardware instructions like compare-and-swap. Use it for single-variable updates
    such as counters, flags, and reference counts — it avoids mutex overhead. Use
    a mutex when the invariant spans multiple variables or requires a longer critical
    section. std::atomic also exposes memory ordering controls; seq_cst (the default)
    is safest.
