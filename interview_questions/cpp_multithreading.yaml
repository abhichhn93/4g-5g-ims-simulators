  - map
  level: senior
  question: Compare std::map and std::unordered_map. When do you prefer each?
  answer: std::map is a Red-Black Tree with sorted keys and O(log n) lookup; use it
    when you need sorted iteration, range queries (lower_bound/upper_bound), or non-hashable
    keys. std::unordered_map is a hash table with average O(1) and worst-case O(n)
    operations — use it as the default when order does not matter and keys are hashable.
    For very small sizes a flat sorted vector<pair<K,V>> may outperform both due to
    cache locality.
