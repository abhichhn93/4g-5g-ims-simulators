  level: engineer
  question: What are the five iterator categories in C++, and why do they matter?
  answer: 'C++ iterators are classified by capability: Input (single-pass read), Output
    (single-pass write), Forward (multi-pass read/write), Bidirectional (supports
    --), and Random Access (supports +=, -, [] in O(1)). Algorithms declare requirements
    in these categories, enabling generic implementations that work with any conforming
    container. C++20 adds Contiguous iterators for guaranteed contiguous memory (e.g.,
    std::span).'
