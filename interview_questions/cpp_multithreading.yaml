  - atomic
  level: senior
  question: What is lock-free programming, and what is the ABA problem in a lock-free
    stack?
  answer: Lock-free programming uses atomic operations (typically compare-and-swap)
    instead of mutexes; at least one thread always makes progress, eliminating deadlocks
    and reducing contention under high load. A lock-free stack stores an atomic head
    pointer; push creates a new node and uses compare_exchange_weak in a loop to swap
    it as the new head. The ABA problem occurs when a pointer appears unchanged but
    the underlying object was replaced — solved with tagged pointers or hazard pointers.
  spec: null
