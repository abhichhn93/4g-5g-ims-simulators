- id: q026
  domain: cpp
  subdomain: multithreading
  tags:
  - cpp-concurrency
  - atomic
  level: senior
  question: 'Explain C++ memory ordering: memory_order_relaxed, acquire/release, and
    seq_cst.'
  answer: memory_order_relaxed provides atomicity for a single variable but no synchronization
    between threads — use only for independent counters. memory_order_acquire on a
    load ensures no subsequent reads/writes are reordered before it; memory_order_release
    on a store ensures no prior operations are reordered after it — together they
    form a publish/subscribe pattern. memory_order_seq_cst (the default) gives a single
    total order across all seq_cst operations; it is safest but can slow performance
    on weakly-ordered architectures like ARM.
  spec: null
