  - observer
  level: senior
  question: Explain the Observer pattern and its typical C++ implementation.
  answer: 'The Observer pattern defines a one-to-many dependency: when a Subject changes
    state, all registered Observers are notified automatically. In C++, the Subject
    holds a vector<Observer*> (or smart pointers) and a notify() method that calls
    update() on each. Use weak_ptr for observers to prevent the Subject from extending
    their lifetimes. Modern C++ can use std::function callbacks registered in a map
    for more flexible subscriptions without a virtual Observer interface.'
