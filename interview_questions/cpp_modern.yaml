- id: q043
  domain: cpp
  subdomain: modern_cpp17
  tags:
  - design-pattern
  level: senior
  question: Explain the Strategy pattern. How does it differ from using virtual functions
    directly?
  answer: The Strategy pattern encapsulates a family of interchangeable algorithms
    behind a common interface, allowing the algorithm to be swapped at runtime by
    setting a different strategy object on a Context class. Unlike direct virtual
    override, Strategy makes variation explicit and composable — you can swap algorithms
    at runtime without changing the Context class, and algorithms can be shared across
    multiple contexts. In modern C++ it is often implemented with std::function instead
    of a virtual class.
  spec: null
