  level: senior
  question: What are fold expressions in C++17?
  answer: 'Fold expressions allow variadic template parameter packs to be folded over
    a binary operator. A unary right-fold (args + ...) expands to (a0 + (a1 + (a2
    + ...))). They replace recursive template metaprogramming for tasks like summing
    variadic arguments: template<typename... Ts> auto sum(Ts... args) { return (args
    + ...); }. They also work with && and || for logical conjunction/disjunction over
    parameter packs.'
  spec: null
