- id: q039
  domain: cpp
  subdomain: modern_cpp17
  tags:
  - cpp17
  level: senior
  question: What is Class Template Argument Deduction (CTAD) in C++17?
  answer: CTAD allows the compiler to infer template parameters from constructor arguments,
    so you can write std::pair p(1, 3.14) instead of std::pair<int, double>(1, 3.14),
    and std::vector v{1, 2, 3} instead of std::vector<int>{1, 2, 3}. When default
    deduction guides fail you can provide explicit deduction guides. CTAD reduces
    boilerplate and improves readability with zero runtime cost.
