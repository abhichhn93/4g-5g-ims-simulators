  - variant
  level: senior
  question: What is std::variant, and how does it compare to inheritance for sum types?
  answer: std::variant<T1, T2, ...> is a type-safe discriminated union holding exactly
    one value from a fixed set of types without heap allocation or vtable overhead.
    Unlike inheritance, it captures a closed one-of relationship, enables exhaustive
    pattern matching via std::visit, and avoids base-class slicing. The trade-off
    is the type set is closed — adding a new type requires changing the variant declaration.
  spec: null
