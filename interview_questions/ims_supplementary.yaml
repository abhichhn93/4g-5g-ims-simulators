  level: senior
  question: Explain SIP SUBSCRIBE/NOTIFY and their role in IMS/VoLTE.
  answer: SIP SUBSCRIBE allows a UA to subscribe to event notifications from another
    entity; SIP NOTIFY is the server-sent event notification. In IMS, key uses include
    the reg event package (UE subscribes to own registration status; S-CSCF sends
    NOTIFY with registration state for all IMPUs in the implicit set), presence (UE
    subscribes to contact presence; AS sends NOTIFY with presence documents), and
    MWI (voicemail Message Waiting Indicator). SUBSCRIBEs establish SIP dialogs; NOTIFYs
    are sent within those dialogs.
  spec: RFC 3265, TS 24.229, TS 24.615
  simulator_trigger: REGISTER command — UE sends SUBSCRIBE to reg event package after
    200 OK; S-CSCF sends NOTIFY
  interview_context: Tests event notification mechanism knowledge needed for IMS presence
    and voicemail integration
