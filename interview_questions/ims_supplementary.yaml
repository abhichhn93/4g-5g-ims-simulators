  level: senior
  question: How does call barring work in IMS/VoLTE?
  answer: Call barring in IMS is implemented by the MTAS as a MMTel service (TS 24.611).
    Barring programs (OCB, BAIC, etc.) are stored in the HSS and downloaded to the
    MTAS via the Sh interface. When a call is initiated, the S-CSCF routes the INVITE
    to the MTAS via iFC; the MTAS checks caller/callee barring programs against call
    direction and type. If barred, the MTAS rejects the INVITE with 403 Forbidden;
    users can manage barring via the Ut interface (XCAP over HTTP) modifying XML documents
    in an XDMS.
  spec: TS 24.611, TS 24.623
  simulator_trigger: CALL command with barring test — MTAS returns 403 Forbidden when
    barring subscription active
  interview_context: Tests supplementary service implementation knowledge across IMS,
    MTAS, HSS, and Sh interface
- id: q111
  domain: ims
  subdomain: supplementary
  tags:
  - call-waiting
  - mtas
  - sip
  level: senior
  question: How is call waiting implemented in IMS/VoLTE?
  answer: When a UE is in an active call, an incoming INVITE is routed to the MTAS
    via iFC; the MTAS checks the called subscriber's call waiting status from HSS
    via Sh. If active, the MTAS forwards the INVITE to the UE, which plays a waiting
    tone locally. The UE may accept the new call (200 OK, holding the active call
    via SIP re-INVITE with a=sendonly) or reject it (486 Busy Here); if call waiting
    is inactive, the MTAS returns 486 Busy Here for the waiting call.
  spec: TS 24.615
  simulator_trigger: CALL command to busy UE — MTAS CW logic in mtas_cw_handler.cpp
    determines hold vs reject
  interview_context: Tests supplementary service SIP signaling flow involving hold/resume
    and MTAS state management
- id: q112
  domain: ims
  subdomain: supplementary
  tags:
  - conferencing
  - mrfc
  - mtas
  - sip
  level: senior
  question: How is 3-party conferencing established in IMS/VoLTE?
  answer: Party-A calls Party-B normally, then calls Party-C in a new SIP dialog;
    Party-A's MTAS detects the conference request and involves the MRFC by sending
    a SIP INVITE to it. The MRFC instructs the MRFP (via H.248) to create a mixing
    conference bridge; both Party-B and Party-C's media streams are directed to the
    MRFP, which mixes them and sends the combined stream back to each party. SIP signaling
    follows the conference factory URI model (RFC 4579) triggered via MTAS based on
    iFC.
  spec: TS 24.605, TS 23.228, RFC 4579
  simulator_trigger: CALL command with add_party — MTAS invokes MRFC conference bridge
    in mrfc_conference_handler.cpp
  interview_context: Tests 3-party conference architecture combining MTAS, MRFC, MRFP,
    and SIP dialog forking
