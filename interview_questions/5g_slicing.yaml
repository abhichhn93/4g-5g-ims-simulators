  level: engineer
  question: What is the NSSF, and what is NSSAI in 5G?
  answer: 'The NSSF (Network Slice Selection Function) selects appropriate Network
    Slice instances to serve a UE based on subscription, requested S-NSSAIs, UE location,
    and operator policy. NSSAI (Network Slice Selection Assistance Information) is
    a collection of S-NSSAIs; each S-NSSAI has an SST (Slice/Service Type, 8-bit:
    1=eMBB, 2=URLLC, 3=MIoT) and an optional SD (Slice Differentiator, 24-bit, distinguishing
    multiple slices of the same SST). The UE includes Requested NSSAI in the Registration
    Request; the NSSF determines Allowed NSSAI and may select a specific AMF Set.'
  spec: TS 23.501 §5.15, TS 29.531
  simulator_trigger: 5G REG command with slice_id — AMF contacts NSSF for slice selection
    in nssf_client.cpp
  interview_context: Tests 5G network slicing entry-level knowledge — NSSAI vocabulary
    is expected at the engineer level
- id: q150
  domain: 5g
  subdomain: slicing
  tags:
  - network-slicing
  - nssai
