- id: q243
  domain: devops
  subdomain: cicd
  tags:
  - ci-cd
  - docker
  level: engineer
  question: What is a Docker multi-stage build and why is it critical in production
    CI/CD?
  answer: 'A multi-stage build uses multiple FROM statements in a single Dockerfile.
    Earlier stages handle build dependencies (compilers, test tools); only artifacts
    needed at runtime are copied into the final minimal image. Benefits: (1) Image
    size — final image contains only the binary, not the build toolchain (300 MB →
    10 MB for Go); (2) Security — smaller attack surface, no package manager or shell
    in distroless images; (3) Build cache — go mod download is cached as long as go.mod
    doesn''t change; (4) Separation — test artifacts and build tools never reach production.'
  spec: null
  simulator_trigger: docker-compose.yml — multi-stage Dockerfile for simulator NF
    images
  interview_context: 5G NF container images stored in Harbor/ECR must be minimal for
    fast pull times during scaling events
- id: q244
  domain: devops
  subdomain: cicd
  tags:
  - ci-cd
  - docker
  level: engineer
  question: What is your image tagging strategy in a CI/CD pipeline? What are the
    anti-patterns?
  answer: 'Recommended tags: Git SHA (registry/amf:abc1234 — immutable, traces to
    commit); Semantic version (registry/amf:v1.3.2 — human-readable release); Branch/environment
    (registry/amf:main-abc1234 — feature branch previews). Push both SHA tag and environment
    tag atomically. Anti-patterns: (1) ''latest'' tag — mutable, non-reproducible,
    leads to ''works on my machine'' — never use in production Kubernetes; (2) branch
    names alone (main) — mutable across commits; (3) timestamps without commit ref
    — not traceable. In Helm charts, image.tag should always be a specific SHA or
    semantic version. In GitOps (ArgoCD/Flux), image updates are committed to Git
    as a specific tag.'
  spec: null
  simulator_trigger: docker-compose.yml — image tagging strategy in simulator CI pipeline
  interview_context: 5G NF deployments are audited by MNO operations teams — every
    running NF version must trace to a specific Git commit and approved change request
- id: q245
  domain: kubernetes
  subdomain: health
  tags:
  - kubernetes
  - pod
  level: engineer
  question: What is the difference between a readiness probe failure and a liveness
    probe failure in terms of traffic impact?
  answer: 'Readiness probe failure: Pod IP is removed from the Service''s endpoint
    list — no new traffic is routed to the Pod, but the container is not restarted
    and stays in a Running state (READY shows 0/1). Appropriate for temporary degradation.
    Liveness probe failure: triggers container restart via kubelet — if it repeats,
    causes CrashLoopBackOff. Golden rule: liveness should only check conditions from
    which the app cannot recover on its own (deadlock, memory corruption); readiness
    should check operational dependencies (DB connectivity, upstream service health).'
  spec: null
  simulator_trigger: k8s/ manifests — liveness vs readiness probe distinction for
    AMF/SMF
  interview_context: During 5G core scaling events, NFs may temporarily exceed memory/CPU
    — incorrect liveness probes cause cascading restarts during overload
- id: q246
  domain: kubernetes
  subdomain: scaling
  tags:
  - kubernetes
  level: engineer
  question: What is the difference between resource requests and resource limits in
    Kubernetes?
  answer: 'Requests: minimum resources guaranteed to a container — the scheduler uses
    requests to decide which node can host the Pod. Limits: maximum resources the
    container can consume — enforced at runtime. If a container exceeds CPU limit,
    it is throttled (not killed). If it exceeds memory limit, it is OOM-killed (container
    restart). Setting limits equal to requests creates Guaranteed QoS class (highest
    priority; never throttled). Not setting requests or limits creates BestEffort
    class (first evicted under node pressure). For production CNFs, always set both;
    use Guaranteed QoS for latency-sensitive NFs like AMF and SMF.'
  spec: null
  simulator_trigger: k8s/ manifests — resource requests and limits for NF pods in
    simulator
  interview_context: UPF data-plane pods must have Guaranteed QoS with CPU pinning
    to avoid throttling during high-throughput forwarding
- id: q247
  domain: kubernetes
  subdomain: patterns
  tags:
  - kubernetes
  - pod
  level: senior
  question: What is the ambassador container pattern and how does it differ from a
    sidecar?
  answer: 'The ambassador pattern is a specialization of the sidecar where the helper
    container acts as a proxy — the main application talks to it via localhost. The
    ambassador hides external service complexity (service discovery, TLS termination,
    retries, connection pooling, protocol translation) from the main container. The
    main app connects to localhost:<port> as if the external service were local; the
    ambassador handles routing to the actual external endpoint. Sidecar vs Ambassador:
    all ambassadors are sidecars, but not all sidecars are ambassadors. A sidecar
    adds supplementary functionality; an ambassador sits in the network path between
    the app and external services.'
  spec: null
  simulator_trigger: docker-compose.yml — Envoy sidecar as ambassador for SBI traffic
    in simulator
  interview_context: The Envoy sidecar in Istio acts as an ambassador for SBI traffic
    — it intercepts outbound HTTP/2 calls, applies mTLS and circuit breaking
- id: q248
  domain: kubernetes
  subdomain: storage
  tags:
  - kubernetes
  level: engineer
  question: What is emptyDir and when should you use it vs a PersistentVolumeClaim?
  answer: 'emptyDir is an ephemeral volume created when a Pod is assigned to a node
    and deleted when the Pod is removed. It is stored in the node''s local disk (or
    RAM if emptyDir.medium: Memory). Unlike a PVC, it does not survive Pod deletion
    or rescheduling. Use emptyDir for: (1) sharing files between containers within
    the same Pod (app writes logs, sidecar ships them); (2) scratch space for temporary
    computation; (3) caches that can be rebuilt after restart. Use a PVC when data
    must survive Pod restarts or node failures.'
