  - cnf
  level: engineer
  question: Describe the structure of a Helm chart and the role of each component.
  answer: 'A Helm chart directory contains: Chart.yaml (metadata: name, version, appVersion,
    description, dependencies — version is chart version; appVersion matches Docker
    image tag); values.yaml (default config values, overridable with --set or -f);
    templates/ (Go template K8s manifests — deployment.yaml, service.yaml, hpa.yaml,
    pdb.yaml, _helpers.tpl for named reusable templates); charts/ (bundled sub-chart
    dependencies); .helmignore. Values are referenced as {{ .Values.key }}. ''helm
    template'' renders locally; ''helm install --dry-run'' validates against cluster
    API server. Nokia AMF chart has 20+ configurable parameters.'
