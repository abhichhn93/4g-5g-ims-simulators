- id: q249
  domain: kubernetes
  subdomain: storage
  tags:
  - kubernetes
  level: engineer
  question: What are PV access modes and reclaim policies?
  answer: 'Access modes: ReadWriteOnce (RWO — single node), ReadOnlyMany (ROX — multiple
    nodes read-only), ReadWriteMany (RWX — multiple nodes read-write), ReadWriteOncePod
    (RWOP — single Pod only, K8s 1.22+). Reclaim policies: Retain (PV remains, manual
    cleanup required — safe for production data), Delete (PV and underlying storage
    deleted automatically — for dynamic provisioning), Recycle (deprecated). For production
    stateful workloads, use Retain to prevent accidental data loss during PVC or namespace
    deletion. A common interview scenario: ''what happens if you delete a PVC bound
    to UDR data?'' — depends entirely on the reclaim policy.'
  spec: null
  simulator_trigger: k8s/ manifests — PV reclaim policy for UDR subscriber data
  interview_context: UDR in 5G must use Retain policy — deleting a Pod namespace during
    rollback must not destroy subscriber data
- id: q250
