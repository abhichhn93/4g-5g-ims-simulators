  level: engineer
  question: Explain the structure of a GitHub Actions workflow. What are the key components?
  answer: 'A GitHub Actions workflow is a YAML file in .github/workflows/ automating
    CI/CD. Key components: Trigger (on) — events like push, pull_request, schedule,
    workflow_dispatch; Jobs — units of work running in parallel by default (use ''needs''
    for dependencies); Steps — sequential commands within a job; Actions — reusable
    logic from GitHub Marketplace (actions/checkout, actions/cache); Secrets — encrypted
    values injected via ${{ secrets.MY_SECRET }}; Environments — named deployment
    targets with protection rules and manual approval gates.'
