  - raii
  - smart-ptr
  level: engineer
  question: How do you detect and prevent memory leaks in C++?
  answer: Prevent leaks by using smart pointers (unique_ptr, shared_ptr) instead of
    raw new/delete, applying RAII for all resources, and preferring STL containers
    over manual dynamic arrays. Detection tools include Valgrind, AddressSanitizer
    (-fsanitize=address), and Visual Studio's CRT debug heap. Cyclic shared_ptr references
    are a subtle source of leaks — break cycles with weak_ptr.
