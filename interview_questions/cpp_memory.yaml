  level: senior
  question: What is copy elision and Named Return Value Optimization (NRVO)?
  answer: 'Copy elision is a compiler optimization that eliminates unnecessary copy
    or move constructor calls by constructing an object directly in its destination
    memory. NRVO is the most common form: when a function returns a named local object,
    the compiler may construct it directly in the caller''s stack frame. In C++17,
    copy elision from a prvalue (return MyClass{args}) is guaranteed and cannot be
    suppressed.'
  spec: null
