  level: senior
  question: Why use shared_mutex instead of mutex for the UE store in the MME simulator?
  answer: shared_mutex allows multiple simultaneous readers while blocking only on
    writes — fitting the UE store access pattern where hundreds of concurrent reads
    occur during active calls (paging, bearer queries) while writes are rare (new
    attach, detach). A regular mutex would serialize all reads even though they cannot
    conflict, creating unnecessary latency. Use shared_lock for read operations and
    unique_lock for writes on the shared_mutex.
  spec: null
  simulator_trigger: BULK command execution, ue_context_store_ lookup in mme_node.cpp
  interview_context: Asked to test understanding of reader-writer concurrency patterns
    in telecom control-plane stores
