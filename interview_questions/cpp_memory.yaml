    to avoid deep copies on the hot path
  interview_context: Tests understanding of value categories and their performance
    implications in message pipelines
- id: q015
  domain: cpp
  subdomain: memory
  tags:
  - cpp-memory
  - move-semantics
  - raii
  level: senior
  question: What are move semantics and how do you implement a move constructor?
  answer: Move semantics allow resources to be transferred from a temporary (rvalue)
    object to a new one without a deep copy, by stealing the internal pointer and
    leaving the source in a valid-but-empty state. A move constructor is declared
    as MyClass(MyClass&& other) noexcept and typically steals other's resources then
    nulls out other. Marking move operations noexcept is critical — it allows std::vector
    to use moves instead of copies during reallocation.
  spec: null
  simulator_trigger: SimulatorEvent move constructors in the event queue — noexcept
    required for safe push_back into vectors
