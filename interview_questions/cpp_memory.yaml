  level: engineer
  question: What is RAII, and why does it matter in C++?
  answer: 'RAII (Resource Acquisition Is Initialization) ties a resource''s lifetime
    to an object''s: the constructor acquires the resource and the destructor releases
    it. Because the C++ runtime guarantees destructors run when objects go out of
    scope, even during exception unwinding, RAII provides automatic exception-safe
    cleanup without manual try-finally blocks. Examples include unique_ptr (heap memory),
    lock_guard (mutex), and fstream (file handle).'
  spec: null
  simulator_trigger: RAII in socket_wrapper.h — socket file descriptor acquired in
    constructor, released in destructor
  interview_context: Core C++ idiom check; essential for writing safe telecom code
- id: q013
  domain: cpp
  subdomain: memory
  tags:
  - cpp-memory
  - raii
  - smart-ptr
  level: senior
  question: Compare unique_ptr, shared_ptr, and weak_ptr. When do you use each?
  answer: unique_ptr represents exclusive single ownership; it cannot be copied, only
    moved, and has zero overhead — it is the default choice. shared_ptr provides shared
    ownership through an atomic reference count; the object is deleted when the last
    owner goes out of scope — use it only when multiple components genuinely co-own
    the same object. weak_ptr is a non-owning observer that does not increment the
    count; call lock() to get a temporary shared_ptr — use it to break cyclic references
    and in caches.
  spec: null
  simulator_trigger: unique_ptr in simulator node factories; shared_ptr for shared
    UE context accessed across MME and SGW simulators
  interview_context: Tests ownership reasoning critical for memory-safe telecom node
    simulation
- id: q014
  domain: cpp
  subdomain: memory
  tags:
  - cpp-memory
  - move-semantics
  level: senior
  question: What is the difference between std::move and std::forward?
  answer: std::move unconditionally casts its argument to an rvalue reference, signaling
    that the object's resources may be transferred rather than copied — it does not
    actually move anything itself. std::forward is used inside template functions
    to perform perfect forwarding, conditionally casting to lvalue or rvalue depending
    on the original value category of the caller's argument. Use move for explicit
    ownership transfer; use forward in forwarding-reference templates.
  spec: null
