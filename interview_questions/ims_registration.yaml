  level: senior
  question: Walk through the VoLTE Mobile Originated call setup procedure from SIP
    to QCI=1 bearer establishment.
  answer: UE-A sends SIP INVITE (with SDP offer) to P-CSCF-A, which forwards through
    S-CSCF-A (invoking MTAS for call features) to the terminating side; UE-B responds
    with 183 Session Progress containing an SDP answer. The P-CSCF on the terminating
    side sends Rx AAR (with media parameters from SDP) to PCRF, which creates a QCI=1
    PCC rule and pushes it to PGW via Gx RAR, triggering GTPv2 Create Bearer Request
    through SGW → MME → eNB → UE for dedicated bearer establishment. QoS preconditions
    are confirmed, UE-B answers with 200 OK, and RTP voice flows over the QCI=1 GTP-U
    tunnel; a SIP BYE releases both the session and the QCI=1 bearer.
  spec: TS 23.228, TS 24.229, TS 29.214, TS 23.203
  simulator_trigger: CALL command — end-to-end VoLTE flow from SIP INVITE through
    Rx/Gx to GTPv2 dedicated bearer
  interview_context: End-to-end VoLTE architecture question combining SIP, IMS, PCRF,
    and EPC bearer knowledge
- id: q101
  domain: ims
  subdomain: registration
  tags:
  - volte-call
  - sdp
  - sip-invite
  level: engineer
  question: What is the SDP offer/answer model and what is its role in VoLTE codec
    negotiation?
  answer: SDP (Session Description Protocol, RFC 4566) describes media sessions. In
    VoLTE, the SIP INVITE carries an SDP offer from the originating UE listing supported
    codecs (payload types), media IP address, UDP port for RTP, and bandwidth. The
    terminating UE responds with an SDP answer in the 183/200 OK, selecting one codec
    and providing its own IP/port for the reverse RTP stream. Key parameters include
    a=rtpmap (codec/rate), a=fmtp (codec parameters), a=ptime (packetization time,
    e.g., 20ms for AMR-WB), and a=curr:qos / a=des:qos for QoS preconditions.
  spec: TS 24.229, RFC 4566, RFC 3264, GSMA IR.92
  simulator_trigger: CALL command — SDP offer/answer exchange in sip_sdp_handler.cpp
    driving codec and media IP negotiation
  interview_context: Tests SDP offer/answer understanding needed for VoLTE codec selection
    and bearer TFT configuration
- id: q102
  domain: ims
  subdomain: registration
