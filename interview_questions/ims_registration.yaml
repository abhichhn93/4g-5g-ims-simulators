  - cx
  - hss
  level: senior
  question: What is an Initial Filter Criteria (iFC) and when is it triggered in IMS?
  answer: An iFC is a trigger condition stored in the S-CSCF (received from HSS in
    the user profile via SAA) that determines when a SIP message should be forwarded
    to an Application Server. Each iFC has a Priority, Trigger Point (conditions on
    SIP method, headers, URI), AS URI, and Default Handling (session-continued or
    terminated if AS unreachable). The S-CSCF evaluates iFC for every SIP REGISTER,
    INVITE, or SUBSCRIBE passing through it, forking to the AS if conditions match
    via the ISC interface.
  spec: TS 23.218, TS 24.229
  simulator_trigger: REGISTER command — S-CSCF evaluates iFC from user profile, triggers
    MTAS for MMTel service registration
  interview_context: Tests service routing mechanism that connects IMS core to Application
    Servers for supplementary services
- id: q099
  domain: ims
  subdomain: registration
  tags:
  - ims-register
