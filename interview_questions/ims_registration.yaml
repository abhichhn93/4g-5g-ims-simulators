  level: engineer
  question: What is the difference between IMPI and IMPU in IMS?
  answer: IMPI (IMS Private Identity) is the permanent, private identity of the IMS
    subscriber formatted as a NAI (user@domain) — used for authentication in the SIP
    REGISTER Authorization header and never visible to other users. IMPU (IMS Public
    Identity) is the user-visible identity used for communications — a SIP URI (sip:+1234@operator.com)
    or TEL URI (tel:+1234). One IMPI can have multiple IMPUs; IMPUs in the same implicit
    registration set are all registered simultaneously when any one is registered.
  spec: TS 23.003, TS 23.228
  simulator_trigger: REGISTER command — IMPI in SIP Authorization header, IMPU in
    From/To headers in sip_register_handler.cpp
  interview_context: Tests IMS identity model fundamental to IMS registration and
    service routing
- id: q098
  domain: ims
