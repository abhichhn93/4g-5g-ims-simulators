  - s-cscf
  - ims-epc
  level: engineer
  question: How does P-CSCF discovery work in LTE/VoLTE?
  answer: 'P-CSCF discovery in LTE occurs during IMS PDN connection establishment
    via PCO (Protocol Configuration Options) in the PDN Connectivity Accept NAS message:
    the PGW inserts P-CSCF IPv4/IPv6 addresses into the PCO IE, provisioned per IMS
    APN. GSMA IR.92 mandates PCO-based discovery as the primary method; DNS-based
    discovery (NAPTR/SRV lookup) is a fallback. The MME forwards PCO transparently
    between UE and PGW; the UE stores the P-CSCF address for all subsequent SIP signaling.'
  spec: TS 23.228 §5.1.1.1, GSMA IR.92
  simulator_trigger: 4G ATTACH command — PGW inserts P-CSCF address in PCO in the
    IMS APN Create Session Response
  interview_context: Tests the EPC-IMS boundary knowledge of how the UE first learns
    where to send SIP signaling
