  level: senior
  question: How does IMS interact with EPC during a VoLTE call? Trace the full control-plane
    path.
  answer: IMS and EPC interact primarily through the P-CSCF → PCRF → PGW chain. EPC
    provides the QCI=5 default bearer for SIP signaling (no EPC involvement beyond
    IP transport for the registration step). During call setup, the P-CSCF sends Rx
    AAR with media flow info to the PCRF, which creates a PCC rule for QCI=1 GBR and
    sends Gx RAR to the PGW, which then sends a GTPv2 Create Bearer Request chain
    through SGW → MME → eNB → UE. On call teardown, SIP BYE triggers Rx STR to PCRF,
    which sends Gx RAR to PGW removing the rule, and the PGW initiates Delete Bearer
    Request. No SIP messages pass through MME, SGW, or PGW — those nodes only handle
    the GTP tunnel per policy.
  spec: TS 23.203, TS 29.214, TS 29.212, TS 23.401
  simulator_trigger: CALL command — full cross-system trace from CALL command through
    SIP, Rx, Gx, GTPv2 to bearer
  interview_context: Architect-level question requiring ability to trace a VoLTE call
    across both IMS and EPC simultaneously
- id: q105
  domain: ims
  subdomain: registration
  tags:
  - p-cscf
  - ims-register
