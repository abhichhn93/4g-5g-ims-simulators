  level: senior
  question: What is the role of the Rx interface in VoLTE call setup?
  answer: The Rx interface connects the P-CSCF (acting as an AF) to the PCRF, using
    Diameter (App-ID 16777236). After receiving the SDP answer, the P-CSCF extracts
    media parameters and sends an AA-Request (AAR) to the PCRF with service information
    (media type, bandwidth, flow descriptions). The PCRF creates a PCC rule for a
    QCI=1 GBR dedicated bearer and pushes it to the PGW via Gx RAR. The Rx↔Gx interaction
    is the bridge between IMS session management and EPC bearer management — ensuring
    a voice bearer is only created when an active IMS session justifies it.
  spec: TS 29.214, TS 23.203
  simulator_trigger: CALL command — Rx AAR from P-CSCF to PCRF in rx_client.cpp after
    SDP answer received
  interview_context: Tests understanding of the Rx/Gx bridge — the most commonly misunderstood
    interaction in VoLTE
- id: q103
  domain: ims
  subdomain: registration
  tags:
  - volte-call
  - sip
  - sip-invite
  level: senior
  question: What are early and late ringing modes in VoLTE, and what is a ghost ring?
  answer: In early ringing mode, 180 Ringing is sent before the QCI=1 bearer is established
    on the originating side; if bearer setup subsequently fails, the phone rang but
    the call never connected — this is a ghost ring. In late ringing (precondition
    mode per RFC 3312), 180 Ringing is only sent after QCI=1 bearers on both sides
    are confirmed established. Late ringing is more reliable but has slightly higher
    call setup time; GSMA IR.92 recommends precondition mode with a target of ≤4 seconds
    call setup time.
  spec: TS 24.229, RFC 3312, GSMA IR.92
  simulator_trigger: CALL command — simulator configures early_ringing=true to test
    ghost ring detection in call_setup_handler.cpp
  interview_context: Tests VoLTE call setup quality understanding relevant to IMS
    troubleshooting and IR.92 compliance
- id: q104
  domain: ims
