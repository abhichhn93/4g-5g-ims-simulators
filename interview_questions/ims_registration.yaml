  level: senior
  question: Walk through the complete IMS SIP registration procedure step by step,
    naming all interfaces.
  answer: The UE sends an unauthenticated SIP REGISTER to P-CSCF; P-CSCF forwards
    to I-CSCF, which queries HSS via Cx UAR/UAA to locate or select an S-CSCF. The
    S-CSCF fetches IMS-AKA auth vectors from HSS via Cx MAR/MAA and challenges the
    UE with 401 Unauthorized (RAND, AUTN). The UE responds with a second REGISTER
    carrying credentials (RES); the S-CSCF verifies RES, registers the S-CSCF assignment
    with HSS via SAR/SAA (receiving iFC and user profile), and returns 200 OK. The
    S-CSCF then invokes iFC to register with Application Servers (e.g., MTAS) for
    supplementary services.
  spec: TS 23.228, TS 24.229, TS 29.228
  simulator_trigger: REGISTER command — SIP REGISTER from UE through P-CSCF to S-CSCF
    with Cx Diameter exchanges to HSS
  interview_context: End-to-end IMS registration knowledge expected at senior level
    in any IMS/VoLTE role
- id: q097
