  level: engineer
  question: What is the role of the P-CSCF in IMS?
  answer: The P-CSCF (Proxy-CSCF) is the UE's first IMS contact point — all SIP signaling
    passes through it. Functions include SIP proxy (forwarding REGISTER and INVITE),
    IPSec/TLS termination for the UE security association, acting as Rx/AF (extracting
    SDP media parameters and signaling PCRF for bearer authorization), emergency session
    detection, network-initiated session release if UE loses connectivity, and optionally
    SigComp message compression. In roaming scenarios, the P-CSCF is located in the
    visited network.
  spec: TS 23.228 §4.6.1, TS 29.214
  simulator_trigger: REGISTER command and CALL command — all SIP from UE simulator
    passes through p_cscf_node.cpp
  interview_context: Core IMS node role knowledge tested at mid-level in any IMS/VoLTE
    engineering position
