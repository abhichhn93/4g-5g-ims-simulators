  question: What are the key type_traits and how are they used?
  answer: std::is_integral<T>::value is true for int, long, bool, char — used to gate
    code paths requiring integer semantics. std::is_same<T, U>::value checks exact
    type identity (ignoring cv-qualifiers only if you apply std::remove_cv first).
    std::conditional<Condition, T, F>::type is a compile-time ternary yielding T if
    Condition is true, else F — used to select storage types at compile time. std::decay<T>
    strips references, top-level cv-qualifiers, and converts arrays/function types
    to pointers — what auto deduction applies and what you use before storing a template
    argument by value. All four are zero-runtime-cost compile-time operations.
  spec: null
