  question: What are variadic templates and fold expressions?
  answer: 'Variadic templates accept zero or more template arguments via ''typename...
    Args'', packed into a parameter pack. Before C++17, processing a pack required
    recursive templates. C++17 fold expressions collapse a parameter pack over a binary
    operator in a single expression: (args + ...) is a unary right fold. Fold expressions
    are more concise, compile faster, and avoid deep template instantiation stacks.
    Four forms: unary left, unary right, binary left, binary right. sizeof...(args)
    gives the pack size. Fold expressions also work with the comma operator for side-effect-based
    iteration: ((std::cout << args << '' ''), ...).'
  spec: null
