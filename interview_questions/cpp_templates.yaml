  level: senior
  question: What is the difference between full and partial template specialisation?
  answer: 'Full specialisation provides a completely concrete definition for a specific
    set of template arguments — template<> class Foo<int> {} — replacing the primary
    template entirely for T=int. It works for both class and function templates. Partial
    specialisation provides a definition for a subset of template arguments, leaving
    some still generic — template<typename T> class Foo<T*> {} — and is only legal
    for class templates (and variable templates), not for function templates (use
    overloading instead). The compiler chooses the most specialised match during instantiation.
    Partial specialisation is the engine behind most type trait implementations: is_pointer
    has a primary false_type and a partial specialisation for T* that yields true_type.'
  spec: null
