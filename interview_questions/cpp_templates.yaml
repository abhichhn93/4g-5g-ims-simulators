- id: q329
  domain: cpp
  subdomain: templates
  tags:
  - cpp-templates
  level: senior
  question: Why is constexpr if cleaner than SFINAE in C++17?
  answer: 'With SFINAE, conditional logic requires writing multiple separate function
    templates, one per branch, each guarded by enable_if — the intent is spread across
    overload sets and error messages are cryptic. ''if constexpr'' (C++17) places
    the compile-time branch inside a single function body: the compiler evaluates
    the condition at compile time and discards the unselected branch entirely (that
    branch is not even instantiated). This produces cleaner error messages, sequential
    readable logic, and avoids proliferation of function overloads. Critical difference:
    ''if constexpr'' is NOT SFINAE — it does not remove the function from the overload
    set if the condition is false, so you cannot use it when multiple independently
    selectable overloads are needed.'
  spec: null
  simulator_trigger: TelecomException hierarchy in telecom_exception.h — constexpr
    if in protocol field serializers
  interview_context: Simplifies protocol field serializers where integer vs float
    fields require different encoding without generating separate instantiations
