  question: What is SFINAE and how does enable_if use it?
  answer: SFINAE (Substitution Failure Is Not An Error) means that when the compiler
    substitutes template arguments and the resulting type is ill-formed, it silently
    removes that candidate from the overload set rather than issuing a compile error.
    std::enable_if<Condition, T>::type defines a nested type alias only when Condition
    is true; when false, the alias does not exist, causing substitution failure that
    SFINAE quietly discards. This lets you write two overloads — one for integral
    types, one for floating-point — selected at compile time. In C++14+, std::enable_if_t<Condition,
    T> removes the ::type boilerplate. C++20 Concepts supersede most enable_if patterns
    with cleaner syntax.
  spec: null
