  level: senior
  question: What is ABI and what kinds of changes break it in C++?
  answer: 'ABI (Application Binary Interface) defines how compiled code interacts
    at the binary level: calling conventions (how arguments are passed/returned in
    registers or stack), name mangling (how overloaded and namespace-qualified symbols
    are encoded), vtable layout (offset of virtual function pointers), and data structure
    layout (field offsets, alignment, size). Changes that break ABI: adding/removing/reordering
    virtual functions, adding fields to a class, changing calling conventions, or
    altering the size/alignment of any type in a shared interface. ABI-stable shared
    libraries require careful discipline: add only at the end of classes, never remove
    virtual functions, and use the PIMPL idiom to hide implementation details.'
  spec: null
