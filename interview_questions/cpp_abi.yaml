    runtime
- id: q344
  domain: cpp
  subdomain: abi
  tags:
  - abi
  level: senior
  question: What is name mangling and how does extern C fix it?
  answer: C++ name mangling encodes function overloads, namespaces, and template instantiations
    into unique symbol names (e.g., _ZN3foo3barEi for foo::bar(int)) so the linker
    can differentiate them. The exact mangling scheme is compiler-specific (GCC/Clang
    use the Itanium ABI; MSVC uses its own). This means C++ symbols are not directly
    callable from C or from differently-compiled C++ binaries. extern "C" suppresses
    mangling and uses the flat C symbol convention, making functions linkable from
    C code and across ABI boundaries. It cannot be applied to overloaded functions
    (since C has no overloading).
  spec: null
  simulator_trigger: TelecomException hierarchy in telecom_exception.h — extern C
    in plugin interfaces loaded by telecom frameworks
  interview_context: Telecom NF plugin APIs exposed as .so files typically use extern
    C entry points so they can be loaded regardless of compiler version
- id: q345
  domain: cpp
  subdomain: abi
  tags:
  - abi
  level: engineer
  question: What is the difference between static and dynamic linking?
  answer: 'Static linking copies all required library code into the executable at
    link time, producing a self-contained binary with no runtime library dependency.
    Dynamic linking produces a smaller executable that loads shared libraries (.so/.dll)
    at runtime via the dynamic linker; the library code is shared in memory across
    processes. Trade-offs: static binaries are portable and startup-deterministic
    but larger and cannot be patched without recompilation. Dynamic libraries can
    be updated independently (security patches) but introduce dependency management
    (DLL hell, version conflicts) and add dlopen/PLT indirection overhead. Telecom
    NFs with hard-coded C++ ABI interfaces commonly link the core framework statically
    and expose extension points via extern C dynamic plugins.'
  spec: null
