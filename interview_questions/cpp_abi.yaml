- id: q346
  domain: cpp
  subdomain: abi
  tags:
  - abi
  level: architect
  question: How does the PIMPL idiom help with ABI stability?
  answer: PIMPL (Pointer to IMPLementation) moves all private data members and implementation
    details into a separate Impl class whose definition is not exposed in the header,
    only a forward declaration and a unique_ptr<Impl>. The public header's size is
    fixed (just one pointer) regardless of implementation changes. Adding/removing
    private fields or helper methods does not change the public class's sizeof or
    field offsets, so existing compiled client code continues to work without recompilation.
    The cost is one extra heap allocation per object and one extra pointer dereference
    per member access. PIMPL is the canonical technique for implementing stable C++
    library ABIs over long maintenance cycles, as used in Qt and many telecom middleware
    SDKs.
  spec: null
