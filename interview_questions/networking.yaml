- id: q205
  domain: networking
  subdomain: tcp_ip
  tags:
  - tcp
  level: engineer
  question: Describe the TCP 3-way handshake and 4-way teardown.
  answer: '3-Way Handshake: (1) SYN — client sends SYN with its ISN; (2) SYN-ACK —
    server acknowledges client''s SYN and sends its own SYN with its ISN; (3) ACK
    — client acknowledges server''s SYN. Connection is ESTABLISHED. 4-Way Teardown:
    (1) FIN — initiating side has no more data; (2) ACK — other side acknowledges;
    (3) FIN — other side sends its own FIN when done; (4) ACK — original initiator
    acknowledges. The final ACK sender enters TIME_WAIT for 2×MSL (typically 2 min).
    Two sides independently close their half, hence 4 steps vs 3 for setup.'
  spec: null
  simulator_trigger: socket_wrapper.h — TCP connection establishment in simulator
  interview_context: TCP connections underlie all 5G SBI HTTP/2 traffic; handshake
    knowledge is a standard warm-up question
- id: q206
  domain: networking
  subdomain: tcp_ip
  tags:
  - tcp
  level: engineer
  question: What is the TCP TIME_WAIT state and why does it exist? What problems can
    it cause?
  answer: 'TIME_WAIT is the state entered by the TCP endpoint that sends the final
    ACK in a 4-way teardown. It lasts for 2×MSL (typically 60 s to 4 min). Purpose:
    (1) ensures the final ACK reaches the remote end; (2) prevents ghost segments
    from a closed connection being misinterpreted by a new connection on the same
    4-tuple. Problems: on servers handling thousands of short-lived connections, TIME_WAIT
    sockets accumulate and can exhaust ephemeral ports (default 32768–60999). Mitigations:
    net.ipv4.tcp_tw_reuse=1, widen ip_local_port_range, or use HTTP persistent connections/HTTP2
    multiplexing.'
  spec: null
  simulator_trigger: socket_wrapper.h — SO_REUSEADDR for TIME_WAIT port reuse
  interview_context: High-volume NRF discovery traffic generates many short-lived
    connections; TIME_WAIT exhaustion is a real operational issue
- id: q207
  domain: networking
  subdomain: tcp_ip
  tags:
  - tcp
  level: engineer
  question: What is TCP flow control vs congestion control? How do they differ?
  answer: Flow control prevents the sender from overwhelming the receiver's buffer
    using the receive window (rwnd) advertised by the receiver in every ACK — the
    sender can only have rwnd bytes unacknowledged at any time. Congestion control
    prevents the sender from overwhelming the network itself. The sender maintains
    a congestion window (cwnd) and the actual sending rate is min(rwnd, cwnd)/RTT.
    Congestion control algorithms include Slow Start (cwnd doubles per RTT until ssthresh),
    Congestion Avoidance (cwnd grows by 1 MSS per RTT), Fast Retransmit/Recovery,
    CUBIC (Linux default), and BBR (bandwidth-based, not loss-based).
  spec: null
  simulator_trigger: socket_wrapper.h — GTP-U tunneling interaction with TCP congestion
    control
  interview_context: GTP-U tunneling over lossy backhaul triggers spurious TCP retransmissions;
    understanding congestion control helps debug N3 throughput
- id: q208
  domain: networking
  subdomain: udp
  tags:
  - udp
  level: engineer
  question: Why is UDP used for RTP/media traffic? How is reliability achieved at
    the application layer?
  answer: 'UDP is used for real-time media (RTP) because: latency matters more than
    reliability (a retransmitted packet arriving 200ms late is useless); no head-of-line
    blocking (UDP delivers each packet independently); no connection overhead; and
    multicast support. Application-layer reliability for RTP: RTCP carries sender/receiver
    reports and packet loss statistics enabling adaptive bitrate; Forward Error Correction
    (FEC) sends redundant parity packets; packet loss concealment in codecs (Opus,
    G.711); jitter buffer absorbs network jitter; RTP sequence numbers detect reordering
    and loss without TCP retransmit.'
  spec: null
  simulator_trigger: socket_wrapper.h — UDP socket for RTP in IMS media plane simulation
  interview_context: IMS voice-over-5G (VoNR) uses RTP over UDP; understanding UDP/RTP
    is foundational for 5G core engineers
- id: q209
  domain: networking
  subdomain: tls
  tags:
  - tls
  level: senior
  question: Describe the TLS 1.3 handshake. How does it differ from TLS 1.2?
  answer: 'TLS 1.3 Handshake (1-RTT): (1) ClientHello — supported versions, key share
    (ephemeral ECDHE), cipher suites, SNI; (2) ServerHello + Encrypted Extensions
    + Certificate + CertificateVerify + Finished — all encrypted under handshake key;
    (3) Client Finished — client verifies certificate chain and CertificateVerify.
    Key improvements over TLS 1.2: certificates are encrypted in transit; RSA key
    exchange removed (forward secrecy mandatory via ECDHE); legacy cipher suites removed;
    0-RTT resumption possible; handshake authenticated end-to-end via transcript hash
    preventing downgrade attacks.'
  spec: 3GPP TS 33.210
  simulator_trigger: socket_wrapper.h — TLS 1.3 in 5G SBI HTTP/2 connections
  interview_context: 5G SBI mandates TLS 1.3 for all inter-NF communication; diagnosis
    of SBI connectivity failures requires handshake knowledge
- id: q210
  domain: networking
  subdomain: tls
  tags:
  - tls
  level: senior
  question: What is mutual TLS (mTLS) and how does it differ from standard TLS? Where
    is it used in 5G?
  answer: 'In standard TLS, only the server presents a certificate — the client authenticates
    the server but the server does not authenticate the client. In mTLS, both client
    and server present certificates. The mTLS handshake adds: the server sends a CertificateRequest
    after its own certificate; the client sends its Certificate and CertificateVerify.
    Both certificates are issued by a common CA. 5G SBI usage (TS 33.501 Section 13.1):
    mTLS is mandatory for all HTTP/2 SBI interfaces between 5G core NFs. In Kubernetes,
    cert-manager automates certificate issuance; Istio service mesh enforces mTLS
    via Envoy sidecars without modifying NF application code.'
  spec: 3GPP TS 33.501
  simulator_trigger: socket_wrapper.h — mTLS certificates in 5G SBI simulator connections
  interview_context: mTLS is the primary security mechanism for the 5G SBI — guaranteed
    interview topic at Nokia, Ericsson, Mavenir
- id: q211
  domain: networking
  subdomain: http2
  tags:
  - http2
  level: engineer
  question: How does HTTP/2 multiplexing work? What problem does it solve over HTTP/1.1?
  answer: 'HTTP/1.1 suffers from head-of-line blocking — requests on a persistent
    connection are processed in order; a slow response blocks all subsequent requests.
    HTTP/2 introduces multiplexing: multiple independent streams are interleaved over
    a single TCP connection, each with a unique stream ID. Frames from different streams
    can be freely interleaved — a slow response on stream 7 does not block stream
    9. Binary framing enables efficient parsing. HPACK header compression reduces
    header overhead 80–90% by referencing common headers from static and dynamic tables.
    Limitation: HTTP/2 still runs over TCP — a lost TCP segment stalls all streams
    (solved in HTTP/3/QUIC).'
  spec: 3GPP TS 29.500
  simulator_trigger: socket_wrapper.h — HTTP/2 in 5G SBI inter-NF communication
  interview_context: All 5G SBI interfaces use HTTP/2 — mandatory per TS 29.500; NF
    making 1000 requests/sec benefits enormously from multiplexing
- id: q212
  domain: networking
  subdomain: ip
  tags:
  - ip
  level: engineer
  question: What is IP fragmentation, MTU, and PMTUD? When does fragmentation cause
    problems?
  answer: 'MTU is the largest IP packet a network link can carry (Ethernet standard:
    1500 bytes). IP fragmentation splits packets larger than path MTU into multiple
    fragments at routers (IPv4) or source (IPv6 — routers never fragment). PMTUD avoids
    fragmentation by discovering the smallest MTU along the path: IPv4 packets sent
    with DF bit set; if a router needs to fragment, it drops and returns ICMP Type
    3 Code 4 ''Fragmentation Needed''. Problems: ICMP black-holes (firewalls blocking
    ICMP cause PMTUD failures); GRE/IPsec tunnel overhead reduces effective MTU; Kubernetes
    VXLAN adds 50 bytes of overhead (pod-to-pod effective MTU ~1450 bytes).'
  spec: null
  simulator_trigger: socket_wrapper.h — GTP-U overhead and MTU considerations in user
    plane
  interview_context: GTP-U encapsulation in 5G adds ~36 bytes overhead; MTU misconfigurations
    cause silent packet drops on N3 interface
- id: q213
  domain: networking
  subdomain: wireshark
  tags:
  - wireshark
  level: engineer
  question: What is the difference between a capture filter and a display filter in
    Wireshark?
  answer: 'A capture filter (BPF syntax) is applied before packet collection — it
    instructs the capture engine to only record matching packets. Examples: ''tcp
    port 443'', ''host 192.168.1.1''. A display filter (Wireshark''s DSL) is applied
    after capture to already-recorded packets without discarding data. Examples: ''ip.addr
    == 192.168.1.1'', ''tcp.flags.syn == 1 && tcp.flags.ack == 0'', ''dns.qry.name
    contains "nrf"'', ''frame.len > 1400''. Display filters are more expressive; capture
    filters are essential for reducing storage at high packet rates.'
  spec: null
  simulator_trigger: socket_wrapper.h — packet capture and analysis in simulator debug
    mode
  interview_context: Wireshark is a mandatory tool for 5G protocol debugging — senior
    engineers are expected to write display filters fluently
- id: q214
  domain: networking
  subdomain: wireshark
  tags:
  - wireshark
  level: engineer
  question: How do you follow a TCP stream in Wireshark? What are the differences
    between pcap and pcapng formats?
  answer: 'Follow a TCP stream: right-click any packet in the target stream → Follow
    → TCP Stream. Wireshark reassembles all TCP segments in both directions, color-coded
    by direction. This applies a display filter like ''tcp.stream eq 3''. pcap vs
    pcapng: pcap is the legacy single-interface format with microsecond timestamps;
    pcapng is modern (IETF RFC) supporting multiple interfaces per file, nanosecond
    timestamps, per-packet comments, interface metadata, and zstd compression. For
    new captures, always use pcapng. pcap remains universal and safe for sharing with
    older tools.'
  spec: null
  simulator_trigger: socket_wrapper.h — pcapng capture in simulator protocol tracing
  interview_context: Protocol traces for 5G incident analysis are captured in pcapng
    with multiple interfaces
