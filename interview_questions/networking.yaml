- id: q216
  domain: networking
  subdomain: load_balancing
  tags:
  - load-balancing
  level: engineer
  question: What is the difference between L4 and L7 load balancing?
  answer: 'L4 LB operates at Transport layer (TCP/UDP): routes based on IP + port
    (connection-level), no content awareness, TLS pass-through or termination, lower
    overhead. Examples: AWS NLB, HAProxy TCP mode, IPVS. L7 LB operates at Application
    layer (HTTP/gRPC): routing based on HTTP host, path, header, cookie; full HTTP
    inspection; TLS offload; higher overhead. Examples: NGINX, Envoy, Istio, AWS ALB.
    In 5G: the SBI uses L7 LB (Envoy via Istio) for NF-to-NF HTTP/2 traffic; the N2
    interface (NGAP/SCTP) uses L4 LB since SCTP is not HTTP.'
  spec: null
  simulator_trigger: socket_wrapper.h — L4 vs L7 balancing for different 5G interfaces
  interview_context: Understanding which load balancing layer is appropriate for each
    5G interface is tested at Nokia and Ericsson
- id: q217
  domain: networking
  subdomain: load_balancing
  tags:
  - load-balancing
  level: engineer
  question: Compare round-robin, least-connections, and IP-hash load balancing algorithms.
  answer: 'Round Robin: requests distributed sequentially — good for stateless services
    with uniform request cost. Weighted Round Robin: backends get proportional share
    based on capacity. Least Connections: route to backend with fewest active connections
    — best for long-lived connections or variable-cost requests. Least Response Time:
    route to backend with lowest latency + fewest connections — latency-sensitive
    services. IP Hash: hash src IP to select backend deterministically for session
    stickiness — poor distribution behind NAT; consistent hashing mitigates backend
    add/remove issues. In 5G, NRF discovery uses priority + capacity-based selection;
    the SCP uses weighted round-robin adjusted by real-time load notifications.'
  spec: 3GPP TS 29.510
  simulator_trigger: socket_wrapper.h — load balancing strategy in NRF discovery simulation
  interview_context: NRF response includes priority and capacity attributes per NF
    instance — understanding these algorithms is tested in 5G architect interviews
- id: q218
  domain: networking
  subdomain: dns
  tags:
  - dns
  level: engineer
  question: What are A, AAAA, and SRV DNS record types? How are SRV records used in
    5G NRF discovery?
  answer: 'A: maps hostname to IPv4 address. AAAA: maps hostname to IPv6 address.
    CNAME: alias. SRV: maps service name to host + port + priority + weight (format:
    ''_service._proto.name TTL class SRV priority weight port target''). PTR: reverse
    DNS. TXT: arbitrary metadata. 5G NRF discovery via DNS (TS 29.510 + RFC 2782):
    NF consumers query ''_nfregistration._tcp.<FQDN>'' to find NRF endpoint. Multiple
    SRV records enable load balancing (weight) and failover (priority). This provides
    a DNS-based bootstrap mechanism before the NRF is fully operational.'
  spec: 3GPP TS 29.510
  simulator_trigger: socket_wrapper.h — DNS SRV lookup for NRF bootstrap in simulator
    startup
  interview_context: SRV records are a key mechanism for stateless NF bootstrap in
    5G — troubleshooting NF registration failures often starts with verifying SRV
    records
- id: q219
  domain: networking
  subdomain: dns
  tags:
  - dns
  level: senior
  question: How does Kubernetes CoreDNS provide DNS for cluster services? How does
    it relate to 5G NF discovery?
  answer: 'CoreDNS runs as a Deployment in kube-system and serves as the cluster DNS
    resolver via resolv.conf. It provides: Service A/AAAA records (<service>.<ns>.svc.cluster.local
    → ClusterIP); headless service SRV records for StatefulSets (critical for peer-aware
    NF clusters); Pod A records; external name forwarding. For 5G NF discovery: NRF
    is accessed via its ClusterIP service DNS name; CoreDNS supplements but does not
    replace 3GPP NRF-based discovery — the NRF provides 5G-aware, capacity-weighted,
    slice-filtered NF selection (TS 29.510) that Kubernetes DNS cannot express.'
  spec: 3GPP TS 29.510
  simulator_trigger: socket_wrapper.h — CoreDNS vs NRF discovery in K8s-based simulator
  interview_context: Understanding the difference between CoreDNS and NRF discovery
    separates K8s generalists from 5G-specialist DevOps engineers
- id: q220
  domain: networking
  subdomain: tcp_ip
  tags:
  - tcp
  - ip
  level: senior
  question: What is IPv4/IPv6 dual-stack in Kubernetes and why is it relevant to 5G?
  answer: 'IPv4/IPv6 dual-stack in Kubernetes allows Pods and Services to simultaneously
    use both IPv4 and IPv6. When enabled, each Pod gets both an IPv4 and an IPv6 address;
    Services can be configured as IPv4, IPv6, or PreferDualStack via ipFamilyPolicy.
    5G relevance: 3GPP 5G specifies IPv6 support as mandatory for the N6 interface
    and the SBA. Many MNOs are deploying IPv6-only or dual-stack 5G cores to address
    IPv4 exhaustion. The NRF stores both IPv4 and IPv6 addresses in NF profiles. Understanding
    dual-stack is increasingly tested in Jio and Rakuten interviews as their networks
    are IPv6-forward.'
  spec: 3GPP TS 23.501
  simulator_trigger: socket_wrapper.h — dual-stack socket binding in simulator NF
    nodes
  interview_context: 5G mandates IPv6 for N6 and SBA; dual-stack Kubernetes is required
    for modern 5G core deployments
- id: q221
  domain: networking
  subdomain: load_balancing
  tags:
  - load-balancing
  level: engineer
  question: How do health checks work in load balancers and what happens to an unhealthy
    backend?
  answer: 'A load balancer probes backend health using TCP health checks (establish
    TCP connection), HTTP health checks (GET to /health endpoint, fail if non-2xx),
    HTTPS checks, or custom scripted checks. Thresholds: unhealthy after N consecutive
    failures, restored after M consecutive successes. During DOWN period, traffic
    routes only to healthy backends. In Kubernetes, readiness probe failures cause
    the Pod IP to be removed from the Service endpoint list. In 5G, NRF heartbeat
    (periodic PUT to /nf-instances/{nfInstanceID}) serves as the equivalent — if the
    NRF doesn''t receive a heartbeat within heartBeatTimer seconds, it marks the NF
    as SUSPENDED.'
  spec: 3GPP TS 29.510
  simulator_trigger: socket_wrapper.h — NRF heartbeat simulation in simulator NF registration
  interview_context: NRF heartbeat is the 5G health-check equivalent — understanding
    this mechanism is relevant to 5G core operations
