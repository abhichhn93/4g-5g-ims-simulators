  - 5g-auth
  - udm
  - nrf
  - suci
  level: engineer
  question: Describe the 5G Registration procedure step-by-step.
  answer: The UE sends a Registration Request (with SUCI or 5G-GUTI) to the gNB, which
    forwards an Initial UE Message to the AMF over N2/NGAP. The AMF initiates authentication
    via AUSF over N12 (SBI); AUSF contacts UDM over N13 for authentication vectors;
    5G-AKA challenge-response completes over N1 (NAS). The AMF performs NAS Security
    Mode Command activating NAS ciphering, fetches subscriber data from UDM (Nudm_SDM_Get
    over N8), optionally contacts NSSF for slice selection, and returns Registration
    Accept (with 5G-GUTI, Allowed NSSAI, TAI list); the UE confirms with Registration
    Complete.
  spec: TS 23.502 §4.2.3, TS 24.501
  simulator_trigger: 5G REG command — full 10-step flow in 5g_registration_handler.cpp
    from NGAP Initial UE to Registration Accept
  interview_context: 5G equivalent of the LTE attach walkthrough — expected at engineer
    level
- id: q138
  domain: 5g
  subdomain: architecture
  tags:
  - amf
  - 5g-auth
  - 5g-registration
  - suci
  - supi
  level: engineer
  question: What is the difference between SUPI, SUCI, 5G-GUTI, and 5G-S-TMSI?
  answer: SUPI (Subscription Permanent Identifier) is the permanent subscriber ID
    (equivalent to IMSI for 3GPP access) — never sent over the air. SUCI (Subscription
    Concealed Identifier) is an ECIES-encrypted version of the MSIN sent in initial
    registration before a 5G-GUTI is assigned. 5G-GUTI (Globally Unique Temporary
    Identifier) is a temporary ID assigned by AMF post-registration, used for all
    subsequent NAS signaling. 5G-S-TMSI is a shortened form of the 5G-GUTI used for
    paging over the radio interface to reduce air-interface overhead.
  spec: TS 23.003 §2.10, TS 33.501 §6.12
  simulator_trigger: 5G REG command — SUCI sent in first Registration Request; 5G-GUTI
    assigned in Registration Accept
  interview_context: Tests 5G identity vocabulary expected at engineer level; contrasts
    with 4G IMSI/GUTI
- id: q139
  domain: 5g
  subdomain: architecture
  tags:
  - amf
  - 5g-registration
  - tracking-area
  - mobility
  - udm
  level: senior
  question: What is the 5G Registration Update procedure (the 5G equivalent of TAU)?
  answer: In 5G, the TAU equivalent is the Registration Update (Mobility Registration
    Update). When a UE moves to a cell not in its registered TA list, it sends Registration
    Request with type Mobility Registration Update. The AMF verifies the new TAI,
    may invoke NSSF for slice availability, and if the AMF changes, contacts the old
    AMF via N14 for UE context transfer (Namf_Communication_UEContextTransfer). Unlike
    4G TAU, 5G does not need a separate session update — the AMF notifies SMF via
    SBI messaging if the UPF anchor needs to change.
  spec: TS 23.502 §4.2.4
  simulator_trigger: 5G TAU equivalent command — AMF inter-instance context transfer
    in 5g_registration_update.cpp
  interview_context: Tests 5G mobility management knowledge including the 4G-to-5G
    TAU procedure mapping
- id: q140
  domain: 5g
  subdomain: architecture
  tags:
  - udm
