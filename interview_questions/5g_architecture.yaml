  - 5g-sba
  level: engineer
  question: What is the UDM in 5G, and how does it differ from the 4G HSS?
  answer: The UDM (Unified Data Management) is the 5GC equivalent of the 4G HSS but
    architecturally separated. The UDM exposes SBI-based services (Nudm_*) whereas
    the HSS used Diameter (S6a). UDM provides AKA credential generation (via co-located
    ARPF), SUCI de-concealment (via co-located SIDF), subscriber data management,
    and serving NF registration tracking. Unlike the monolithic HSS, UDM reads/writes
    its data from a separate UDR (Unified Data Repository), making the data layer
    independently scalable.
  spec: TS 23.502 §5.2.3, TS 29.503
  simulator_trigger: 5G REG command — AMF calls Nudm_SDM_Get to UDM after authentication
    to fetch subscriber profile
  interview_context: Tests HSS-to-UDM evolution knowledge essential for 5G core network
    migration roles
