  level: engineer
  question: What are the 5G NR interfaces between gNB and 5GC? Describe N1, N2, N3,
    N4, N6, and N9.
  answer: N1 (UE ↔ AMF, NAS-5G) carries NAS signaling; N2 (gNB ↔ AMF, NGAP/SCTP) handles
    RAN-CN control (context setup, handover, paging); N3 (gNB ↔ UPF, GTP-U/UDP/IP)
    is the user-plane data path; N4 (SMF ↔ UPF, PFCP/UDP) is the UPF programming interface
    for PDRs, FARs, QERs; N6 (UPF ↔ Data Network, plain IP) connects to the internet
    or IMS; N9 (UPF ↔ UPF, GTP-U) is the inter-UPF tunnel used in home-routed roaming
    or distributed UPF deployments.
  spec: TS 23.501 §4.3
  simulator_trigger: 5G REG + PDU session commands — all six interfaces active in
    the full 5G standalone simulator topology
  interview_context: Tests 5G interface vocabulary and protocol stack knowledge at
    the engineer level
- id: q135
  domain: 5g
  subdomain: architecture
  tags:
  - smf
  - upf
  - pfcp
  - n4
  - pdu-session
  level: senior
  question: What is CP-UP separation (CUPS) in 4G and how does 5G extend this concept?
  answer: '4G introduced CUPS in Release 14 by splitting SGW and PGW into control-plane
    (SGW-C/PGW-C) and user-plane (SGW-U/PGW-U) nodes communicating via Sxb/Sxa (PFCP
    precursor) — it was an optional extension. 5G makes CP-UP separation mandatory:
    SMF is always the pure control plane and UPF is always the pure user plane, communicating
    via the standardized N4/PFCP interface (TS 29.244). This allows UPFs to be deployed
    at the network edge (MEC) without SMF co-location, enabling ultra-low latency
    while the SMF remains centralized.'
  spec: TS 23.501 §5.7, TS 29.244
  simulator_trigger: 5G PDU session command — SMF controls UPF via PFCP Session Establishment
    over N4 interface
  interview_context: Tests 4G-to-5G architectural evolution understanding relevant
    to PGW migration projects
- id: q136
  domain: 5g
  subdomain: architecture
  tags:
  - amf
  - 5g-registration
  - n2
  - ngap
  - 5g-sba
  level: engineer
  question: What is the AMF, and what are its primary responsibilities in 5G?
  answer: The AMF (Access and Mobility Management Function) is the primary NAS termination
    point for the UE, handling all control-plane signaling from UE and gNB. Its responsibilities
    include UE registration and deregistration, NAS security (ciphering and integrity),
    mobility management (handover, tracking area updates, paging), SMF selection for
    PDU session setup, acting as SEAF for UE authentication, and relaying N2 (NGAP)
    messages between gNB and other NFs. The AMF maintains UE context including the
    GUAMI and 5G-GUTI.
  spec: TS 23.501 §6.2.1
  simulator_trigger: 5G REG command — amf_node.cpp is the primary 5G control-plane
    orchestrator
  interview_context: Foundational 5G AMF role question expected at beginner-to-engineer
    level
- id: q137
  domain: 5g
