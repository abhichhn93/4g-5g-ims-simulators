  level: engineer
  question: What is the Service-Based Architecture (SBA) in 5G Core, and how does
    it differ from 4G EPC?
  answer: In 4G EPC, NFs communicate over fixed bilateral reference points (S11, S6a,
    Gx) where each pair has a dedicated bespoke interface. In 5G SBA, every NF exposes
    RESTful services over HTTP/2 (the SBI), so any authorized NF can discover and
    consume any other NF's service via the NRF without bilateral configuration. This
    makes the 5GC modular and loosely coupled — NFs can scale independently, deploy
    as containers, and upgrade without re-wiring every peer. The SBI uses JSON-encoded
    OpenAPI 3.0 specifications from the TS 29.5xx series.
  spec: TS 23.501 §4.2, TS 29.500
  simulator_trigger: 5G REG command — AMF calls AUSF over HTTP/2 SBI instead of Diameter
    used in 4G ATTACH
  interview_context: Foundational 5G architecture question expected at beginner-to-engineer
    level in any 5GC role
