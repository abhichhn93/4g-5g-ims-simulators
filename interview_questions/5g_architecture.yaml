  level: beginner
  question: List the core Network Functions in the 5G Core and briefly describe each.
  answer: 'Key 5GC NFs include: AMF (Access and Mobility Management — NAS termination,
    registration, SEAF), SMF (Session Management — PDU session lifecycle, UPF control
    via PFCP), UPF (User Plane — packet forwarding, GTP-U, N3/N4/N6), UDM (Subscriber
    data, AKA credentials, SUCI de-concealment), AUSF (Authentication Server — 5G-AKA
    in HPLMN), PCF (Policy — PCC rules, replaces PCRF), NRF (NF registry and discovery),
    NSSF (Slice Selection), NEF (Network Exposure), UDR (Structured data store for
    UDM/PCF/NEF), and SEPP (Inter-PLMN roaming security proxy).'
  spec: TS 23.501 §6
  simulator_trigger: 5G REG command — simulator instantiates AMF, SMF, UPF, UDM, AUSF,
    NRF nodes for 5G standalone flow
  interview_context: Entry-level 5GC NF survey question — every candidate at any level
    should know this list
- id: q133
  domain: 5g
  subdomain: architecture
  tags:
  - 5g-sba
  - sbi
  - http2
  level: engineer
  question: What is the SBI (Service-Based Interface)? What protocols does it use?
  answer: 'The SBI is the common communication bus used by all 5GC NFs for control-plane
    interactions, using HTTP/2 as transport (replacing Diameter and GTP-C from 4G),
    TLS 1.2/1.3 for security, and JSON encoding. API definitions follow OpenAPI 3.0,
    published by 3GPP in the TS 29.5xx series. Operations follow REST semantics: GET
    for retrieval (NF discovery), POST for create/invoke (session creation), PUT/PATCH
    for update, DELETE for removal.'
  spec: TS 29.500, TS 29.501
  simulator_trigger: 5G REG command — HTTP/2 POST to AMF, GET to NRF for NF discovery,
    visible in http2_trace.log
  interview_context: Tests SBI protocol knowledge needed for 5GC NF interface development
    and debugging
