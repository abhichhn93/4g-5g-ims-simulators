  - 4g-auth
  - 4g-bearer
  level: engineer
  question: What are the key functions of the MME in LTE EPC?
  answer: 'The MME is the primary control-plane node in EPC handling: NAS termination
    (registration, authentication, attach/detach, TAU, paging); authentication and
    security (EPS-AKA via S6a, K_eNB distribution); mobility management (UE state,
    handovers, SGW/PGW selection); bearer management (EPS bearer establishment via
    S11); and session management (PDN connections, UE IP address). The MME is on the
    control plane only — no user data flows through it.'
  spec: TS 23.401 §4.6.2
  simulator_trigger: 4G ATTACH command — mme_node.cpp is the central orchestrator
    for all EPC control-plane flows
  interview_context: Baseline EPC node role question expected at entry-to-mid level
- id: q079
  domain: 4g
  subdomain: handover
  tags:
  - sgw
  - gtpv2
  - teid
  - 4g-handover
  level: engineer
  question: What are the key functions of the SGW in LTE?
  answer: The SGW is the user-plane anchor for intra-LTE mobility and the control-plane
    relay for session management. Its functions include user-plane routing (forwarding
    user data between eNodeB via S1-U GTP-U and PGW via S5/S8 GTP-U), mobility anchoring
    during X2 handover path switches, downlink buffering for idle UEs triggering paging,
    DSCP packet marking based on QCI, and lawful intercept. The SGW holds both S11
    (GTPv2-C from MME) and S1-U (GTP-U to eNB) — it is a cross-layer node.
  spec: TS 23.401 §4.6.3
  simulator_trigger: 4G ATTACH command — sgw_node.cpp relays GTPv2-C between MME and
    PGW, manages GTP-U tunnels to eNB
  interview_context: Tests SGW-specific function knowledge — commonly confused with
    PGW in interviews
- id: q080
  domain: 4g
  subdomain: handover
  tags:
  - pgw
  - gtpv2
  - gx
  - 4g-bearer
  - qci
  level: engineer
  question: What are the key functions of the PGW in LTE?
  answer: The PGW is the anchor between EPC and external PDNs. Key functions include
    IP address allocation (per APN), PCEF — enforcing PCC rules from PCRF via Gx (QoS,
    charging, flow gating), deep packet inspection for service detection, charging
    interfaces to OCS (Gy) and CDF (Rf), SGi interface to the external PDN, and UE
    IP mobility anchor across SGW changes. In 5G, PGW-C evolves to SMF and PGW-U to
    UPF.
  spec: TS 23.401 §4.6.3
  simulator_trigger: 4G ATTACH command — pgw_node.cpp allocates UE IP, applies QoS
    via Gx, establishes S5/S8 GTP-U tunnel
  interview_context: Tests PGW function knowledge; the PGW-to-SMF/UPF evolution is
    a key 5G mapping question
- id: q081
  domain: 4g
  subdomain: handover
  tags:
  - pcrf
  - gx
  - rx-interface
  - ims-epc
  - qci
  level: senior
  question: What is the PCRF and how does it interact with the PGW and IMS?
  answer: The PCRF makes QoS and charging policy decisions for EPC and IMS, providing
    PCC rules (flow descriptions, QCI, ARP, GBR/MBR, charging parameters). It interacts
    with the PGW via Gx for initial and updated PCC rules per PDN session; with the
    P-CSCF via Rx, which provides application-level media parameters from SDP to derive
    dedicated bearer requirements (e.g., triggering QCI=1 for VoLTE); and with the
    HSS/SPR for subscriber policy profiles. The PCRF is the policy bridge between
    IMS session management and EPC bearer management.
  spec: TS 23.203, TS 29.212, TS 29.214
  simulator_trigger: CALL command — PCRF receives Rx AAR from P-CSCF and pushes Gx
    RAR to PGW for QCI=1 bearer
  interview_context: Tests the critical P-CSCF/PCRF/PGW interaction chain in VoLTE
    call bearer setup
