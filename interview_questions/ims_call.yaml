  level: senior
  question: Walk through the VoLTE Mobile Originated call setup procedure from SIP
    to QCI=1 bearer establishment.
  answer: UE-A sends SIP INVITE (with SDP offer) to P-CSCF-A, which forwards through
    S-CSCF-A (invoking MTAS for call features) to the terminating side; UE-B responds
    with 183 Session Progress containing an SDP answer. The P-CSCF on the terminating
    side sends Rx AAR (with media parameters from SDP) to PCRF, which creates a QCI=1
    PCC rule and pushes it to PGW via Gx RAR, triggering GTPv2 Create Bearer Request
    through SGW → MME → eNB → UE for dedicated bearer establishment. QoS preconditions
    are confirmed, UE-B answers with 200 OK, and RTP voice flows over the QCI=1 GTP-U
    tunnel; a SIP BYE releases both the session and the QCI=1 bearer.
  spec: TS 23.228, TS 24.229, TS 29.214, TS 23.203
  simulator_trigger: CALL command — end-to-end VoLTE flow from SIP INVITE through
    Rx/Gx to GTPv2 dedicated bearer
  interview_context: End-to-end VoLTE architecture question combining SIP, IMS, PCRF,
    and EPC bearer knowledge
- id: q101
  domain: ims
  subdomain: call_setup
  tags:
  - volte-call
  - sdp
  - sip-invite
  level: engineer
  question: What is the SDP offer/answer model and what is its role in VoLTE codec
    negotiation?
  answer: SDP (Session Description Protocol, RFC 4566) describes media sessions. In
    VoLTE, the SIP INVITE carries an SDP offer from the originating UE listing supported
    codecs (payload types), media IP address, UDP port for RTP, and bandwidth. The
    terminating UE responds with an SDP answer in the 183/200 OK, selecting one codec
    and providing its own IP/port for the reverse RTP stream. Key parameters include
    a=rtpmap (codec/rate), a=fmtp (codec parameters), a=ptime (packetization time,
    e.g., 20ms for AMR-WB), and a=curr:qos / a=des:qos for QoS preconditions.
  spec: TS 24.229, RFC 4566, RFC 3264, GSMA IR.92
  simulator_trigger: CALL command — SDP offer/answer exchange in sip_sdp_handler.cpp
    driving codec and media IP negotiation
  interview_context: Tests SDP offer/answer understanding needed for VoLTE codec selection
    and bearer TFT configuration
- id: q102
  domain: ims
  subdomain: call_setup
  tags:
  - rx-interface
  - qci1
  - volte-bearer
  - ims-epc
  - p-cscf
  level: senior
  question: What is the role of the Rx interface in VoLTE call setup?
  answer: The Rx interface connects the P-CSCF (acting as an AF) to the PCRF, using
    Diameter (App-ID 16777236). After receiving the SDP answer, the P-CSCF extracts
    media parameters and sends an AA-Request (AAR) to the PCRF with service information
    (media type, bandwidth, flow descriptions). The PCRF creates a PCC rule for a
    QCI=1 GBR dedicated bearer and pushes it to the PGW via Gx RAR. The Rx↔Gx interaction
    is the bridge between IMS session management and EPC bearer management — ensuring
    a voice bearer is only created when an active IMS session justifies it.
  spec: TS 29.214, TS 23.203
  simulator_trigger: CALL command — Rx AAR from P-CSCF to PCRF in rx_client.cpp after
    SDP answer received
  interview_context: Tests understanding of the Rx/Gx bridge — the most commonly misunderstood
    interaction in VoLTE
- id: q103
  domain: ims
  subdomain: call_setup
  tags:
  - volte-call
  - sip
  - sip-invite
  level: senior
  question: What are early and late ringing modes in VoLTE, and what is a ghost ring?
  answer: In early ringing mode, 180 Ringing is sent before the QCI=1 bearer is established
    on the originating side; if bearer setup subsequently fails, the phone rang but
    the call never connected — this is a ghost ring. In late ringing (precondition
    mode per RFC 3312), 180 Ringing is only sent after QCI=1 bearers on both sides
    are confirmed established. Late ringing is more reliable but has slightly higher
    call setup time; GSMA IR.92 recommends precondition mode with a target of ≤4 seconds
    call setup time.
  spec: TS 24.229, RFC 3312, GSMA IR.92
  simulator_trigger: CALL command — simulator configures early_ringing=true to test
    ghost ring detection in call_setup_handler.cpp
  interview_context: Tests VoLTE call setup quality understanding relevant to IMS
    troubleshooting and IR.92 compliance
- id: q104
  domain: ims
  subdomain: call_setup
  tags:
  - ims-epc
