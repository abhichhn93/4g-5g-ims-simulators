  level: engineer
  question: What are the key functions of the MME in LTE EPC?
  answer: 'The MME is the primary control-plane node in EPC handling: NAS termination
    (registration, authentication, attach/detach, TAU, paging); authentication and
    security (EPS-AKA via S6a, K_eNB distribution); mobility management (UE state,
    handovers, SGW/PGW selection); bearer management (EPS bearer establishment via
    S11); and session management (PDN connections, UE IP address). The MME is on the
    control plane only — no user data flows through it.'
  spec: TS 23.401 §4.6.2
  simulator_trigger: 4G ATTACH command — mme_node.cpp is the central orchestrator
    for all EPC control-plane flows
  interview_context: Baseline EPC node role question expected at entry-to-mid level
- id: q079
  domain: 4g
  subdomain: nodes
  tags:
  - sgw
  - gtpv2
  - teid
  - 4g-handover
  level: engineer
  question: What are the key functions of the SGW in LTE?
  answer: The SGW is the user-plane anchor for intra-LTE mobility and the control-plane
    relay for session management. Its functions include user-plane routing (forwarding
    user data between eNodeB via S1-U GTP-U and PGW via S5/S8 GTP-U), mobility anchoring
    during X2 handover path switches, downlink buffering for idle UEs triggering paging,
    DSCP packet marking based on QCI, and lawful intercept. The SGW holds both S11
    (GTPv2-C from MME) and S1-U (GTP-U to eNB) — it is a cross-layer node.
  spec: TS 23.401 §4.6.3
  simulator_trigger: 4G ATTACH command — sgw_node.cpp relays GTPv2-C between MME and
    PGW, manages GTP-U tunnels to eNB
  interview_context: Tests SGW-specific function knowledge — commonly confused with
    PGW in interviews
- id: q080
  domain: 4g
