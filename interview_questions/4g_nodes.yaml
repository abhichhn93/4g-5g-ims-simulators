  level: senior
  question: What is a TEID and how is it used in GTP tunnels?
  answer: 'A TEID (Tunnel Endpoint Identifier) is a 32-bit value that uniquely identifies
    a GTP tunnel endpoint at a given node. When Node A sends a GTP packet to Node
    B, it uses Node B''s TEID in the header — this tells Node B which tunnel the packet
    belongs to for demultiplexing. TEIDs are locally significant to the assigning
    node. For each EPS bearer there is a chain of GTP-U TEIDs: eNB↔SGW (S1-U) and
    SGW↔PGW (S5/S8); GTPv2-C also uses TEIDs to match requests/responses. Nodes exchange
    TEIDs in Create Session Request/Response.'
  spec: TS 29.274 §5.1, TS 29.281
  simulator_trigger: 4G ATTACH command — TEID allocation and exchange logged in gtpv2_session_manager.cpp
  interview_context: Tests GTP tunnel endpoint identification knowledge — fundamental
    for bearer path debugging
- id: q084
  domain: 4g
  subdomain: nodes
  tags:
  - gtpv2
  - teid
