  level: senior
  question: What is the PCRF and how does it interact with the PGW and IMS?
  answer: The PCRF makes QoS and charging policy decisions for EPC and IMS, providing
    PCC rules (flow descriptions, QCI, ARP, GBR/MBR, charging parameters). It interacts
    with the PGW via Gx for initial and updated PCC rules per PDN session; with the
    P-CSCF via Rx, which provides application-level media parameters from SDP to derive
    dedicated bearer requirements (e.g., triggering QCI=1 for VoLTE); and with the
    HSS/SPR for subscriber policy profiles. The PCRF is the policy bridge between
    IMS session management and EPC bearer management.
  spec: TS 23.203, TS 29.212, TS 29.214
  simulator_trigger: CALL command — PCRF receives Rx AAR from P-CSCF and pushes Gx
    RAR to PGW for QCI=1 bearer
  interview_context: Tests the critical P-CSCF/PCRF/PGW interaction chain in VoLTE
    call bearer setup
- id: q082
  domain: 4g
  subdomain: nodes
  tags:
  - hss
