  - pgw
  - sgw
  - mme
  level: senior
  question: What GTPv2-C messages are used to establish, modify, and release a dedicated
    EPS bearer?
  answer: For dedicated bearer establishment, the PCRF sends PCC rules to PGW via
    Gx RAR; the PGW sends Create Bearer Request (GTPv2) to SGW then MME, which configures
    the radio bearer. For modification, the PGW sends Update Bearer Request chain
    through SGW to MME, which updates radio and responds. For release, the PGW initiates
    Delete Bearer Request chain (network-initiated), or the UE requests via NAS Bearer
    Resource Modification Request resulting in a Delete Bearer Request from PGW; PCRF
    is notified of the final outcome via Gx.
  spec: TS 23.401 §5.4.2, TS 29.274
  simulator_trigger: CALL command — dedicated bearer (QCI=1) Create Bearer Request
    chain from PGW through SGW to MME to eNB
  interview_context: Tests end-to-end dedicated bearer lifecycle knowledge combining
    GTPv2, PCRF, and IMS interactions
- id: q085
  domain: 4g
  subdomain: nodes
  tags:
  - gtpv2
  - teid
  - sgw
