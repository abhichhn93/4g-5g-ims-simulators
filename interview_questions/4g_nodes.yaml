  - mme
  level: senior
  question: What is GTP echo and why is it important in LTE?
  answer: GTP Echo Request/Response is a keep-alive mechanism used on GTPv2-C and
    GTP-U interfaces to verify that remote GTP peers are alive and tunnels are functional.
    If no response is received within timeout and retry count, the tunnel is considered
    failed and recovery procedures trigger. Critically, the Echo Response carries
    a Restart Counter — if a peer has restarted, its counter will have changed, alerting
    the sending node to clear stale tunnel state and re-establish sessions, preventing
    stale GTP contexts after node failures.
  spec: TS 29.274 §7.2.1, TS 29.281
  simulator_trigger: Simulator node restart — GTP echo restart counter change triggers
    stale context cleanup in gtp_peer_manager.cpp
  interview_context: Tests fault-detection mechanism knowledge needed for simulator
    resilience and CHAOS testing
- id: q086
  domain: 4g
