  level: engineer
  question: What are the key functions of the HSS in LTE?
  answer: 'The HSS is the master subscriber database for EPS and IMS. EPS functions
    include: storing IMSI, MSISDN, authentication keys (K), and subscription profiles;
    generating EPS authentication vectors (via S6a); tracking UE''s current MME registration;
    and initiating Cancel Location on MME change. IMS functions include: storing IMPI,
    IMPU, and iFC (initial filter criteria) for service routing; providing IMS-AKA
    authentication vectors to S-CSCF via Cx; and tracking S-CSCF assignment. The HSS
    may integrate SLF for multi-HSS deployments.'
  spec: TS 23.002, TS 29.272, TS 29.228
  simulator_trigger: 4G ATTACH command — hss_simulator.cpp responds to Diameter AIR,
    ULR; IMS REGISTER — responds to Cx MAR, SAR
  interview_context: Tests HSS dual-role knowledge (EPC and IMS) expected at senior
    level in network function development
- id: q083
