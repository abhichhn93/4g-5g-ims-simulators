  level: engineer
  question: What is the difference between ECM-IDLE and ECM-CONNECTED states in LTE,
    and what transitions them?
  answer: ECM-IDLE (EPS Connection Management Idle) means the UE has no S1 signaling
    connection — bearers are suspended and the UE is reachable only via paging. ECM-CONNECTED
    means an active S1 signaling connection exists between UE, eNodeB, and MME — user
    data can flow and bearers are active. The UE moves from IDLE to CONNECTED when
    it sends a Service Request (triggered by uplink data or network paging); it moves
    back to IDLE after an inactivity timer expires and the network releases the RRC
    connection via S1 UE Context Release.
  spec: TS 23.401 §5.3.5
  simulator_trigger: 4G ATTACH command — UE transitions to ECM-CONNECTED; idle timer
    expiry triggers ECM-IDLE and S1 release
  interview_context: Tests UE state machine knowledge fundamental to understanding
    paging, power saving, and data session management
- id: q090
  domain: 4g
  subdomain: nodes
  tags:
  - s1-mme
  - mme
  - nas
  - emm
  level: engineer
  question: What is a Tracking Area List (TAI List) and why does the MME assign multiple
    TAs to a UE?
  answer: 'A Tracking Area List (TAI list) is a set of Tracking Area Identities (TAIs)
    assigned by the MME to the UE in the Attach Accept and TAU Accept messages. Instead
    of requiring a TAU every time the UE moves to an adjacent cell in a neighboring
    TA, the UE only triggers a TAU when it enters a TA not on its list — reducing
    TAU signaling load. The MME balances TAI list size: too small causes frequent
    TAUs under mobility; too large increases paging overhead since the network must
    page in all TAs of the list simultaneously.'
  spec: TS 23.401 §5.3.3
  simulator_trigger: 4G ATTACH command completion — TAI list assigned in Attach Accept
    message by mme_node.cpp
  interview_context: Tests network-level mobility optimization trade-offs important
    for MME dimensioning roles
- id: q091
  domain: 4g
  subdomain: nodes
  tags:
  - mme
  - nas
  - emm
  - 4g-attach
  level: engineer
  question: What is the difference between EMM (EPS Mobility Management) and ESM (EPS
    Session Management) sub-layers in NAS?
  answer: 'NAS in LTE has two sub-layers: EMM (EPS Mobility Management) handles UE
    registration, authentication, attach/detach, TAU, paging, and ECM/EMM state machines
    — these are UE-level procedures. ESM (EPS Session Management) handles PDN connection
    establishment, default and dedicated EPS bearer setup, modification, and release
    — these are bearer-level procedures and can run in parallel for different PDN
    connections. Both sub-layers use the same NAS message transport over S1-MME but
    have separate message types and states.'
  spec: TS 24.301
  simulator_trigger: 4G ATTACH command — simultaneous EMM Attach and ESM PDN Connectivity
    procedures inside the same NAS exchange
  interview_context: Tests understanding of NAS sublayer separation often misunderstood
    by junior 4G engineers
- id: q092
  domain: 4g
  subdomain: nodes
  tags:
  - 4g-bearer
  - pgw
  - mme
  - gtpv2
  level: engineer
  question: What is a TFT (Traffic Flow Template) and what role does it play in bearer
    selection?
  answer: A TFT (Traffic Flow Template) is a set of packet filter rules that maps
    IP flows to an EPS bearer based on the 5-tuple (source/destination IP, port, protocol)
    or 6-tuple (including ToS/DSCP). For dedicated bearers, TFTs ensure that specific
    flows (e.g., RTP voice to a specific destination port range) are mapped to the
    QCI=1 bearer instead of the default QCI=9 bearer. TFTs are provisioned by the
    PGW and programmed in the UE; in VoLTE, the IMS address/port of the media stream
    is used as the TFT filter.
  spec: TS 23.401 §5.4.2, TS 24.301
  simulator_trigger: CALL command — QCI=1 dedicated bearer TFT matching RTP 5-tuple
    from SDP answer in bearer_tft_manager.cpp
  interview_context: Tests traffic classification knowledge needed for debugging why
    voice traffic falls to the wrong bearer
- id: q093
  domain: 4g
  subdomain: nodes
  tags:
  - diameter
  - s6a
  - hss
  - mme
  level: senior
  question: What is the difference between HSS-initiated and MME-initiated procedures
    on the S6a interface?
  answer: MME-initiated procedures include AIR/AIA (fetching auth vectors during attach),
    ULR/ULA (registering UE location and obtaining subscriber data), PUR/PUA (purging
    UE after detach), and NOR/NOA (notifying HSS of UE status changes). HSS-initiated
    procedures include CLR/CLA (Cancel Location — HSS deregisters UE from an MME when
    the UE registers at a new MME), IDR/IDA (Insert-Subscriber-Data — HSS pushes updated
    subscription data to the MME mid-session), and DSR/DSA (Delete-Subscriber-Data).
    Understanding the direction is critical for correct S6a interface implementation.
  spec: TS 29.272
  simulator_trigger: Inter-MME TAU — HSS sends CLR to old MME simulator after new
    MME sends ULR in s6a_server.cpp
  interview_context: Tests bidirectional S6a interface knowledge including rarely-discussed
    HSS-initiated flows
- id: q094
  domain: 4g
  subdomain: nodes
  tags:
  - pgw
  - gx
  - pcrf
  - 4g-bearer
  level: senior
  question: What is the SGi interface, and what protocols can it carry?
  answer: The SGi interface connects the PGW to external Packet Data Networks (PDN)
    — the internet, IMS core, or enterprise networks. It is a plain IP interface without
    GTP encapsulation. For internet APN, it carries standard IPv4/IPv6 traffic to
    the internet. For IMS APN, it carries SIP/RTP traffic to the IMS P-CSCF (the PGW
    is connected to the IMS core IP network). The PGW can also apply NAT on SGi for
    IPv4 subscribers behind private addresses, and perform DPI to detect applications
    for policy enforcement.
  spec: TS 23.401 §4.6.3
  simulator_trigger: 4G ATTACH command — PGW SGi interface simulator connecting to
    internet and IMS network simulators
  interview_context: Tests interface boundary knowledge at the PGW — an often-overlooked
    interface in EPC troubleshooting
- id: q095
  domain: 4g
  subdomain: nodes
  tags:
  - 4g-bearer
  - qci
  - ims-epc
  - volte-bearer
  - pgw
  level: senior
  question: What is the difference between UE-initiated and network-initiated dedicated
    bearer establishment?
  answer: In network-initiated dedicated bearer establishment, the PCRF pushes a PCC
    rule to the PGW via Gx RAR (typically triggered by the P-CSCF via Rx during VoLTE
    call setup); the PGW sends Create Bearer Request through SGW to MME without any
    UE request. In UE-initiated dedicated bearer establishment, the UE sends a NAS
    Bearer Resource Allocation Request to the MME requesting a new bearer with specific
    QoS/TFT parameters; the MME validates it against the subscription, contacts the
    PCRF via PGW, and only if the PCRF authorizes does the network proceed to create
    the bearer. Network-initiated is the standard VoLTE path; UE-initiated is used
    for certain enterprise services.
  spec: TS 23.401 §5.4.1, §5.4.2, TS 24.301
  simulator_trigger: CALL command — network-initiated QCI=1 bearer via Gx/Rx chain;
    test scenarios with UE-initiated bearer requests
  interview_context: Tests understanding of the two-path dedicated bearer creation
    model needed for VoLTE and enterprise APN roles
