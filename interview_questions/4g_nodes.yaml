  level: senior
  question: What are AVPs in Diameter and how are they structured?
  answer: AVPs (Attribute-Value Pairs) are the fundamental data units in Diameter
    messages. Each AVP has a 32-bit AVP Code, an AVP Flags byte (M-bit mandates rejection
    if unrecognized, V-bit indicates vendor-specific), a 24-bit AVP Length, an optional
    32-bit Vendor-ID (3GPP uses 10415), and variable-length data padded to a 4-byte
    boundary. AVPs can be grouped to contain nested AVPs, enabling complex structures.
    Key examples include User-Name (AVP 1 = IMSI), Session-Id (263), and Auth-Application-Id
    (258).
  spec: RFC 6733, TS 29.272
  simulator_trigger: 4G ATTACH command — Diameter AIR message decoded in diameter_codec.cpp
    showing AVP structure
  interview_context: Tests Diameter protocol encoding knowledge needed for AVP-level
    message debugging in the simulator
- id: q087
  domain: 4g
  subdomain: nodes
  tags:
  - diameter
  - avp
  - command-code
