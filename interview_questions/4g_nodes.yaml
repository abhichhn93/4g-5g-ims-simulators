  level: engineer
  question: What are the key functions of the PGW in LTE?
  answer: The PGW is the anchor between EPC and external PDNs. Key functions include
    IP address allocation (per APN), PCEF — enforcing PCC rules from PCRF via Gx (QoS,
    charging, flow gating), deep packet inspection for service detection, charging
    interfaces to OCS (Gy) and CDF (Rf), SGi interface to the external PDN, and UE
    IP mobility anchor across SGW changes. In 5G, PGW-C evolves to SMF and PGW-U to
    UPF.
  spec: TS 23.401 §4.6.3
  simulator_trigger: 4G ATTACH command — pgw_node.cpp allocates UE IP, applies QoS
    via Gx, establishes S5/S8 GTP-U tunnel
  interview_context: Tests PGW function knowledge; the PGW-to-SMF/UPF evolution is
    a key 5G mapping question
- id: q081
  domain: 4g
