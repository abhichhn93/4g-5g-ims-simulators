  level: engineer
  question: What is the SMF in 5G, and what are its key responsibilities?
  answer: The SMF (Session Management Function) manages the full lifecycle of PDU
    sessions from establishment through modification to release. Its responsibilities
    include selecting and controlling UPF(s) via N4/PFCP; fetching SM subscription
    data from UDM; obtaining PCC rules from PCF; orchestrating GTP-U tunnel endpoint
    assignments between gNB and UPF; UE IP address allocation; enforcing QoS via QER
    installation in UPF; and SSC mode management. The SMF corresponds to 4G's SGW-C
    + PGW-C combined, but exposes services via RESTful SBI (Nsmf_PDUSession).
  spec: TS 23.501 §6.2.2, TS 23.502 §4.3
  simulator_trigger: 5G PDU session command — smf_node.cpp orchestrates PFCP, UDM,
    PCF, and NGAP interactions for session setup
  interview_context: Core SMF role question expected at engineer level in any 5GC
    development role
- id: q144
  domain: 5g
