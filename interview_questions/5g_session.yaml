  - suci
  level: senior
  question: Describe the complete 5G-AKA procedure. What is HXRES* and why does it
    exist?
  answer: After receiving SUCI, SEAF asks AUSF, which asks UDM/ARPF for a 5G HE AV
    (RAND, AUTN, XRES*, K_AUSF). AUSF computes HXRES* = SHA-256(XRES* || RAND) and
    sends the 5G SE AV (RAND, AUTN, HXRES*) to SEAF, keeping XRES* hidden from the
    serving network. When the UE responds with RES*, SEAF computes HRES* = SHA-256(RES*
    || RAND) and verifies it equals HXRES* — confirming serving-network-level success
    — then forwards RES* to AUSF for home-network-level verification against XRES*.
    This two-step confirmation prevents a rogue serving network from falsely claiming
    authentication success, because the home network always performs final XRES* verification.
  spec: TS 33.501 §6.1.3
  simulator_trigger: REG command steps 3–5 — Authentication challenge/response between
    AMF/AUSF/UDM
  interview_context: Tests depth of 5G security architecture; the dual-confirmation
    design is a popular senior interview point
- id: q155
  domain: 5g
  subdomain: session
  tags:
  - key-hierarchy
  - 5g-aka
  - 5g-auth
  - amf
  - ausf
  level: senior
  question: Explain the 5G key hierarchy from root key K down to NAS and AS session
    keys.
  answer: The root key K in the USIM generates K_AUSF via 5G-AKA (or via EAP-AKA'
    using CK'/IK'), from which K_SEAF is derived bound to the serving network name,
    and then K_AMF is derived bound to ngKSI and the ABBA anti-bidding-down parameter.
    From K_AMF the NAS keys K_NASenc and K_NASint are derived, and K_gNB is derived
    for the RAN, from which K_RRCenc/K_RRCint and K_UPenc/K_UPint are further derived
    at the gNB. Each layer of binding (SN-name into K_SEAF, ABBA into K_AMF) prevents
    a compromised node at one layer from impersonating another network or downgrading
    to weaker security. All root keys are 256-bit; algorithms use the 128 least-significant
    bits.
  spec: TS 33.501 §A.2, §A.7, §A.8
  simulator_trigger: REG command step 6 — NAS Security Mode Command issued by AMF
  interview_context: Architect-level question on key derivation; tests ability to
    trace a security breach impact across the hierarchy
- id: q156
  domain: 5g
  subdomain: session
  tags:
  - amf
  - ngap
  - n2
