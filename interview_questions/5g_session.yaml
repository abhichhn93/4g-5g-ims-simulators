  level: senior
  question: What is the SEPP, and why was it needed in 5G roaming?
  answer: The Security Edge Protection Proxy (SEPP) sits at the PLMN boundary and
    secures all inter-PLMN HTTP/2 control-plane signaling in roaming scenarios. In
    4G, inter-PLMN Diameter messages traversed IPX networks without application-layer
    security, allowing IPX providers to read or modify all signaling — enabling SS7/Diameter
    attacks. In 5G the SEPP provides topology hiding (concealing internal NF addresses),
    message filtering, and cryptographic protection via TLS (N32-c negotiation) or
    PRINS (N32-f with IPX providers). Every inter-PLMN SBI request passes through
    both a vSEPP in the visited PLMN and an hSEPP in the home PLMN.
  spec: TS 33.501 §13, TS 29.573
  simulator_trigger: ROAM command — vSEPP/hSEPP PRINS message exchange on N32-f between
    VPLMN and HPLMN
  interview_context: Tests 5G roaming security design; asked at Nokia/Ericsson for
    network security architecture roles
- id: q159
  domain: 5g
  subdomain: session
  tags:
  - 5g-sba
  - nf-services
  - http2
  - smf
  - upf
  level: senior
  question: What is the difference between Home-Routed and Local Breakout roaming
    in 5G?
  answer: In Home-Routed roaming, user-plane traffic flows from the UE through a V-UPF
    to an N9 GTP-U tunnel ending at the H-UPF, and session management is handled by
    an H-SMF in the home PLMN — all internet traffic is backhauled to the home PLMN,
    adding latency. In Local Breakout, the V-SMF manages the PDU session and a V-UPF
    anchors the session in the visited PLMN, so internet traffic exits locally without
    backhaul — lower latency but more complex inter-PLMN charging. Home-routed is
    mandatory for IMS/VoNR because the IMS core is anchored in the HPLMN. Local Breakout
    is technically defined but operationally rare in early 5G deployments due to charging
    and policy complexity.
  spec: TS 23.501 §5.17, GSMA NG.113
  simulator_trigger: ROAM command — SMF selection shows H-SMF (home-routed) vs V-SMF
    (LBO) path
  interview_context: Tests roaming architecture trade-offs; asked for IMS and core
    engineering roles at major vendors
- id: q160
  domain: 5g
  subdomain: session
  tags:
  - 5g-sba
  - http2
  level: senior
  question: What is the difference between N32-c and N32-f sub-interfaces of the SEPP?
  answer: N32-c is a short-lived control sub-interface used for security capability
    negotiation between two SEPPs — they exchange supported security mechanisms (TLS-only
    or PRINS), PLMN IDs, and N32-f forwarding parameters over mutual TLS. N32-f is
    the long-lived forwarding sub-interface that carries actual NF service HTTP/2
    messages between the VPLMN and HPLMN. When an IPX provider sits in the path, PRINS
    (Protocol for N32 Interconnect Security) is used on N32-f, applying JOSE-based
    application-layer signatures so SEPPs can cryptographically verify which modifications
    an IPX provider is permitted to make. Without PRINS, end-to-end TLS between SEPPs
    is used and IPX providers remain transparent.
  spec: TS 29.573 §4.2 and §6.2, TS 33.501 §13.2
  simulator_trigger: ROAM command — N32-c handshake log showing PRINS capability negotiation
  interview_context: Architect-level test on inter-PLMN security protocol details
