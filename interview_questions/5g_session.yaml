  level: engineer
  question: What is SUPI, and why was SUCI introduced in 5G?
  answer: SUPI (Subscription Permanent Identifier) is the 5G successor to 4G IMSI
    — a permanent, globally unique subscriber identifier stored in the USIM and used
    internally by the 5GC, never transmitted over the air. 5G introduced SUCI (Subscription
    Concealed Identifier) as the ECIES-encrypted form of the MSIN component of SUPI,
    so any over-the-air Registration Request reveals only an ephemeral ciphertext
    rather than the real identity. This directly eliminates the IMSI-catcher (Stingray)
    attack vector that plagued 2G–4G networks. Only the SIDF function within UDM holds
    the Home Network private key and can decrypt SUCI back to SUPI.
  spec: TS 23.003 §2.10.1, TS 33.501 §5.2.5 and §6.12
  simulator_trigger: REG command step 1 — SUCI sent by gNB to AMF in Initial UE Message
  interview_context: Tests understanding of subscriber privacy — a key 5G security
    improvement over 4G
- id: q153
  domain: 5g
  subdomain: session
  tags:
  - suci
  - ecies
  - 5g-auth
  - udm
  - key-hierarchy
  level: senior
  question: Describe how SUCI is constructed from SUPI using ECIES. What are the cryptographic
    steps?
  answer: The USIM generates a fresh ephemeral ECC key pair for each SUCI, computes
    a shared secret with the Home Network's provisioned public key (Curve25519 or
    secp256r1), then derives an encryption key and MAC key from the shared secret
    using ANSI-X9.63-KDF. The MSIN portion of SUPI is encrypted with AES-128-CTR and
    a MAC is appended; MCC and MNC remain in cleartext for routing. The resulting
    SUCI bundles the ephemeral public key, ciphertext, MAC tag, protection scheme
    ID, and routing indicator. Only SIDF inside UDM, holding the Home Network private
    key, can invert this ECIES operation and recover the original SUPI.
  spec: TS 33.501 Annex C.3
  simulator_trigger: REG command step 1 — SUCI construction in UE USIM module
  interview_context: Tests cryptographic depth for senior security engineers; commonly
    asked at Qualcomm, Ericsson, Nokia
- id: q154
  domain: 5g
  subdomain: session
  tags:
  - 5g-aka
  - ausf
  - udm
  - 5g-auth
