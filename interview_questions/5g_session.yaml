  level: engineer
  question: What is the NRF in 5G, and what services does it provide?
  answer: The NRF (Network Repository Function) is the service registry and discovery
    broker for the 5GC. NFs register their NF Profile (type, instance ID, PLMN ID,
    supported services, capacity, IP/FQDN) at startup. When an NF consumer needs a
    service, it sends Nnrf_NFDiscovery_Request specifying target NF type and optional
    S-NSSAI/DNN filters; NRF returns matching NF instances. The NRF also supports
    subscription notifications — NFs subscribe to topology change events without polling.
    In slicing deployments, multiple NRFs may be hierarchically deployed at PLMN,
    shared-slice, and slice-specific levels.
  spec: TS 23.501 §6.2.6, TS 29.510
  simulator_trigger: 5G REG command — all NF registrations and discovery calls logged
    in nrf_node.cpp
  interview_context: Tests NRF registry/discovery mechanism central to all 5GC NF
    interactions
- id: q148
  domain: 5g
  subdomain: session
  tags:
  - nrf
  - oauth2
  - 5g-sba
  - http2
  level: senior
  question: How does OAuth2-based authorization work for NF service access in 5G?
  answer: 3GPP uses OAuth 2.0 client credentials grant for SBI authorization. An NF
    consumer obtains an access token from NRF via POST to Nnrf_AccessToken_Get, specifying
    its NF type, target NF type, and required service scope; the NRF verifies the
    requester's identity via mutual TLS and issues a signed JWT. The consumer includes
    this bearer token in the Authorization HTTP header of every service request; the
    producer validates the token signature and scope before processing. This prevents
    unauthorized NFs from calling any service and enables fine-grained access control.
  spec: TS 29.510 §5.22, TS 33.501 §13.3
  simulator_trigger: 5G REG command — NRF issues JWT access tokens used in all Nudm,
    Nausf, Nsmf calls in 5g_oauth_handler.cpp
  interview_context: Tests OAuth2/SBI authorization knowledge needed for 5GC security
    hardening and zero-trust deployments
