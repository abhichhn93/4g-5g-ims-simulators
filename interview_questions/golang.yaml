- id: q294
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - goroutine
  level: senior
  question: How do you prevent goroutine leaks?
  answer: 'A goroutine leak occurs when a goroutine is blocked on a channel operation
    that will never complete. Rules to prevent leaks: (1) every goroutine must have
    a way to exit — use context.Context cancellation; (2) buffered channels allow
    a goroutine to send even if the receiver has exited (make(chan error, 1)); (3)
    always close channels from the sender; (4) in tests, use goleak.VerifyNone(t)
    to catch leaks early; (5) in production, monitor runtime.NumGoroutine() and use
    pprof''s goroutine profile. Leak-free pattern: make a buffered result channel,
    wrap work in goroutine, select on result and ctx.Done().'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — goroutine leak prevention in NRF subscription
    manager
  interview_context: Goroutine leaks in the NRF subscription manager would cause memory
    growth over time in a long-running service
- id: q295
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - worker-pool
  level: engineer
  question: Explain the worker pool pattern in Go.
  answer: A worker pool maintains a fixed number of goroutines that consume tasks
    from a shared channel — limiting maximum concurrency and preventing resource exhaustion.
    Use golang.org/x/sync/errgroup with g.SetLimit(n) for a bounded worker pool with
    automatic error propagation and context cancellation. The 'jobs <- task' pattern
    feeds the pool; workers read with 'for job := range jobs'. Worker pools are preferred
    over fan-out for consistent workloads — fan-out dynamically creates goroutines
    per input (more flexible, potentially unbounded); worker pool uses a fixed number
    of consumers (better resource control).
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — worker pool for processing concurrent
    NF discovery requests
  interview_context: Worker pools in the NRF service bound the maximum concurrency
    of discovery request processing
- id: q296
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - goroutine
  - channel
  level: senior
  question: Explain the fan-out/fan-in pattern in Go.
  answer: 'Fan-out distributes work from one input channel to multiple goroutines
    (each item processed by exactly one worker). Fan-in merges results from multiple
    goroutines into a single output channel. Key implementation detail: fanIn must
    start a dedicated closer goroutine that waits via WaitGroup for all input channels
    to drain, then closes the output channel — this allows fanIn to return the channel
    immediately while closing happens asynchronously. Difference from worker pool:
    fan-out dynamically creates goroutines per input (more flexible); worker pool
    uses a fixed number of consumers (better resource control).'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — fan-out/fan-in for parallel NF availability
    checking
  interview_context: Fan-out/fan-in enables parallel querying of multiple NF types
    in the NRF discovery response aggregation
- id: q297
  domain: golang
  subdomain: comparison
  tags:
  - golang
  level: senior
  question: When should you choose Go over C++?
  answer: 'Choose Go when building cloud-native services, network daemons, API servers,
    DevOps tooling (Kubernetes, Docker, Prometheus are all Go), or any system where
    developer productivity, fast compile-deploy cycles, and built-in concurrency matter
    more than sub-microsecond latency. Choose C++ when you need hardware-level control,
    deterministic memory management (no GC pauses), template metaprogramming, SIMD
    intrinsics, or components that must embed into a C++ ecosystem (game engines,
    embedded firmware, real-time signal processing). In telecom: Go is prevalent in
    cloud-native 5G core control plane and gNMI/gRPC servers; C++ dominates data plane
    (DPDK-based packet forwarding, BBU baseband, RAN stacks).'
