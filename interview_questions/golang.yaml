- id: q298
  domain: golang
  subdomain: testing
  tags:
  - golang
  - testing
  level: beginner
  question: What is the testing package and how do you write a basic test?
  answer: 'Go''s testing package is built into the standard library — no external
    test runner needed. Test files end in _test.go; test functions start with Test
    and take *testing.T. Run with go test ./.... Use t.Error/t.Errorf for non-fatal
    failures (continues test); t.Fatal/t.Fatalf for fatal failures (stops test). The
    go test -race flag enables the race detector — always run in CI. Example: func
    TestAdd(t *testing.T) { got := Add(2, 3); want := 5; if got != want { t.Errorf(''Add(2,3)
    = %d; want %d'', got, want) } }'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — unit tests for NRF service methods
  interview_context: Go's built-in testing package is used for all NRF service unit
