- id: q299
  domain: golang
  subdomain: testing
  tags:
  - golang
  - testing
  level: engineer
  question: What are table-driven tests and why are they idiomatic Go?
  answer: 'Table-driven tests define a slice of struct test cases (input + expected
    output), then iterate with a single test loop and t.Run for subtests. This is
    the dominant Go testing pattern — endorsed by the official Go wiki and used throughout
    the standard library. Benefits: adding a new case is one line; output clearly
    names which case failed; subtests can run in parallel; test structure is self-documenting.
    Use t.Run(tc.name, func(t *testing.T) { ... }) to create subtests identified by
    name. Run a specific subtest with go test -run TestFoo/case_name.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — table-driven tests for NRF message parsing
  interview_context: Table-driven tests are the idiomatic Go approach for testing
