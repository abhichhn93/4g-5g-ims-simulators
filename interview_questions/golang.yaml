- id: q288
  domain: golang
  subdomain: memory
  tags:
  - golang
  level: engineer
  question: How does the Go garbage collector work?
  answer: 'Go uses a concurrent tri-color mark-and-sweep garbage collector. Colors:
    white = not yet reached (candidate for collection), gray = reachable but children
    not scanned, black = fully scanned. The collector runs concurrently with user
    goroutines — no stop-the-world for full mark-and-sweep. Short STW pauses occur
    only for root marking and termination, kept to < 1ms since Go 1.17+. GOGC environment
    variable controls aggressiveness (default 100 = GC when heap doubles). Reduce
    GC pressure with sync.Pool to reuse allocations, pre-allocated slice capacities,
    and struct embedding over pointer-to-struct.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — sync.Pool for NF message buffer reuse
    in NRF
  interview_context: GC tuning is important for the NRF simulator to maintain low-latency
    NF discovery responses at high load
- id: q289
  domain: golang
  subdomain: memory
  tags:
  - golang
  level: senior
  question: What is escape analysis and the stack vs heap distinction?
  answer: 'The Go compiler performs escape analysis at compile time to decide whether
    a variable is allocated on the stack or heap. Stack allocation is preferred —
    cheap (just adjust stack pointer), automatically reclaimed when function returns,
    no GC pressure. A variable escapes to the heap when: its address is returned from
    a function, assigned to an interface, captured by a closure, or too large for
    the stack. Use go build -gcflags=''-m'' to see escape decisions. Understanding
    escape analysis helps write allocation-free hot paths — critical in high-throughput
    telecom packet processing.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — escape analysis optimization for NF discovery
    hot path
  interview_context: Allocation-free hot paths are critical in the NRF simulator to
    maintain low latency at 500K discovery requests/sec
- id: q290
  domain: golang
  subdomain: memory
  tags:
  - golang
  level: engineer
  question: Explain defer, panic, and recover in Go.
  answer: defer schedules a function call to execute just before the surrounding function
    returns, regardless of how it returns (normal, error, panic). Multiple defers
    execute in LIFO order. Arguments to deferred functions are evaluated immediately
    at the defer statement. panic stops normal execution, unwinds the stack executing
    all deferred functions, and crashes if uncaught. recover is called inside a deferred
    function to catch a panic and return its value — recover() outside a defer always
    returns nil. The idiomatic use is in HTTP handlers and library code to prevent
    one panic from crashing the whole service.
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — panic recovery middleware in NRF HTTP
    handler
  interview_context: Panic recovery in HTTP handlers prevents one bad NF registration
    from crashing the entire NRF service
- id: q291
  domain: golang
  subdomain: http
  tags:
  - golang
  - http-server
  level: engineer
  question: How do you build an HTTP server with net/http?
  answer: net/http is Go's standard HTTP server library — no external dependencies
    for most use cases. A handler is any type implementing http.Handler (ServeHTTP(ResponseWriter,
    *Request)). http.HandlerFunc is a function type adapter. http.ListenAndServe(addr,
    handler) starts the server and blocks. Always set timeouts (ReadTimeout, WriteTimeout,
    IdleTimeout) to prevent slow-client resource exhaustion. The http.Server struct
    allows fine-grained configuration including TLS via ListenAndServeTLS. Use http.NewServeMux()
    to route different paths to different handlers.
