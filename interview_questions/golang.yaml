- id: q280
  domain: golang
  subdomain: basics
  tags:
  - golang
  level: beginner
  question: What is the difference between := and var in Go?
  answer: := is the short variable declaration — it declares and initializes a variable,
    inferring its type from the right-hand side. It can only be used inside function
    bodies and requires at least one new variable on the left side. var can be used
    at both package level and function level, supports explicit type annotation, and
    initializes to the zero value if no value is provided. In practice, := is used
    for most local variables; var is preferred for package-level declarations, zero-value
    initialization, or when explicit types aid readability.
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — Go variable declarations in NRF service
    code
  interview_context: Go basics test ensures understanding of the language's type inference
    and scoping rules
- id: q281
  domain: golang
  subdomain: basics
  tags:
  - golang
  level: beginner
  question: What are zero values in Go?
  answer: 'In Go, every variable is automatically initialized to its type''s zero
    value when declared without an explicit value. Zero values: 0 for all numeric
    types, false for booleans, '''' for strings, nil for pointers/slices/maps/channels/interfaces/functions.
    Structs get zero values for all their fields. This eliminates uninitialized variable
    bugs common in C. Notable consequence: a nil slice is a valid slice with length
    0 and can be appended to; a nil map panics on write but returns zero values on
    read.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — zero value initialization patterns in
    NRF service structs
  interview_context: Go's zero values prevent uninitialized variable bugs; nil map
    vs nil slice distinction is a common interview gotcha
- id: q282
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - goroutine
  level: engineer
  question: How do goroutines differ from OS threads?
  answer: Goroutines are lightweight functions managed by the Go runtime scheduler
    using an M:N model — M goroutines multiplexed onto N OS threads (GOMAXPROCS defaults
    to CPU count). A goroutine starts with 2-8KB stack that grows and shrinks dynamically;
    an OS thread typically has a fixed 1-8MB stack. Context switching between goroutines
    happens in user space — orders of magnitude cheaper than OS thread switches. A
    Go program can run hundreds of thousands of goroutines concurrently; the same
    number of OS threads would exhaust system resources. A network simulator needing
    thousands of virtual connections benefits enormously from goroutines.
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — goroutine-per-NF-connection model in NRF
    simulator
  interview_context: Goroutines enable the NRF simulator to handle thousands of concurrent
    NF registrations with minimal resources
- id: q283
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - channel
  - goroutine
  level: engineer
  question: What is the difference between buffered and unbuffered channels?
  answer: An unbuffered channel (make(chan T)) requires both sender and receiver to
    be ready simultaneously — the send blocks until another goroutine receives, enforcing
    synchronous handoff. A buffered channel (make(chan T, n)) allows up to n sends
    without a receiver being ready — it only blocks when the buffer is full, decoupling
    sender and receiver timing. Use unbuffered channels when synchronization is required;
    use buffered channels as work queues or to prevent goroutine leaks (a goroutine
    sending to a buffered channel can always send even if the receiver exits).
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — buffered channels for NF registration
    event queues
  interview_context: Channel selection (buffered vs unbuffered) is fundamental to
    correct goroutine communication in NRF simulator
- id: q284
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - goroutine
  - channel
  level: engineer
  question: How does the select statement work?
  answer: 'select multiplexes across multiple channel operations — it blocks until
    at least one case can proceed, then executes that case. When multiple cases are
    ready simultaneously, Go picks one at random (preventing starvation). A default
    clause makes select non-blocking. select combined with context.Done() is the idiomatic
    pattern for cancellable goroutines. It is also used for timeouts (time.After)
    and rate limiting. Example: select { case err := <-done: return err; case <-ctx.Done():
    return ctx.Err(); case <-time.After(5*time.Second): return errors.New(''timeout'')
    }'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — select with context cancellation in NRF
    discovery handler
  interview_context: select with context is the Go idiom for implementing cancellable
    NF discovery requests with timeouts
- id: q285
  domain: golang
  subdomain: concurrency
  tags:
  - golang
  - goroutine
  level: engineer
  question: How do sync.WaitGroup and sync.Mutex/sync.RWMutex work?
  answer: 'sync.WaitGroup tracks a count of goroutines: Add(n) increments, Done()
    decrements (call with defer wg.Done()), Wait() blocks until count reaches zero
    — used to wait for a fan-out of goroutines. sync.Mutex provides mutual exclusion:
    Lock() blocks until free; always defer mu.Unlock(). sync.RWMutex allows multiple
    concurrent readers (RLock/RUnlock) but only one writer (Lock/Unlock) — use it
    when reads far outnumber writes (e.g., a read-heavy in-memory NF profile table).
    Example: FlowTable with RWMutex for concurrent read-heavy NRF profile lookups.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — RWMutex for concurrent NF profile table
    access
  interview_context: Concurrent NF profile table access in the NRF requires careful
    RWMutex usage for read-heavy workloads
- id: q286
  domain: golang
  subdomain: interfaces
  tags:
  - golang
  - interface
  level: engineer
  question: How does Go's implicit interface implementation work?
  answer: 'In Go, a type satisfies an interface implicitly — there is no implements
    keyword. If a type has all the methods an interface requires (matching names and
    signatures), it satisfies that interface automatically. This is structural typing
    (duck typing with compile-time checking). The benefit: you can add a new interface
    to existing types without modifying their source code, enabling retroactive abstraction.
    Go standard library uses tiny interfaces: io.Reader has one method; io.Writer
    has one method — composability through embedding.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — interface-based NF handler dispatch in
    NRF service
  interview_context: Go's implicit interfaces enable clean abstraction in the NRF
    simulator without tight coupling between NF types
- id: q287
  domain: golang
  subdomain: interfaces
  tags:
  - golang
  - interface
  level: engineer
  question: What is the empty interface and type assertion?
  answer: 'The empty interface interface{} (aliased as any since Go 1.18) has no method
    requirements — every type satisfies it. It is Go''s equivalent of Object in Java
    or void* in C. Use it only when you genuinely need to handle any type; prefer
    generics (Go 1.18+) for type-safe containers. Type assertion: v, ok := i.(ConcreteType)
    — the two-value form is safe (ok=false if wrong type); single-value form panics
    on mismatch. A type switch patterns over multiple types: switch v := i.(type)
    { case int: ... case string: ... }'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — type assertion in generic NF message handler
  interview_context: Type assertions and switches are used in NRF message dispatching
