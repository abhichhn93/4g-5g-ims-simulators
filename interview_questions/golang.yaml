- id: q301
  domain: golang
  subdomain: modules
  tags:
  - golang
  level: engineer
  question: What are go.mod and go.sum?
  answer: 'go.mod is the module definition file — it declares the module path, minimum
    Go version, and all direct dependencies with semantic versions. Key directives:
    module (path), go (minimum Go version), require (dependencies), replace (override
    dependency with local fork), exclude (skip specific versions), retract (mark a
    released version as broken). go.sum is a cryptographic integrity file recording
    expected SHA-256 hashes of all dependencies, preventing supply-chain attacks.
    Never edit go.sum manually; always commit both files. Run go mod tidy to remove
    unused and add missing dependencies.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — go.mod for NRF Go service dependency management
  interview_context: Go module management is essential for reproducible builds in
    the NRF Go service CI pipeline
- id: q302
  domain: golang
  subdomain: modules
  tags:
  - golang
  level: engineer
  question: How does Go module versioning work?
  answer: 'Go modules use semantic versioning (v1.2.3 = MAJOR.MINOR.PATCH). Go''s
    Minimum Version Selection (MVS) algorithm selects the minimum version that satisfies
    all constraints — unlike npm/pip which select latest. For major version v2+, the
    module path must include the version suffix: github.com/user/pkg/v2. This allows
    v1 and v2 to coexist in the same build. go get github.com/pkg@v1.2.3 pins a version;
    go get github.com/pkg@latest updates. go mod vendor copies all dependencies to
    vendor/ for offline/reproducible builds.'
  spec: null
  simulator_trigger: 5g-simulator/nrf-go/ — semantic versioning for NRF service releases
  interview_context: MVS ensures reproducible builds for the NRF Go service — important
    for audit trails in telecom deployments
