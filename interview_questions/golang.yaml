- id: q293
  domain: golang
  subdomain: http
  tags:
  - golang
  level: engineer
  question: What is context.Context and how should it be used?
  answer: context.Context is Go's standard mechanism for cancellation, deadlines,
    and request-scoped values across goroutine boundaries. Every HTTP request handler
    receives r.Context() which is cancelled when the client disconnects. Pass context
    as the first parameter to any function that does network I/O, long computation,
    or spawns goroutines. Create derived contexts with context.WithCancel, context.WithTimeout,
    or context.WithDeadline. Never store context in a struct field — pass it explicitly.
    Always call the cancel() function returned by WithCancel/WithTimeout (usually
    defer cancel()).
  spec: null
