- id: q292
  domain: golang
  subdomain: http
  tags:
  - golang
  - http-server
  level: engineer
  question: How does the middleware pattern work in Go?
  answer: 'Go middleware is a function that takes an http.Handler and returns an http.Handler,
    wrapping the inner handler with additional behavior. Middleware chains are composed
    by nesting: mux = loggingMiddleware(authMiddleware(router)). Each middleware calls
    next.ServeHTTP(w, r) to pass control to the inner handler. Common middleware:
    logging, authentication, rate limiting, CORS, panic recovery, request ID injection.
    This pattern requires no framework — it''s idiomatic standard-library Go.'
  spec: null
