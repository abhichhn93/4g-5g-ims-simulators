  level: engineer
  question: What is O-RAN, and how does it differ from traditional monolithic RAN?
  answer: 'O-RAN (Open RAN) is an O-RAN Alliance architecture that disaggregates the
    RAN into open, standardized, interoperable components: O-RU (Radio Unit), O-DU
    (Distributed Unit), and O-CU (Centralized Unit, split into O-CU-CP and O-CU-UP),
    with open fronthaul based on the WG4 7.2x functional split. Traditional monolithic
    RAN tightly couples RRU, BBU, and software from a single vendor behind proprietary
    interfaces, making multi-vendor mixing impossible. O-RAN adds RAN Intelligent
    Controllers (near-RT RIC and non-RT RIC) that provide AI/ML-driven optimization
    layers above the base station using standardized E2 and A1 interfaces. In practice,
    operators can mix vendors and deploy third-party xApps on the near-RT RIC for
    use-case-specific radio optimization.'
  spec: O-RAN Alliance Architecture Description WG1.OAD
  simulator_trigger: O-RAN simulator — shows O-RU/O-DU/O-CU functional split and RIC
    control loops
  interview_context: Baseline O-RAN question for RAN/core integration roles; validates
    vocabulary and functional split knowledge
- id: q167
  domain: 5g
  subdomain: oran
  tags:
  - o-ran
  - ric
  - xapp
  - e2-interface
  level: senior
  question: What is the difference between the near-RT RIC and the non-RT RIC in O-RAN?
  answer: The non-RT RIC (part of the SMO — Service Management and Orchestration)
    operates on control loops longer than 1 second, running rApps for AI/ML model
    training, long-term radio policy management, and trained model distribution; it
    communicates with the near-RT RIC via the A1 interface. The near-RT RIC operates
    on 10 ms to 1 second control loops, running xApps that subscribe to real-time
    RAN metrics via E2 and inject per-UE control actions (handover decisions, PRB
    allocation adjustments) via E2 Control messages to O-DU/O-CU. Neither RIC controls
    the sub-10 ms real-time scheduler (HARQ, beamforming) — that remains exclusively
    in the O-DU. The two-tier design allows long-horizon ML training to remain decoupled
    from latency-sensitive per-UE decisions.
  spec: O-RAN.WG2.A1AP, O-RAN.WG3.E2AP
  simulator_trigger: O-RAN RIC simulator — near-RT RIC subscription shows 100 ms E2
    indication period vs non-RT 60 s policy push via A1
  interview_context: Tests RIC architecture depth; candidates confusing the two tiers
    signal insufficient O-RAN background
- id: q168
  domain: 5g
  subdomain: oran
  tags:
  - o-ran
  - ric
  - xapp
  - e2-interface
  level: senior
  question: What is an xApp, and how does it use the E2 interface to control the RAN?
  answer: An xApp is a microservice on the near-RT RIC that implements one specific
    RAN optimization use case; it subscribes to E2 reports (e.g., PRB utilization,
    RSRP, handover events) from O-DU/O-CU via E2 Subscription messages using a standardized
    E2 Service Model (E2SM). The O-DU sends periodic or event-triggered E2 Indication
    messages carrying the subscribed KPIs; the xApp processes these, runs its optimization
    logic, and sends E2 Control messages back to the O-DU/O-CU to adjust scheduler
    weights, trigger handovers, or change PRB allocations. Standardized E2SMs include
    E2SM-KPM (metrics), E2SM-RC (RAN control), E2SM-CCC (cell configuration), and
    E2SM-NI (network interface). The E2 interface uses SCTP transport and the E2AP
    ASN.1 message format.
  spec: O-RAN.WG3.E2AP, O-RAN.WG3.E2SM-KPM, O-RAN.WG3.E2SM-RC
  simulator_trigger: xApp deploy command in O-RAN simulator — E2 Subscription → Indication
    → Control message flow
  interview_context: Tests xApp lifecycle knowledge; commonly asked for O-RAN platform
    and integration engineer roles
- id: q169
  domain: 5g
  subdomain: oran
  tags:
  - o-ran
  - ric
  - e2-interface
  level: senior
  question: What are the A1 and O1 interfaces in O-RAN?
  answer: 'The A1 interface connects the non-RT RIC to the near-RT RIC and carries
    three message types: policy intents downward (e.g., handover guidance based on
    UE RSRP thresholds), AI/ML model deployments downward to xApps, and enrichment
    information upward (aggregated KPIs for model training). The O1 interface is the
    management interface between the SMO and all O-RAN managed elements (O-RU, O-DU,
    O-CU, near-RT RIC), providing FCAPS management using NETCONF/YANG for configuration
    and REST APIs or file-based mechanisms for performance data collection. O1 is
    analogous to the traditional OAM interface but standardized across all O-RAN vendors,
    enabling multi-vendor FCAPS from a single SMO platform. Without O1, operators
    would need vendor-specific NMS systems for each component.'
  spec: O-RAN.WG2.A1AP, O-RAN.WG1.O1-Interface specification
  simulator_trigger: O-RAN simulator management plane — O1 NETCONF config push and
    A1 policy intent log
  interview_context: Tests O-RAN management plane awareness; important for system
    integration and OSS/BSS alignment roles
- id: q170
  domain: 5g
  subdomain: oran
  tags:
  - o-ran
  - ric
  - xapp
  - e2-interface
  - network-slicing
  - 5g-sba
  level: architect
  question: How do O-RAN xApps interact with 5GC network slicing for slice-aware radio
    resource management?
  answer: An xApp can use E2SM-RC control messages to influence the O-DU/O-CU scheduler
    to enforce per-slice PRB budgets based on S-NSSAI, ensuring that URLLC slice traffic
    receives preferential scheduling over eMBB slice traffic during congestion. The
    near-RT RIC receives slice membership information (S-NSSAI per UE) via E2SM-KPM
    reports and uses this to run slice-aware load balancing or handover optimization
    xApps. The non-RT RIC can push per-slice policy intents via A1 (e.g., minimum
    guaranteed PRBs per SST=2 URLLC slice), which the near-RT RIC translates into
    E2 Control actions. End-to-end slice QoS alignment requires coordination between
    the 5GC PCF (which enforces 5QI/GBR policy on SMF/UPF) and the near-RT RIC xApp
    (which enforces radio scheduler policy) — currently an active standardization
    area in 3GPP and O-RAN Alliance Release 3.
  spec: TS 23.501 §5.15, O-RAN.WG3.E2SM-RC, O-RAN Alliance Release 3
  simulator_trigger: network-slicing + O-RAN combined command — shows S-NSSAI-tagged
    PRB scheduler decisions in E2 Control messages
  interview_context: Architect-level integration question testing end-to-end slice
    awareness from radio to core
