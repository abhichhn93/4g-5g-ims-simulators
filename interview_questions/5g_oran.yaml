  - kubernetes
  - cnf
  - cloud-native
  - docker
  level: senior
  question: What is a Cloud-Native Network Function (CNF), and how does it differ
    from a VNF?
  answer: 'A VNF (Virtual Network Function) runs as a VM image requiring a full OS
    and is managed by ETSI NFV-MANO frameworks; it typically scales by adding entire
    VM instances. A CNF is packaged as Linux containers (Docker/OCI), designed stateless,
    and orchestrated by Kubernetes — a single 5GC NF like SMF may decompose into multiple
    containers (session manager pod, PFCP handler pod, charging interface pod) that
    scale independently. CNFs follow 12-factor app methodology: configuration via
    ConfigMaps/Secrets, ephemeral storage, health probes for graceful restart. CNFs
    start faster, use less memory, and enable per-microservice horizontal scaling
    compared to VNFs, but require K8s expertise and careful NUMA/SR-IOV tuning for
    the UPF data plane.'
  spec: ETSI GS NFV-SWA 001, 3GPP TR 21.917
  simulator_trigger: Kubernetes deploy command in devops simulator — CNF pod lifecycle
    vs VM boot time
  interview_context: Tests cloud-native infrastructure knowledge; asked for DevOps/platform
    engineering roles at 5GC vendors
- id: q164
  domain: 5g
  subdomain: oran
  tags:
  - kubernetes
  - cnf
  - cloud-native
  level: senior
  question: Why is Kubernetes used for 5G Core deployments, and which K8s features
    are most critical?
  answer: Kubernetes provides horizontal scaling for stateless NFs (AMF, SMF, PCF)
    via Deployments and HPA, stateful per-pod identity for data-layer NFs (UDR) via
    StatefulSets, and service DNS names used as NRF-registered FQDNs via ClusterIP
    Services. Helm Charts package NF configurations as versioned deployable units
    enabling GitOps-style CI/CD rollouts; Istio/Envoy sidecars provide mTLS between
    NFs and implement the SCP (Service Communication Proxy) function for load balancing
    and circuit breaking. For the UPF, NUMA-aware scheduling with CPU Manager, Topology
    Manager, SR-IOV plugins, and hugepages are critical to achieve line-rate packet
    forwarding without kernel overhead. Network Policies enforce per-slice and per-NF
    isolation at the pod level.
  spec: 3GPP TR 21.917, ETSI GS NFV-IFA 029
  simulator_trigger: kubernetes command in devops simulator — shows K8s resource objects
    for each 5GC NF
  interview_context: Tests DevOps depth for 5G cloud-native roles; expected at senior
    level for any CNF deployment position
- id: q165
  domain: 5g
  subdomain: oran
  tags:
  - kubernetes
  - cnf
  - upf
  - pfcp
  - n4
  - cloud-native
  level: architect
  question: Why does the UPF require special Kubernetes configuration compared to
    control-plane NFs?
  answer: The UPF is a dataplane NF with line-rate forwarding requirements (millions
    of PPS, microsecond latency), unlike stateless control-plane NFs that communicate
    over HTTP/2 at modest request rates. It requires kernel bypass via DPDK or SR-IOV
    (Single Root I/O Virtualization), CPU pinning and NUMA node affinity via Kubernetes
    CPU Manager and Topology Manager, hugepages for DPDK memory pools, and privileged
    container capabilities (NET_ADMIN) for direct NIC access. Operators often deploy
    the UPF on dedicated node pools separate from control-plane NF nodes, or even
    as a bare-metal function with a cloud-native control plane, to avoid interference
    with container networking overhead. This mixed deployment (cloud-native CP + bare-metal
    UP) is a common pattern at Nokia and Ericsson in production networks.
  spec: TS 23.501 §5.7, ETSI GS NFV-IFA 029
  simulator_trigger: upf deploy command — simulator highlights UPF node pool annotations
    vs control-plane pod specs
  interview_context: Architect-level question separating candidates who understand
    dataplane performance from those who do not
