  level: engineer
  question: What are the most important architectural differences between 5G Core
    and 4G EPC?
  answer: '5G Core replaces 4G''s point-to-point reference interfaces (S11, Gx, S6a…)
    with a Service-Based Architecture where every NF exposes RESTful HTTP/2 services
    discoverable via the NRF. The 4G MME is split into AMF (mobility/NAS) and SMF
    (session management), while SGW+PGW user planes merge into a single UPF controlled
    by SMF via PFCP — control-user plane separation is mandatory, not optional. Network
    slicing via NSSAI is a first-class architectural feature rather than an overlay,
    and SUCI/ECIES replace plaintext IMSI to eliminate IMSI-catcher attacks. Deployment
    is cloud-native by design: NFs are containerized microservices orchestrated on
    Kubernetes rather than monolithic appliances.'
  spec: TS 23.501 §4, TR 23.799
  simulator_trigger: Any 5G command versus 4G ATTACH command — contrast the SBA service
    call graph versus point-to-point GTPv2-C messages
  interview_context: Baseline question for any 5G engineering role — tests breadth
    of architectural knowledge
