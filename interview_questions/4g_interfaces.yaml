- id: q073
  domain: 4g
  subdomain: interfaces
  tags:
  - s1-mme
  - s1ap
  - mme
  - nas
  level: engineer
  question: 'Describe the S1-MME interface: protocol stack, messages, and its role.'
  answer: S1-MME is the control-plane interface between eNodeB and MME, carrying S1AP
    messages over SCTP/IP. SCTP provides reliable, ordered transport with multi-homing
    support. Key S1AP messages include UE-associated (Initial UE Message, Initial
    Context Setup Request/Response, UE Context Release Command) and non-UE-associated
    (S1 Setup Request/Response, Paging, Reset). NAS PDUs are carried as transparent
    IEs — the eNodeB does not interpret them. A single eNodeB typically has S1-MME
    connections to 2–3 MMEs for redundancy.
  spec: TS 36.413, TS 23.401
  simulator_trigger: 4G ATTACH command — S1AP InitialUEMessage is the first message
    from gNB simulator to MME simulator
  interview_context: Tests precise S1 interface knowledge needed for debugging S1AP
    setup and UE context issues
- id: q074
  domain: 4g
  subdomain: interfaces
  tags:
  - s6a
  - diameter
  - mme
  - hss
  - 4g-auth
  level: senior
  question: What Diameter commands are exchanged on the S6a interface between MME
    and HSS?
  answer: 'The S6a interface uses Diameter (3GPP Multimedia application, App-ID 16777251).
    Key command pairs are: AIR/AIA (Authentication-Information-Request/Answer) — MME
    fetches EPS authentication vectors; ULR/ULA (Update-Location-Request/Answer) —
    MME registers UE and receives subscription data; CLR/CLA (Cancel-Location-Request/Answer)
    — HSS deregisters UE from old MME; IDR/IDA (Insert-Subscriber-Data) — HSS pushes
    updated subscription data; PUR/PUA (Purge-UE) — MME deregisters UE after detach.'
  spec: TS 29.272
  simulator_trigger: 4G ATTACH command step 4 — Diameter AIR/AIA; step 5 — ULR/ULA
    on s6a_client.cpp
  interview_context: Tests Diameter S6a command knowledge required for HSS troubleshooting
    in attach failure scenarios
- id: q075
  domain: 4g
  subdomain: interfaces
  tags:
  - s11
  - s5s8
  - gtpv2
  - mme
  - sgw
  - pgw
  level: engineer
  question: What is the difference between the S11 and S5/S8 interfaces in LTE?
  answer: S11 is between MME and SGW, uses GTPv2-C for control-plane bearer management
    (Create/Modify/Delete Session requests), and carries no user-plane traffic. S5
    is between SGW and PGW within the same PLMN (non-roaming), carrying both GTPv2-C
    and GTP-U user data. S8 is functionally identical to S5 but crosses PLMN boundaries
    for roaming scenarios — an IPX provider typically sits between S8 peers. The SGW
    acts as a relay, forwarding GTPv2-C messages from S11 to S5 with TEID updates.
  spec: TS 29.274, TS 23.401
  simulator_trigger: '4G ATTACH command — Create Session Request chain: MME → SGW
    (S11) → PGW (S5) in gtpv2_handler.cpp'
  interview_context: Tests ability to distinguish the control and user plane stacks
    on each interface
- id: q076
  domain: 4g
  subdomain: interfaces
  tags:
  - gx
  - diameter
  - pgw
  - pcrf
  - 4g-bearer
  - qci
  level: senior
  question: What is the Gx interface and what protocol does it use?
  answer: Gx connects the PGW (acting as PCEF) to the PCRF, using Diameter (App-ID
    16777238) over TCP/SCTP. When a UE attaches and a PDN connection is established,
    the PGW opens a Gx session with CCR (CC-Request) INITIAL_REQUEST; the PCRF responds
    with CCA containing PCC Rules (QCI, ARP, GBR, MBR, flow descriptions, charging
    keys). The PCRF can push updated rules mid-session using RAR (Re-Auth-Request);
    the PGW responds with RAA. Gx enables dynamic QoS enforcement — e.g., when IMS
    triggers a dedicated bearer via Rx.
  spec: TS 29.212
  simulator_trigger: 4G ATTACH command — PGW sends Gx CCR-Initial to PCRF; CALL command
    — Gx RAR pushing QCI=1 PCC rule
  interview_context: Tests Gx/PCC understanding critical for debugging VoLTE bearer
    establishment failures
- id: q077
  domain: 4g
  subdomain: interfaces
  tags:
  - gy
  - diameter
  - pgw
  level: senior
  question: What is the Gy interface and how does it differ from Rf in LTE?
  answer: Gy is the online charging interface between the PGW and OCS (Online Charging
    System), using Diameter Credit-Control Application — it checks and reserves credit
    before delivering service; if credit runs out, the service is immediately terminated
    or throttled. Rf is the offline charging interface using Diameter Accounting messages
    (ACR/ACA) to deliver CDRs post-session for batch billing reconciliation. Online
    (Gy) = pre-paid / real-time credit control; Offline (Rf) = post-paid / batch CDR
    delivery.
  spec: TS 32.299, TS 32.240
  simulator_trigger: CALL command with charging=online flag — PGW sends Diameter CCR
    to OCS simulator over Gy
  interview_context: Tests online vs offline charging model distinction fundamental
    to billing architecture roles
- id: q078
  domain: 4g
