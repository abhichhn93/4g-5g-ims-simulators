  level: engineer
  question: Explain the X2-based handover procedure. When is it used, and when is
    S1-based handover preferred?
  answer: X2 handover is used when source and target eNodeBs communicate directly
    via X2 (same MME pool area); it is faster because MME and SGW are not in the critical
    path. The source eNB sends Handover Request to the target eNB over X2; after UE
    attaches, the target eNB notifies the MME via Path Switch Request, and the MME
    updates the SGW bearer path. S1 handover is used when the eNBs are in different
    MME pools, no X2 exists, the serving PLMN changes, or security key forwarding
    requires MME involvement.
  spec: TS 36.300, TS 23.401 §5.5.1
  simulator_trigger: HO command in simulator — X2-based path triggers x2_handover_handler.cpp;
    S1-based triggers s1_handover_handler.cpp
  interview_context: Tests fundamental handover procedure knowledge relevant to LTE
    mobility performance analysis
- id: q067
  domain: 4g
  subdomain: bearer
  tags:
  - 4g-handover
  - x2
  - s1-ho
  - path-switch
  - gtpv2
  - teid
  level: senior
  question: During X2 handover, what is a Path Switch and which GTP tunnels are modified?
  answer: After the UE attaches to the target eNodeB, the target eNB sends a Path
    Switch Request (S1AP) to the MME. The MME sends a Modify Bearer Request (GTPv2)
    to the SGW providing the new S1-U TEID of the target eNB; the SGW re-points its
    downlink GTP-U tunnel from the source eNB's IP/TEID to the target eNB's IP/TEID.
    The S5/S8 tunnel between SGW and PGW is not modified — the PGW remains the anchor.
    The MME then signals the source eNB to release its resources.
  spec: TS 23.401 §5.5.1.1.2, TS 29.274
  simulator_trigger: HO command — Modify Bearer Request in x2_path_switch.cpp updating
    SGW downlink TEID after UE moves
  interview_context: Tests deep GTP tunnel understanding needed for handover debugging
    in the simulator
- id: q068
  domain: 4g
  subdomain: bearer
  tags:
  - 4g-handover
  - mme
  - s1-ho
  level: senior
  question: Describe the difference between intra-MME and inter-MME S1 handover at
    the core network level.
  answer: In intra-MME S1 handover, source and target eNodeBs connect to the same
    MME; the MME coordinates the Handover Request to the target eNB and updates the
    bearer path via SGW. In inter-MME S1 handover, the source MME sends a Forward
    Relocation Request to the target MME via S10 (GTPv2), which sets up new S11/S5
    bearers with possibly a new SGW; after UE attachment the target MME sends Forward
    Relocation Complete and the old MME releases all resources. This involves full
    re-establishment of the GTP tunnel chain.
  spec: TS 23.401 §5.5.1.2, §5.5.1.3
  simulator_trigger: HO command with inter-mme=true flag — S10 Forward Relocation
    Request between two MME simulator instances
  interview_context: Tests understanding of the GTP re-anchoring complexity introduced
    by MME changes
- id: q069
  domain: 4g
  subdomain: bearer
  tags:
  - 4g-handover
  - mme
  level: senior
  question: What is SRVCC and why is it needed in VoLTE networks?
  answer: SRVCC (Single Radio Voice Call Continuity) enables seamless handover of
    an ongoing VoLTE/IMS voice call from LTE (PS domain) to 2G/3G (CS domain) when
    LTE coverage is lost — without SRVCC the call would drop. The MME sends a PS-to-CS
    HO request to the MSC Server via the Sv interface; the MSC creates a CS call leg
    while IMS anchors media at the ATCF/ATGW; the S-CSCF is notified via SIP signaling
    to update the session. SRVCC requires the UE's STN-SR (Session Transfer Number
    for SRVCC) to be provisioned in the HSS.
  spec: TS 23.216, TS 23.401
  simulator_trigger: HO command with srvcc=true — MME sends Sv interface PS-to-CS
    request after LTE coverage loss detected
  interview_context: Tests VoLTE-specific handover continuity knowledge required at
    senior IMS/VoLTE engineering levels
- id: q070
  domain: 4g
