  level: engineer
  question: What triggers a TAU in LTE and what are the different types of TAU?
  answer: 'A TAU is triggered when: the UE moves into a TA not on its assigned TA
    list; the periodic TAU timer T3412 expires; the UE transitions to ECM-CONNECTED
    in a new TA; or the UE changes PLMN or ISR state. TAU types include Normal TAU
    (TA update without SGW change), TAU with SGW relocation (requires Create Session
    Request cycle), Combined TAU (also updates VLR for CS fallback), and Periodic
    TAU (keep-alive confirming UE reachability).'
  spec: TS 23.401 §5.3.3, TS 24.301
  simulator_trigger: TAU command in simulator — triggers tau_handler.cpp with configurable
    tau_type parameter
  interview_context: Tests mobility management knowledge essential for any MME software
    engineering role
- id: q071
  domain: 4g
  subdomain: bearer
  tags:
  - 4g-tau
  - tracking-area
  - mobility
  - mme
  - diameter
  - s6a
  level: senior
  question: Walk through the key steps of a TAU procedure when the MME changes (inter-MME
    TAU).
  answer: The UE sends a TAU Request (with old GUTI) to the new MME; the new MME derives
    the old MME address from the GUTI and sends a Context Request (S10, GTPv2) to
    retrieve the UE's MM and bearer context. The new MME optionally re-authenticates,
    sends an Update Location Request (Diameter ULR) to the HSS over S6a, and receives
    the subscriber profile in ULA while the HSS cancels the old MME registration via
    CLR. The new MME sends Modify Bearer Request (S11, GTPv2) to the SGW and returns
    a TAU Accept with new GUTI and TA list; the UE confirms with TAU Complete.
  spec: TS 23.401 §5.3.3.1, TS 29.272
  simulator_trigger: TAU command with inter_mme=true — S10 Context Request/Response
    between two simulator MME instances
  interview_context: Tests end-to-end TAU procedure knowledge including cross-MME
    context transfer and HSS interaction
- id: q072
  domain: 4g
  subdomain: bearer
  tags:
  - 4g-tau
  - tracking-area
  - mobility
  - mme
  - nas
  level: senior
  question: What is the difference between TAU in EMM-IDLE and EMM-CONNECTED state?
  answer: In EMM-IDLE, the UE has no active S1 connection; a TAU requires first establishing
    an RRC connection and S1 signaling association, making it a TAU without active
    flag with bearers typically suspended. In EMM-CONNECTED, the UE already has an
    active S1 connection and bearer context; TAU is more common when the UE moves
    across TA boundaries while actively transmitting. The Active Flag in the TAU Request
    indicates whether the UE requests bearer re-activation after TAU, avoiding a separate
    Service Request.
  spec: TS 23.401 §5.3.3, TS 24.301 §5.5.3
  simulator_trigger: TAU command — simulator configures active_flag in TAU Request
    to test idle vs connected TAU paths
  interview_context: Tests fine-grained UE state machine knowledge relevant to TAU
    failure analysis
- id: q073
  domain: 4g
  subdomain: bearer
  tags:
  - s1-mme
  - s1ap
  - mme
  - nas
  level: engineer
  question: 'Describe the S1-MME interface: protocol stack, messages, and its role.'
  answer: S1-MME is the control-plane interface between eNodeB and MME, carrying S1AP
    messages over SCTP/IP. SCTP provides reliable, ordered transport with multi-homing
    support. Key S1AP messages include UE-associated (Initial UE Message, Initial
    Context Setup Request/Response, UE Context Release Command) and non-UE-associated
    (S1 Setup Request/Response, Paging, Reset). NAS PDUs are carried as transparent
    IEs — the eNodeB does not interpret them. A single eNodeB typically has S1-MME
    connections to 2–3 MMEs for redundancy.
  spec: TS 36.413, TS 23.401
  simulator_trigger: 4G ATTACH command — S1AP InitialUEMessage is the first message
    from gNB simulator to MME simulator
  interview_context: Tests precise S1 interface knowledge needed for debugging S1AP
    setup and UE context issues
- id: q074
  domain: 4g
  subdomain: bearer
  tags:
  - s6a
  - diameter
  - mme
  - hss
  - 4g-auth
  level: senior
  question: What Diameter commands are exchanged on the S6a interface between MME
    and HSS?
  answer: 'The S6a interface uses Diameter (3GPP Multimedia application, App-ID 16777251).
    Key command pairs are: AIR/AIA (Authentication-Information-Request/Answer) — MME
    fetches EPS authentication vectors; ULR/ULA (Update-Location-Request/Answer) —
    MME registers UE and receives subscription data; CLR/CLA (Cancel-Location-Request/Answer)
    — HSS deregisters UE from old MME; IDR/IDA (Insert-Subscriber-Data) — HSS pushes
    updated subscription data; PUR/PUA (Purge-UE) — MME deregisters UE after detach.'
  spec: TS 29.272
  simulator_trigger: 4G ATTACH command step 4 — Diameter AIR/AIA; step 5 — ULR/ULA
    on s6a_client.cpp
  interview_context: Tests Diameter S6a command knowledge required for HSS troubleshooting
    in attach failure scenarios
- id: q075
  domain: 4g
  subdomain: bearer
  tags:
  - s11
  - s5s8
  - gtpv2
  - mme
  - sgw
  - pgw
  level: engineer
  question: What is the difference between the S11 and S5/S8 interfaces in LTE?
  answer: S11 is between MME and SGW, uses GTPv2-C for control-plane bearer management
    (Create/Modify/Delete Session requests), and carries no user-plane traffic. S5
    is between SGW and PGW within the same PLMN (non-roaming), carrying both GTPv2-C
    and GTP-U user data. S8 is functionally identical to S5 but crosses PLMN boundaries
    for roaming scenarios — an IPX provider typically sits between S8 peers. The SGW
    acts as a relay, forwarding GTPv2-C messages from S11 to S5 with TEID updates.
  spec: TS 29.274, TS 23.401
  simulator_trigger: '4G ATTACH command — Create Session Request chain: MME → SGW
    (S11) → PGW (S5) in gtpv2_handler.cpp'
  interview_context: Tests ability to distinguish the control and user plane stacks
    on each interface
