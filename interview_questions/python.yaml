  level: engineer
  question: What is the difference between __init__ and __new__?
  answer: '__new__(cls, ...) is the actual constructor — it creates and returns the
    new instance. __init__(self, ...) is the initializer — it configures the instance
    __new__ already created. Override __new__ only when you need to control object
    creation itself: implementing singletons, returning a cached instance, subclassing
    immutable types (int, str, tuple) where __init__ is too late to alter the value.
    For normal classes, only override __init__. The Singleton pattern uses __new__
    to return the same instance on every call.'
