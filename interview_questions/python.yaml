- id: q259
  domain: python
  subdomain: oop
  tags:
  - python
  level: senior
  question: What is Method Resolution Order (MRO) and how does Python's C3 linearization
    work?
  answer: 'MRO defines the order Python searches base classes when resolving method
    calls in multiple inheritance. Python uses C3 linearization, which guarantees:
    (1) a class always appears before its parents, and (2) the order base classes
    appear in a class definition is respected. Inspect with ClassName.__mro__ or ClassName.mro().
    super() always delegates to the next class in the MRO chain — enabling cooperative
    multiple inheritance where each class calls super().__init__() and all initializers
    run exactly once. Diamond inheritance pitfall: if two mixin classes both inherit
    from a base and call super().__init__(), C3 ensures the base is initialized exactly
    once.'
