  level: engineer
  question: What is the difference between a coroutine, a task, and a future?
  answer: 'A coroutine is a function defined with async def — calling it returns a
    coroutine object but does NOT start execution. An asyncio.Task wraps a coroutine
    and schedules it to run on the event loop concurrently with other tasks; create
    with asyncio.create_task(coro). A Future is a lower-level awaitable representing
    a result that does not yet exist — Tasks are a subclass of Future. Key rule: await
    coro() runs the coroutine sequentially; asyncio.gather(coro1(), coro2()) runs
    them concurrently by creating tasks internally.'
