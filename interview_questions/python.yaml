  level: engineer
  question: What is a closure, and what is the 'late binding' pitfall?
  answer: 'A closure is a function that captures variables from its enclosing scope
    even after that scope has finished executing. The captured variables are stored
    in the function''s __closure__ attribute. The late binding pitfall occurs when
    a lambda or inner function references a loop variable — all closures share the
    same variable object, so by the time they execute the loop is finished and the
    variable holds its final value. Fix: capture by default argument: lambda x, i=i:
    x + i. This is a common interview gotcha for Python closures.'
  spec: null
