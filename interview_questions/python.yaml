- id: q252
  domain: python
  subdomain: data_structures
  tags:
  - python
  - gil
  level: engineer
  question: What is the GIL and how does it affect performance?
  answer: The Global Interpreter Lock (GIL) is a mutex in CPython that allows only
    one thread to execute Python bytecode at a time. For CPU-bound tasks, threading
    offers no parallelism — use multiprocessing instead (separate processes each with
    their own GIL). For I/O-bound tasks (network calls, file reads, sleep), the GIL
    is released during the wait, so threading or asyncio are both effective. Python
    3.13+ ships an experimental no-GIL build (--disable-gil). Extensions like NumPy
    release the GIL during C-level computation, enabling actual CPU parallelism with
    threads. A telecom packet-processing script reading from multiple sockets concurrently
    benefits from threading (I/O-bound); signal processing using FFT needs multiprocessing
    (CPU-bound).
  spec: null
  simulator_trigger: tools/viz_server.py — concurrency model selection for packet
    processing
  interview_context: Understanding the GIL is critical for choosing the right concurrency
    approach in Python telecom tools
- id: q253
