  level: engineer
  question: What are dunder (magic) methods and why do they matter?
  answer: 'Dunder (double-underscore) methods are Python''s protocol hooks that let
    custom classes integrate with built-in operations. __repr__/__str__: triggered
    by repr(), str(), f-strings. __len__: triggered by len(). __getitem__: triggered
    by obj[key]. __iter__/__next__: triggered by for loops. __enter__/__exit__: triggered
    by with statement. __eq__/__hash__: triggered by ==, dict/set membership. __call__:
    triggered by obj(). Implementing __enter__/__exit__ makes a class a context manager
