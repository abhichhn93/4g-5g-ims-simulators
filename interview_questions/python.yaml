  level: engineer
  question: What is the difference between a generator and an iterator?
  answer: An iterator is any object that implements __iter__() and __next__(); it
    holds state and raises StopIteration when exhausted. A generator is a special
    iterator created by a function containing yield or by a generator expression (x
    for x in ...). All generators are iterators, but not all iterators are generators.
    Generators produce values lazily (O(1) memory) whereas a list comprehension materializes
    all values eagerly (O(n) memory). When streaming through a multi-gigabyte PCAP
    file, wrap the reader as a generator so only one packet is in memory at a time
    — prevents OOM on large captures.
