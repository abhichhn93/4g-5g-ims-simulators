  level: engineer
  question: What is the asyncio event loop?
  answer: The asyncio event loop is a single-threaded scheduler that runs coroutines,
    handles I/O events, and manages callbacks. It runs on one OS thread — coroutines
    never truly execute in parallel, they interleave at await points where the current
    coroutine voluntarily yields control. The loop monitors file descriptors via select/epoll/kqueue
    and resumes coroutines when their awaited I/O completes. Run the loop with asyncio.run(main())
    (Python 3.7+). Blocking code can be offloaded via loop.run_in_executor() which
    delegates to a thread pool.
