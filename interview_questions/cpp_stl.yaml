  - iterator
  level: senior
  question: What are custom comparators, and how do you provide one to a C++ container
    or algorithm?
  answer: 'A custom comparator is any callable implementing a strict weak ordering
    — irreflexive, asymmetric, and transitive. Pass it as a template argument to ordered
    containers (std::map<K,V,Comp>, std::priority_queue) or as a runtime argument
    to algorithms (std::sort, std::lower_bound). A lambda is the most concise: std::sort(v.begin(),
    v.end(), [](auto& a, auto& b){ return a.priority > b.priority; }).'
  spec: null
