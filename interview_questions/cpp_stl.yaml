  level: engineer
  question: What are structured bindings in C++17?
  answer: 'Structured bindings allow you to unpack tuple-like objects (tuples, pairs,
    aggregates, arrays) into named variables in a single declaration: auto [key, value]
    = myMap.begin(). The bindings can be const, auto&, or auto&& to control copy vs
    reference. They are especially useful in range-for loops over maps: for (auto&
    [k, v] : myMap) instead of accessing .first/.second.'
