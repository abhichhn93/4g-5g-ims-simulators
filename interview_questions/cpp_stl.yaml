- id: q037
  domain: cpp
  subdomain: stl
  tags:
  - cpp17
  level: senior
  question: What is if constexpr, and why is it superior to SFINAE for compile-time
    branching?
  answer: 'if constexpr(condition) evaluates the condition at compile time and only
    instantiates the taken branch — the non-taken branch is not compiled and can be
    semantically incorrect for the current template argument without causing an error.
    This replaces complex SFINAE (std::enable_if) patterns with readable, linear code
    inside a single function template. Example: if constexpr (std::is_integral_v<T>)
    { return x * x; } else { return x.size(); }.'
  spec: null
