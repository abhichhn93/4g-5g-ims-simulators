- id: q027
  domain: cpp
  subdomain: stl
  tags:
  - cpp-stl
  - vector
  level: engineer
  question: Compare std::vector, std::list, and std::deque. When do you use each?
  answer: std::vector is a contiguous dynamic array with O(1) random access and amortized
    O(1) push_back; it is cache-friendly and the default choice. std::list is a doubly-linked
    list with O(1) insertion/deletion anywhere but O(n) index access and poor cache
    behavior — use it for stable iterators and frequent mid-list modifications. std::deque
    is a segmented buffer with O(1) push/pop at both ends and O(1) random access —
    use it for queue-like structures with indexing.
  spec: null
  simulator_trigger: Simulator UE neighbor list storage — vector for static APN lists,
    deque for FIFO event queues
  interview_context: Tests data structure selection for different simulator access
    patterns
- id: q028
  domain: cpp
  subdomain: stl
  tags:
  - cpp-stl
  - map
  level: senior
  question: Compare std::map and std::unordered_map. When do you prefer each?
  answer: std::map is a Red-Black Tree with sorted keys and O(log n) lookup; use it
    when you need sorted iteration, range queries (lower_bound/upper_bound), or non-hashable
    keys. std::unordered_map is a hash table with average O(1) and worst-case O(n)
    operations — use it as the default when order does not matter and keys are hashable.
    For very small sizes a flat sorted vector<pair<K,V>> may outperform both due to
    cache locality.
  spec: null
