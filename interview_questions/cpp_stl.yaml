- id: q030
  domain: cpp
  subdomain: stl
  tags:
  - cpp-stl
  - iterator
  - vector
  level: senior
  question: What is iterator invalidation, and how do you safely erase elements from
    a container while iterating?
  answer: 'Iterator invalidation occurs when a container modification causes existing
    iterators to become dangling or point to wrong elements. For std::vector, erasing
    an element invalidates all iterators at or after the erased position; for std::map
    and std::set, only the erased element''s iterator is invalidated. Safe pattern
    for vector: use the remove-erase idiom — v.erase(std::remove_if(...), v.end()).
    For associative containers: capture the iterator returned by erase — it = c.erase(it).'
  spec: null
  simulator_trigger: Simulator UE cleanup — erasing stale UE contexts from a vector
    during periodic garbage collection
  interview_context: Tests a subtle but common C++ bug source in container-traversal
    code in simulator maintenance tasks
- id: q031
  domain: cpp
  subdomain: stl
  tags:
  - cpp-stl
  - vector
  level: engineer
  question: Why does std::remove not actually remove elements from a vector?
  answer: std::remove is a pure algorithm — it rearranges elements so that unwanted
    values are moved to the end and returns an iterator to the new logical end, but
    it never changes the container's size() because it has no access to the container
    object. To actually shrink the vector, call v.erase(new_end, v.end()) — this is
    the canonical remove-erase idiom. In C++20, the std::erase and std::erase_if free-functions
    do both steps in one call.
  spec: null
  simulator_trigger: Simulator expired subscription cleanup — remove-erase idiom on
    subscription_list_ vector in mme_node.cpp
  interview_context: Tests a frequent source of bugs where developers call remove
    thinking it modifies container size
- id: q032
  domain: cpp
  subdomain: stl
  tags:
