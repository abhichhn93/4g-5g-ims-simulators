- id: q035
  domain: cpp
  subdomain: stl
  tags:
  - cpp17
  - optional
  level: senior
  question: What is std::optional, and when should you use it?
  answer: std::optional<T> represents a value that may or may not be present, without
    heap allocation — it avoids the magic-sentinel anti-pattern (returning -1 or nullptr
    to mean no value). Typical uses include returning from a function that may fail
    (optional<UeContext> find_ue(imsi)), optional parameters, and lazy initialization.
    Access with *opt or opt.value() (throws if empty), or opt.value_or(default); check
    with if (opt) or opt.has_value().
  spec: null
