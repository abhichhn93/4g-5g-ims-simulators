- id: q033
  domain: cpp
  subdomain: stl
  tags:
  - cpp-stl
  - vector
  level: engineer
  question: What is the difference between emplace and insert / push_back in C++ containers?
  answer: insert and push_back require a pre-constructed object that is then copied
    or moved into the container. emplace and emplace_back forward constructor arguments
    directly and construct the object in-place inside the container's memory, eliminating
    any extra move or copy. Prefer emplace for complex types where construction involves
    allocations; for small trivially-copyable types the difference is negligible.
  spec: null
