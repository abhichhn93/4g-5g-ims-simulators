  level: senior
  question: Explain mmap() — what are its flags, when does a page fault occur, and
    what is MAP_SHARED vs MAP_PRIVATE?
  answer: mmap(addr, length, prot, flags, fd, offset) maps a file or anonymous memory
    into the process virtual address space. With MAP_SHARED, writes are visible to
    all processes mapping the same region and propagate to the backing file. With
    MAP_PRIVATE, writes trigger copy-on-write — the caller gets a private copy. MAP_ANONYMOUS
    creates zero-initialized memory not backed by a file. Pages are not allocated
    at mmap() time — a page fault occurs on first access (demand paging). Use msync()
    to force dirty pages to disk.
  spec: null
