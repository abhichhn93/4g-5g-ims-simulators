  question: What is a page fault? Distinguish between minor and major page faults.
  answer: 'A page fault occurs when a process accesses a virtual address whose page
    table entry is not marked present. The CPU raises an exception; the kernel''s
    page fault handler runs. Minor (soft) fault: the physical page exists (e.g., in
    another process''s page cache or shared COW page) but the PTE was not set — the
    kernel just updates the PTE, no disk I/O, ~1-5 µs. Major (hard) fault: the page
    must be read from disk (swap or file) — takes ~50 µs (NVMe) to 10 ms (HDD). mmap(),
    malloc(), and fork() all defer physical page allocation until first access (demand
    paging).'
