  level: engineer
  question: What is the difference between blocking and non-blocking sockets, and
    how do you set a socket non-blocking?
  answer: On a blocking socket, read(), write(), connect(), and accept() all block
    the calling thread until data is available or the operation completes. On a non-blocking
    socket, these calls return immediately with -1 and errno=EAGAIN/EWOULDBLOCK when
    they would block. Set non-blocking via fcntl(fd, F_SETFL, O_NONBLOCK) or pass
    SOCK_NONBLOCK to socket(). Non-blocking I/O is essential for single-threaded event
    loops and is required when using epoll in edge-triggered mode.
  spec: null
  simulator_trigger: socket_wrapper.h — O_NONBLOCK flag in all simulator socket creation
  interview_context: High-performance telecom daemons use reactor patterns with non-blocking
    sockets
