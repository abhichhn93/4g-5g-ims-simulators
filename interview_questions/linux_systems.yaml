  level: engineer
  question: How should a TCP/SCTP server handle SIGPIPE?
  answer: 'SIGPIPE is delivered when a process writes to a socket whose read end has
    been closed. The default action terminates the process — which would kill the
    entire server on a single dead client. The correct approach: ignore SIGPIPE globally
    with signal(SIGPIPE, SIG_IGN) or sigaction with SIG_IGN, and instead check return
    value of write()/send() for -1 with errno==EPIPE. Alternatively, pass MSG_NOSIGNAL
    to send() on a per-call basis to suppress the signal without changing the global
    disposition.'
  spec: null
