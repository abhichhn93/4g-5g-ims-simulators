  level: senior
  question: Explain the self-pipe trick for integrating signals with epoll.
  answer: The self-pipe trick converts a signal into a readable fd event, making it
    compatible with epoll. Create a pipe with pipe2(fds, O_NONBLOCK|O_CLOEXEC). In
    the signal handler (async-signal-safe), write(write_fd, 0x00, 1). In the epoll
    event loop, register read_fd for EPOLLIN. When the signal arrives, the handler
    writes a byte; epoll_wait returns the pipe as readable; the event loop reads and
    drains the byte, then handles the signal in the normal flow. On Linux 2.6.22+,
    signalfd() is the modern alternative.
  spec: null
