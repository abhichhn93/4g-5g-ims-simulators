  level: engineer
  question: What is the difference between sigaction() and signal()? Which should
    you use?
  answer: 'signal() has undefined, platform-dependent behavior: it may or may not
    reset the handler to SIG_DFL after delivery, and it does not block other signals
    during handler execution. sigaction() provides explicit, portable control: sa_mask
    specifies signals to block during the handler, SA_RESTART controls whether interrupted
    syscalls auto-restart, and SA_SIGINFO provides additional signal context via siginfo_t.
    Always use sigaction() in production code. signal() should only be used for setting
    SIG_DFL/SIG_IGN portably.'
