  level: senior
  question: 'Explain SCTP multi-homing: how does it work and what are its failure
    detection mechanisms?'
  answer: In SCTP multi-homing, each endpoint registers multiple IP addresses during
    the INIT/INIT-ACK handshake. Data flows over a designated primary path; the stack
    monitors all paths via periodic heartbeat messages. If the primary path fails
    (heartbeat timeout or RTO exceeded), SCTP automatically switches to a secondary
    path without notifying the application — the association remains alive. The heartbeat
    interval and rto_max are tunable via setsockopt with sctp_paddrparams.
  spec: RFC 4960
  simulator_trigger: SCTP comments in socket_wrapper.h — dual-homed SCTP configuration
  interview_context: Nokia/Ericsson nodes use dual-homed SCTP for link redundancy
    without session disruption
- id: q182
  domain: linux
  subdomain: sctp
  tags:
  - linux
  - sctp
  level: senior
  question: Explain SCTP multi-streaming and how it prevents head-of-line blocking.
  answer: An SCTP association can carry multiple independent streams, each identified
    by a Stream ID. Messages on stream N are delivered in order relative to other
    messages on stream N, but independently of other streams. A lost chunk only blocks
    reordering within its own stream. This is fundamentally different from TCP, where
    a single lost byte blocks all subsequent data. In Diameter, this allows control
    messages and accounting messages on separate streams, preventing a large accounting
    burst from delaying a time-critical authentication exchange.
  spec: RFC 4960
  simulator_trigger: SCTP comments in socket_wrapper.h — stream selection in sctp_sendmsg
  interview_context: Nokia base station controllers exploit SCTP streams to carry
    different message classes independently
- id: q183
  domain: linux
  subdomain: sctp
  tags:
  - linux
  - sctp
  level: senior
  question: How does SCTP's four-way handshake differ from TCP's three-way handshake,
    and why?
  answer: 'SCTP uses a four-way handshake: INIT → INIT-ACK (with a COOKIE) → COOKIE-ECHO
    → COOKIE-ACK. The server sends a stateless cookie in INIT-ACK; the client must
    echo it back before the server allocates state. This design prevents SYN-flood
    attacks as an inherent protocol mechanism. TCP''s three-way handshake does not
    include this anti-spoofing mechanism at the protocol level. SCTP also uses TSNs
    per chunk rather than TCP''s byte-stream sequence numbers, and supports selective
    acknowledgment (SACK) natively.'
  spec: RFC 4960
  simulator_trigger: SCTP comments in socket_wrapper.h — SCTP association setup in
    S1AP/NGAP handling
  interview_context: Telecom nodes must handle signaling storms; the SCTP cookie mechanism
