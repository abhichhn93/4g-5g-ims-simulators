  question: What is NUMA and why does it matter for telecom packet processing?
  answer: 'NUMA (Non-Uniform Memory Access) systems have multiple memory controllers;
    each CPU socket has local memory with lower latency (~80 ns) than remote memory
    on another socket (~120–160 ns). If the NIC is attached to socket 0 but the processing
    thread runs on socket 1, every DMA buffer access crosses the NUMA interconnect,
    adding ~30–50% latency and reducing throughput by up to 4x. Tools: numactl --hardware
    (topology), numastat (per-node allocation stats), lstopo (visual diagram). Mitigation:
    numactl -m 0 -N 0 ./daemon pins process and memory allocation to NUMA node 0.'
  spec: null
