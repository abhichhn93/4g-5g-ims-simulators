  question: How do you implement POSIX shared memory in C++? Walk through the API.
  answer: 'Writer: shm_open(''/region'', O_CREAT|O_RDWR, 0600), ftruncate(fd, size),
    mmap(NULL, size, PROT_READ|PROT_WRITE, MAP_SHARED, fd, 0), close(fd), then munmap
    and shm_unlink when done. Reader: shm_open with O_RDONLY and mmap with PROT_READ.
    Synchronization between writer and reader requires a semaphore or mutex placed
    inside the shared region, initialized with PTHREAD_PROCESS_SHARED. POSIX shared
    memory objects are implemented on Linux as files in tmpfs at /dev/shm.'
