- id: q196
  domain: linux
  subdomain: fd
  tags:
  - linux
  - fd
  level: engineer
  question: What does dup2(oldfd, newfd) do and why is it used?
  answer: 'dup2(oldfd, newfd) closes newfd if open (atomically) and makes it a duplicate
    of oldfd — both fds then point to the same open file description (shared offset,
    flags, locks). The atomicity is critical: a close(newfd); dup(oldfd) sequence
    has a race window where a signal handler could steal newfd. The most common use:
    redirect stdout/stderr before exec() by calling dup2(pipe_fd, STDOUT_FILENO).
    The duplicate does not share the close-on-exec flag (FD_CLOEXEC), which is cleared
    on the new fd.'
  spec: null
