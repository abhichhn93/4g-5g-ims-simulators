  level: senior
  question: How do you create a daemon process in Linux?
  answer: 'The classic double-fork method: (1) fork() — parent exits; (2) setsid()
    — child becomes session leader, detached from controlling terminal; (3) fork()
    again — grandchild cannot reacquire a terminal; (4) chdir(''/'') — avoid holding
    mount points; (5) umask(0) — reset file creation mask; (6) close all open fds
    or redirect stdin/stdout/stderr to /dev/null. Modern approach: use daemon(3) libc
    call or systemd with type=notify. systemd-managed daemons often use SD_NOTIFY
    instead of double-fork.'
  spec: null
