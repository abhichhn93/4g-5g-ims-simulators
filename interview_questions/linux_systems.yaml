- id: q199
  domain: linux
  subdomain: fd
  tags:
  - linux
  - fd
  level: senior
  question: What is FD_CLOEXEC and when should you set it?
  answer: FD_CLOEXEC (set via fcntl(fd, F_SETFD, FD_CLOEXEC) or at creation with O_CLOEXEC)
    causes the fd to be automatically closed when the process calls execve(). Without
    it, all open sockets and files are inherited by exec'd children — a security risk
    and resource leak. Modern code should always open fds with O_CLOEXEC (or SOCK_CLOEXEC
    for sockets) as the default, and explicitly clear it only for fds intentionally
    passed to children. This is the POSIX-recommended defensive default.
  spec: null
