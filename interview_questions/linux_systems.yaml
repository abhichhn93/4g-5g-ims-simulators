  question: What are Huge Pages? How do you use them and what are the trade-offs?
  answer: 'Huge pages use 2 MB (or 1 GB) page sizes instead of 4 KB, reducing TLB
    pressure dramatically. Explicit huge pages are pre-allocated via /proc/sys/vm/nr_hugepages,
    accessed via mmap(MAP_HUGETLB) or /dev/hugepages. Transparent Huge Pages (THP)
    are automatically promoted by the kernel; configured via /sys/kernel/mm/transparent_hugepage/enabled.
    Trade-offs: huge pages improve throughput for large working sets (databases, packet
    buffers) but increase COW cost (~500 µs for 2 MB vs ~1 µs for 4 KB) and waste
    memory for small allocations.'
