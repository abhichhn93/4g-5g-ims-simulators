  level: senior
  question: What is /proc/PID/fd and how do you use it to detect fd leaks?
  answer: '''/proc/<PID>/fd/'' is a directory where each entry is a symbolic link
    named by fd number, pointing to the actual resource (socket, file, pipe). Count
    open fds: ls /proc/<PID>/fd | wc -l. A steadily increasing count indicates a leak.
    Tools: lsof -p <PID> shows all open files with type, path, and fd number; valgrind
    --track-fds=yes detects fd leaks in tests. Monitor with: watch -n 5 ''ls /proc/<PID>/fd
    | wc -l''. EMFILE (''too many open files'') in production telecom is a critical
    incident.'
