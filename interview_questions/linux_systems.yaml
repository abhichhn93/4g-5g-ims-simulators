  level: engineer
  question: What does SO_REUSEADDR do and when do you need it?
  answer: SO_REUSEADDR allows a socket to bind to a local address/port that is in
    the TIME_WAIT state from a previous connection. Without it, restarting a server
    immediately after shutdown typically fails with EADDRINUSE because the kernel
    holds the port in TIME_WAIT for 2×MSL (typically 60–120 s). Set it with setsockopt(fd,
    SOL_SOCKET, SO_REUSEADDR, &opt, sizeof(opt)) before calling bind(). On Linux it
    also allows multiple sockets to bind to the same port when combined with SO_REUSEPORT.
  spec: null
  simulator_trigger: socket_wrapper.h — SO_REUSEADDR set before bind in server nodes
  interview_context: Telecom NFs undergo rolling restarts and must rebind well-known
    ports instantly
- id: q173
  domain: linux
  subdomain: sockets
  tags:
  - linux
  - socket
  - tcp
  level: senior
  question: What is SO_KEEPALIVE and what are its limitations for telecom use?
  answer: SO_KEEPALIVE enables the kernel to periodically send TCP keepalive probes
    on idle connections. If the peer fails to respond after tcp_keepalive_probes attempts
    (default 9), the connection is dropped. The system-wide defaults (tcp_keepalive_time=7200s,
    tcp_keepalive_intvl=75s) are far too slow for telecom use; individual sockets
    can be tuned with TCP_KEEPIDLE, TCP_KEEPINTVL, TCP_KEEPCNT via setsockopt(). SCTP
    provides its own heartbeat mechanism, making SO_KEEPALIVE less relevant on SCTP
    sockets.
  spec: null
