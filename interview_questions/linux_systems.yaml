    selection, flags), use sctp_sendmsg()/sctp_recvmsg() instead of send()/recv().
    Tune heartbeat via setsockopt(fd, IPPROTO_SCTP, SCTP_PEER_ADDR_PARAMS, &params)
    with SPP_HB_ENABLE set. Monitor path states with SCTP_GET_PEER_ADDR_INFO.
  spec: RFC 4960
