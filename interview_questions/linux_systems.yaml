  question: How would you implement an SCTP socket in C++ with multi-homing?
  answer: Use socket(AF_INET, SOCK_SEQPACKET, IPPROTO_SCTP) and add secondary addresses
    with sctp_bindx(fd, addrs, count, SCTP_BINDX_ADD_ADDR). On the connect side, use
