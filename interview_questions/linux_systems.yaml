- id: q190
  domain: linux
  subdomain: signals
  tags:
  - linux
  - signals
  level: senior
  question: What is an async-signal-safe function? Give examples of safe and unsafe
    functions.
  answer: 'An async-signal-safe function can be called safely from within a signal
    handler — it is either reentrant or atomic with respect to signals. Safe: write(),
    read(), close(), fork(), execve(), kill(), signal(), sigaction(), _exit(), sem_post().
    Unsafe (must NOT call from handler): printf(), malloc(), free(), syslog(), exit(),
    any stdio function, std::cout. Since signal handlers may interrupt malloc mid-execution
    (holding internal locks), calling malloc from a handler can deadlock. The standard
    pattern: set a volatile sig_atomic_t flag in the handler, process it in the main
    event loop.'
  spec: null
  simulator_trigger: socket_wrapper.h — signal handler uses write() not printf()
  interview_context: Nokia/Ericsson signaling servers use signal handlers for graceful
    shutdown and config reload
- id: q191
  domain: linux
