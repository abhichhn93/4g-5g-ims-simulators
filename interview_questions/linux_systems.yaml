- id: q176
  domain: linux
  subdomain: epoll
  tags:
  - linux
  - epoll
  level: senior
  question: Compare select, poll, and epoll. When would you choose each?
  answer: All three allow monitoring multiple file descriptors for I/O readiness.
    select uses fixed-size bitmasks (max 1024 fds), requires rebuilding the set every
    call, and scans all fds O(n). poll removes the 1024-fd limit using a pollfd array
    but still copies the entire array to the kernel on each call and returns O(n)
    results. epoll (Linux-only) maintains fd interest in the kernel via a red-black
    tree; epoll_wait returns only ready events in O(ready) time with a single registration
    copy. Use select only for portability; use poll for fewer than ~1000 fds; use
    epoll for high-concurrency servers with thousands of persistent connections.
  spec: null
  simulator_trigger: epoll usage in node servers — event loop implementation in simulator
  interview_context: Telecom signaling servers handle thousands of concurrent SCTP/TCP
    associations requiring epoll-based event loops
- id: q177
  domain: linux
  subdomain: epoll
  tags:
  - linux
  - epoll
  level: senior
  question: What is the difference between edge-triggered (ET) and level-triggered
    (LT) mode in epoll?
  answer: In level-triggered mode (the default), epoll_wait returns a fd as ready
    whenever its kernel buffer contains data — i.e., as long as the condition persists.
    In edge-triggered mode (EPOLLET), epoll_wait returns a notification only on the
    transition from 'not ready' to 'ready'. With ET, if you read only part of the
    available data, epoll_wait will not fire again for that fd until new data arrives.
    ET mode therefore requires reading in a loop until EAGAIN and using non-blocking
    fds. ET reduces syscall overhead when data arrives in bursts but is harder to
    implement correctly.
  spec: null
  simulator_trigger: epoll usage in node servers — EPOLLET flag in simulator event
    loop
  interview_context: High-throughput SCTP/TCP processing uses ET mode to minimize
    epoll_wait calls per burst
- id: q178
  domain: linux
  subdomain: epoll
  tags:
  - linux
  - epoll
  level: senior
  question: What are EPOLLONESHOT and EPOLLET, and how do they interact?
  answer: 'EPOLLONESHOT disarms the fd after one event — no further notifications
    until epoll_ctl(EPOLL_CTL_MOD) re-arms it. It is useful for multi-threaded event
    loops where you hand a fd to a worker thread and must prevent simultaneous events.
    EPOLLET provides edge triggering. When combined, you must re-arm the fd via epoll_ctl
    before calling read/write to avoid a race: new data arriving between the last
    read and re-arming would be missed if EPOLLET|EPOLLONESHOT is in use without careful
    ordering.'
  spec: null
  simulator_trigger: epoll usage in node servers — EPOLLONESHOT in multi-threaded
    simulator dispatcher
  interview_context: Thread-per-association models use EPOLLONESHOT to safely dispatch
    each association to a dedicated worker
- id: q179
  domain: linux
  subdomain: epoll
  tags:
  - linux
  - epoll
  level: senior
  question: What are the internal data structures epoll uses in the kernel?
  answer: epoll maintains a red-black tree to store all monitored fds (inserted/removed
    by epoll_ctl), enabling O(log n) insertion and deletion. A ready list (doubly-linked
    list) holds fds that currently have events; the kernel adds entries via per-fd
    callback functions registered at epoll_ctl time, triggered by the network subsystem
    when data arrives. epoll_wait simply removes entries from the ready list, giving
    O(ready) copy to userspace. This design avoids full fd-set copies on every call.
  spec: null
  simulator_trigger: epoll usage in node servers — understanding epoll scalability
    for 10,000+ SCTP associations
  interview_context: Understanding epoll internals is a common Nokia/Qualcomm systems
    design interview topic
- id: q180
  domain: linux
  subdomain: sctp
