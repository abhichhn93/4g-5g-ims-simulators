  question: How do you use perf for CPU profiling of a C++ signaling daemon?
  answer: 'perf record -g -p <PID> -- sleep 30 samples the call stack of a running
    process. perf report shows a hierarchical view of CPU time by function with call
    graphs. perf top -p <PID> provides live per-function CPU usage. perf stat -p <PID>
    reports hardware counters: IPC, cache misses, branch mispredictions. For flame
    graphs: perf record -g ./daemon; perf script | stackcollapse-perf.pl | flamegraph.pl
    > flame.svg. Requires frame pointer preservation (-fno-omit-frame-pointer) or
    DWARF unwinding (--call-graph dwarf).'
