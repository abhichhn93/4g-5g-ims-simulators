  level: engineer
  question: 'Compare all major Linux IPC mechanisms: pipes, FIFOs, Unix domain sockets,
    message queues, and shared memory.'
  answer: Anonymous pipes are unidirectional, process-lifetime. Named pipes (FIFOs)
    are unidirectional, filesystem-persisted. Unix domain sockets are bidirectional,
    stream or dgram, pollable via epoll. POSIX message queues are bidirectional, typed,
    kernel-managed. Shared memory (shm_open + mmap) is the fastest — zero kernel involvement
    in the data path after setup, but requires explicit synchronization. For small
    messages, performance differences are minor; for large buffers (packet processing),
    shared memory wins by 5–10x. Sockets are most flexible for multi-client, pollable
    use cases.
  spec: null
  simulator_trigger: epoll usage in node servers — IPC between simulator processes
  interview_context: Nokia/Ericsson signaling agents on multi-core servers use IPC
    for inter-process communication
- id: q186
  domain: linux
  subdomain: ipc
  tags:
