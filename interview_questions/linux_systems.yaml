  level: engineer
  question: Describe the full lifecycle of a TCP server socket from socket() to accept().
  answer: A TCP server calls socket(AF_INET, SOCK_STREAM, 0) to create an endpoint,
    then bind() to associate it with an IP/port, listen(fd, backlog) to mark it passive
    and set the connection queue length, and accept() to dequeue completed connections
    from the kernel's accept queue, returning a new fd per client. The original listening
    socket remains open to accept further connections. accept() blocks until a client
    completes the three-way handshake unless the socket is set non-blocking.
  spec: null
  simulator_trigger: socket_wrapper.h — TCP server socket creation in simulator node
    startup
  interview_context: Tests socket lifecycle knowledge required for every telecom server
    implementation
- id: q172
  domain: linux
