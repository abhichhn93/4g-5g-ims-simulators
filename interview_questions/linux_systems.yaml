  question: Describe the Linux virtual address space layout for a 64-bit process.
  answer: 'In a typical 64-bit Linux process (x86_64), the virtual address space is
    128 TB (48-bit addressing). Layout from low to high: null guard page → text segment
    (code) → initialized data (.data/.bss) → heap (grows up via brk()/mmap()) → mmap
    region (shared libs, mmap() allocations, grows down from ~0x7fff...) → stack (grows
    down from near 0x7fff...) → kernel space (above 0xffff800000000000, inaccessible
    from userspace). The stack and heap are separated by the large unallocated mmap
    region. Stack typically defaults to 8 MB (ulimit -s).'
