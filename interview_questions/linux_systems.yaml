  level: senior
  question: What happens if send() returns fewer bytes than requested on a non-blocking
    socket?
  answer: A partial send() is normal on non-blocking sockets when the kernel send
    buffer is partially full. The return value indicates how many bytes were actually
    queued. The application must buffer the remainder and retry the send when the
    socket becomes writable again (signaled by epoll/poll with POLLOUT). This pattern
    is critical to implement correctly; failing to handle partial writes is a common
    source of data corruption in telecom messaging stacks.
  spec: null
