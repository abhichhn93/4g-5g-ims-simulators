  level: senior
  question: Why does telecom use SCTP instead of TCP for protocols like S1AP and Diameter?
  answer: SCTP (Stream Control Transmission Protocol, RFC 4960) was designed for telephony
    signaling transport. Unlike TCP, SCTP is message-oriented (preserves message boundaries
    like UDP), provides multi-homing (multiple IP addresses per association for automatic
    failover), and multi-streaming (multiple independent streams in one association
    to eliminate head-of-line blocking). S1AP (LTE eNB-to-MME) and Diameter both mandate
    SCTP because a single IP failure in TCP drops the entire connection, whereas SCTP
    silently fails over to a secondary path.
  spec: RFC 4960
  simulator_trigger: SCTP comments in socket_wrapper.h — IPPROTO_SCTP usage in S1/N2
    interfaces
  interview_context: Every Nokia/Ericsson 4G/5G signaling interface uses SCTP — fundamental
    knowledge for telecom C++ engineers
- id: q181
  domain: linux
  subdomain: sctp
  tags:
