  level: engineer
  question: What is O_NONBLOCK and how do you set it after socket creation?
  answer: 'O_NONBLOCK causes I/O system calls to return immediately with EAGAIN/EWOULDBLOCK
    instead of blocking when data is unavailable. Set at creation: socket(AF_INET,
    SOCK_STREAM | SOCK_NONBLOCK, 0). Set after creation: int flags = fcntl(fd, F_GETFL);
    fcntl(fd, F_SETFL, flags | O_NONBLOCK). Note: accept() on non-blocking listener
    returns -1/EAGAIN when no connections are pending, and returned client sockets
    may not inherit the non-blocking flag — always set explicitly on accepted fds.'
  spec: null
