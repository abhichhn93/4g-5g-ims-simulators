- id: q192
  domain: linux
  subdomain: process
  tags:
  - linux
  - fork
  level: beginner
  question: What does fork() return and what is the state of the child process?
  answer: 'fork() returns the child''s PID to the parent and 0 to the child; on error
    it returns -1. The child is an exact copy of the parent''s address space (using
    copy-on-write pages), inherits all open file descriptors, signal dispositions,
    environment, and memory mappings. The child does not inherit: the parent''s pending
    signals, memory locks (mlock), or POSIX timers. Open file descriptors are shared
    — changes to the file offset in one process are visible to the other unless O_CLOEXEC
    was set.'
  spec: null
  simulator_trigger: epoll usage in node servers — fork() in simulator process management
  interview_context: Telecom daemons use fork() to create worker processes; understanding
    fd inheritance is critical
- id: q193
  domain: linux
  subdomain: process
  tags:
  - linux
  - fork
  level: engineer
  question: What is a zombie process? How does it occur and how do you prevent it?
  answer: 'A zombie is a process that has exited but whose exit status has not yet
    been collected by its parent via wait()/waitpid(). The kernel retains the process
    table entry (PID, exit status) until the parent reaps it. Zombies consume a PID
    and a PCB entry but no memory or CPU. Prevention: call wait()/waitpid() in the
    parent, install a SIGCHLD handler that reaps children, or set SA_NOCLDWAIT/signal(SIGCHLD,
    SIG_IGN) to auto-reap. If the parent dies first, orphaned children are re-parented
    to init/systemd which reaps them.'
  spec: null
  simulator_trigger: epoll usage in node servers — child process reaping in simulator
    supervisor
  interview_context: Nokia/Ericsson supervisory daemons spawn worker subprocesses
    — zombie accumulation exhausts PID namespace
- id: q194
  domain: linux
  subdomain: process
  tags:
  - linux
  - fork
  level: engineer
  question: Explain exec() and the exec family. What is preserved after execve()?
  answer: 'execve(path, argv, envp) replaces the calling process''s code, data, stack,
    and heap with a new program image, but reuses the same PID. After execve(): open
    file descriptors without FD_CLOEXEC are inherited; signal dispositions set to
    SIG_DFL/SIG_IGN are preserved but custom handlers are reset to SIG_DFL; UID/GID
    are preserved unless setuid binary. exec variants differ by argument passing:
    execl/execv (explicit args/array), execle/execve (with env), execlp/execvp (PATH
    search). The canonical fork-exec pattern: fork(), set up fds in child, then execve().'
  spec: null
  simulator_trigger: epoll usage in node servers — fork-exec pattern in NF process
    launching
  interview_context: Telecom application managers use fork-exec to launch NF processes;
    fd inheritance is critical to avoid socket leaks
