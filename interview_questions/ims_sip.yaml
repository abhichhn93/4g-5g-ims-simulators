  - volte-bearer
  level: senior
  question: What Diameter commands are used on the Rx interface and for what purpose?
  answer: 'The Rx interface (App-ID 16777236) uses: AAR/AAA (AA-Request/Answer) —
    P-CSCF provides SDP-derived media information and requests QoS authorization,
    sent at call setup on both MO and MT sides; RAR/RAA (Re-Auth) — PCRF triggers
    media/flow updates mid-session; STR/STA (Session-Termination) — P-CSCF terminates
    the Rx session on SIP BYE, triggering bearer teardown; ASR/ASA (Abort-Session)
    — PCRF-initiated session abort (e.g., policy violation). The AAR carries Media-Component-Description
    AVPs with SDP-derived flow info.'
  spec: TS 29.214, TS 23.203
  simulator_trigger: CALL command — Rx AAR from p_cscf_node.cpp to PCRF; Rx STR on
    SIP BYE to release QCI=1 bearer
  interview_context: Tests Rx interface command knowledge critical for VoLTE bearer
    lifecycle debugging
- id: q120
  domain: ims
  subdomain: sip
  tags:
  - sip
  - p-cscf
  - s-cscf
  - ims-epc
  level: senior
  question: Describe the IMS emergency call architecture. What are the E-CSCF and
    LRF?
  answer: IMS emergency calls use two additional elements beyond normal IMS. The E-CSCF
    (Emergency CSCF) routes emergency SIP sessions to the correct PSAP (Public Safety
    Answering Point) — when P-CSCF detects an emergency URN (urn:service:sos), it
    routes the INVITE to the E-CSCF, which retrieves UE location from the LRF and
    forwards to the correct PSAP. The LRF (Location Retrieval Function) retrieves
    UE location (GPS, Cell-ID) and uses the RDF (Routing Determination Function) to
    map location to the correct PSAP, providing an ESQK in North America.
  spec: TS 23.167, TS 24.229
  simulator_trigger: CALL command with emergency=true — P-CSCF routes to E-CSCF simulator
    for PSAP lookup
  interview_context: Tests emergency IMS architecture knowledge required for regulatory
    compliance testing
- id: q121
  domain: ims
  subdomain: sip
  tags:
  - sip
  - ims-register
  - p-cscf
  - ims-epc
  level: senior
  question: What are the procedures for a UE initiating a VoLTE emergency call when
    not IMS-registered?
  answer: An unregistered UE performs emergency attach (even without a valid SIM in
    some regions), then IMS APN PDN connection for emergency. If the UE has credentials
    it performs emergency IMS registration with an sos indication in the Contact header;
    if not, it sends an anonymous SIP INVITE directly to P-CSCF with the sos URN —
    no registration required, as P-CSCF routes directly to E-CSCF. The QCI=1 emergency
    bearer uses ARP priority 1 with preemption capability to guarantee resources under
    congestion; if IMS emergency fails, the UE must retry via CS domain (CSFB).
  spec: TS 23.167 §7.1, TS 24.229
  simulator_trigger: CALL command with emergency=true and unregistered UE — anonymous
    SIP INVITE to E-CSCF path
  interview_context: Tests IMS emergency call edge cases required for regional regulatory
    compliance (e.g., FCC, OFCOM)
- id: q122
  domain: ims
  subdomain: sip
  tags:
  - sip
  - p-cscf
  - s-cscf
  level: senior
  question: What SIP headers carry location information in an IMS emergency call?
  answer: The Geolocation header (RFC 6442) contains a URI pointing to a PIDF-LO (Presence
    Information Data Format — Location Object) XML body attached to the SIP message
    or a dereferenceable HTTP URL; the PIDF-LO carries geodetic or civic location.
    The P-Access-Network-Info (PANI) header is inserted by the P-CSCF with access-network-specific
    location (e.g., 3GPP-E-UTRAN-FDD; utran-cell-id=<PLMN><TAC><CellID>); this is
    lower accuracy but always available. The E-CSCF provides the Geolocation reference
    to the LRF for precise PSAP routing.
  spec: TS 23.167, TS 24.229, RFC 6442, RFC 4119
  simulator_trigger: CALL command emergency path — PANI header inserted by p_cscf_node.cpp;
    Geolocation header in SIP INVITE body
  interview_context: Tests SIP emergency location header knowledge required for E911/emergency
    service implementation
- id: q123
  domain: ims
  subdomain: sip
  tags:
  - ims-epc
  - ims-register
  - p-cscf
  - s-cscf
  level: senior
  question: What is SGW relocation during a VoLTE call and how does it affect IMS?
  answer: 'SGW relocation occurs during handover when the UE moves to a cell served
    by a different SGW; the PGW remains as the IP anchor so the UE''s IP address and
    QCI=1 bearer are preserved and from the IMS perspective the SIP session is completely
    unaffected (P-CSCF sees the same UE IP throughout). The relocation involves a
    Create Session Request cycle establishing new S5/S8 tunnels between the new SGW
    and PGW. The critical point for VoLTE: the GBR QCI=1 bearer must be re-established
    on the new SGW with the same QoS parameters — if that fails, SRVCC may trigger.'
  spec: TS 23.401 §5.3.3.1, TS 23.216
  simulator_trigger: TAU with SGW relocation during active CALL — simulator verifies
    QCI=1 bearer is re-established on new SGW
  interview_context: Tests understanding of IMS-EPC interaction under mobility — a
    real-world VoLTE drop root-cause scenario
- id: q124
  domain: ims
  subdomain: sip
  tags:
  - volte-call
  - sip
  - ims-register
  - sip-register
  level: engineer
  question: What is the re-registration requirement in IR.92, and why must the UE
    re-register before expiry?
  answer: IR.92 requires the UE to re-register before the SIP registration expiry
    timer to maintain continuous IMS registration. If the UE fails to re-register
    before expiry, the S-CSCF removes the IMPU binding and the UE becomes unreachable
    for incoming calls — all incoming SIP INVITEs will return 480 Temporarily Unavailable.
    The UE typically re-registers at 50%–60% of the expiry time. Network restarts
    (e.g., S-CSCF failover) also require immediate re-registration since S-CSCF state
    is lost.
  spec: GSMA IR.92, TS 24.229
  simulator_trigger: REGISTER command — simulator times re-registration at 60% of
    Expires value via registration_timer.cpp
  interview_context: Tests IMS registration maintenance knowledge needed for UE registration
    robustness testing
- id: q125
  domain: ims
  subdomain: sip
  tags:
  - cx
  - s-cscf
  - hss
  - ims-register
  level: senior
  question: What is the RTR (Registration-Termination-Request) in the Cx interface
    and when is it sent?
  answer: 'The RTR (Registration-Termination-Request) is an HSS-initiated Diameter
    Cx command sent to the S-CSCF to force deregistration of an IMS subscriber. It
    is sent when: the subscriber''s service is removed or suspended by the operator;
    the HSS is migrated; or the subscription expires. The S-CSCF responds with RTA,
    deregisters the UE, sends a SIP NOTIFY to the UE (reg event package) informing
    it of deregistration, and sends SAR with assignment type TIMEOUT or USER_DEREGISTRATION
    to clean up the HSS binding. The UE will attempt re-registration after receiving
    the NOTIFY.'
  spec: TS 29.228, TS 29.229
  simulator_trigger: REGISTER command — HSS simulator sends RTR to S-CSCF when operator
    disables subscription during session
  interview_context: Tests knowledge of HSS-initiated IMS deregistration flows important
    for subscriber lifecycle management
- id: q126
  domain: ims
  subdomain: sip
  tags:
  - ims-register
  - p-cscf
  - s-cscf
  - sip
  level: engineer
  question: What is an implicit registration set in IMS, and how does it affect SUBSCRIBE/NOTIFY?
  answer: An implicit registration set is a group of IMPUs that are always registered
    and deregistered together as a unit — when one IMPU in the set is registered,
    all others are automatically registered simultaneously. The HSS stores the implicit
    registration set and delivers all IMPUs to the S-CSCF in the SAA user profile.
    After registration, when the UE subscribes to the reg event package, the S-CSCF
    sends a NOTIFY containing the registration status of all IMPUs in the implicit
    registration set — the UE learns all its registered identities in a single NOTIFY.
  spec: TS 23.228, TS 24.229
  simulator_trigger: REGISTER command — S-CSCF sends NOTIFY with all IMPUs in implicit
    set after SAR/SAA completes
  interview_context: Tests implicit registration set semantics often misunderstood
    in multi-IMPU subscriber scenarios
- id: q127
  domain: ims
  subdomain: sip
  tags:
  - sip
  - prack
  - update
  - sip-invite
  - volte-call
  level: senior
  question: What is the role of SIP PRACK and UPDATE in VoLTE call setup, and why
    does IR.92 require them?
  answer: PRACK (Provisional ACK, RFC 3262) provides reliable delivery of 1xx provisional
    responses (e.g., 183 Session Progress) — without it, the originating UE cannot
    confirm the terminating side's SDP answer was received and cannot safely proceed
    with QoS precondition establishment. UPDATE (RFC 3311) modifies session parameters
    (e.g., SDP for precondition status) mid-dialog without changing the dialog state
    or call direction. IR.92 requires both PRACK (100rel extension) and UPDATE to
    ensure reliable precondition negotiation and bearer confirmation before the phone
    rings, preventing ghost rings.
  spec: RFC 3262, RFC 3311, TS 24.229, GSMA IR.92
  simulator_trigger: CALL command — PRACK sent by originating UE after 183; UPDATE
    sent to confirm QoS preconditions met
  interview_context: Tests detailed SIP signaling knowledge for VoLTE precondition-based
    call setup reliability
- id: q128
  domain: ims
  subdomain: sip
  tags:
  - ims-epc
  - volte-bearer
  - qci1
  - rx-interface
  - gx
  level: senior
  question: What is the IMS APN in LTE and what bearers does it carry?
  answer: The IMS APN is a dedicated LTE APN (access point name) used exclusively
    for IMS signaling and media traffic, separate from the internet APN. When the
    UE connects to the IMS APN, a QCI=5 non-GBR default bearer is established immediately
    for SIP signaling (REGISTER, INVITE, BYE). During a VoLTE call, a dedicated QCI=1
    GBR bearer is added to carry RTP voice media; for video calls a QCI=2 GBR bearer
    is added for video RTP. The IMS APN may be provisioned separately in the HSS with
    restricted MBR/AMBR values configured for IMS traffic only.
  spec: TS 23.203, GSMA IR.92
  simulator_trigger: 4G ATTACH command — UE connects to IMS APN establishing QCI=5
    bearer; CALL command adds QCI=1 bearer
  interview_context: Tests IMS APN and bearer coexistence model needed for VoLTE deployment
    and troubleshooting roles
- id: q129
  domain: ims
  subdomain: sip
  tags:
  - sip
  - sip-invite
  - volte-call
  level: engineer
  question: What happens when a SIP INVITE receives a 486 Busy Here response in VoLTE?
  answer: A 486 Busy Here response from the terminating UE or MTAS indicates the called
    party is busy and cannot accept the call. The originating S-CSCF forwards the
    486 to the originating UE, which generates a SIP ACK to complete the three-way
    handshake for the failed INVITE (per RFC 3261, error responses to INVITE must
    be ACKed). No QCI=1 dedicated bearer is ever established; the originating UE may
    play a busy tone locally. If call waiting is not active on the terminating UE
    or the UE is truly occupied, the MTAS sends the 486.
  spec: RFC 3261, TS 24.229
  simulator_trigger: CALL command to busy UE — 486 returned by MTAS; simulator verifies
    no QCI=1 bearer created on MO side
  interview_context: Tests SIP error handling and bearer management knowledge in call
    rejection scenarios
- id: q130
  domain: ims
  subdomain: sip
  tags:
  - ims-register
  - p-cscf
  - sip-register
  - ims-epc
  level: senior
  question: What is network-initiated session release in IMS, and how does the P-CSCF
    detect UE loss of connectivity?
  answer: 'Network-initiated session release occurs when the network detects the UE
    is unreachable and proactively terminates the SIP session. The P-CSCF detects
    UE loss of connectivity by: monitoring subscription to the reg event package (if
    the UE''s registration expires without renewal); detecting bearer loss on the
    EPC side (the PGW/PCRF notifies P-CSCF via Rx ASR of PDN connection release);
    or missing SIP OPTIONS keep-alive responses. When detected, the P-CSCF sends a
    SIP BYE to the S-CSCF to clean up all active dialogs, and the S-CSCF sends SIP
    NOTIFY (deregistered) to any remaining subscriptions.'
  spec: TS 23.228, TS 24.229, TS 29.214
  simulator_trigger: CHAOS command — simulator kills UE bearer and verifies P-CSCF
    sends SIP BYE for active call cleanup
  interview_context: Tests fault-handling knowledge needed for VoLTE session cleanup
    in network failure scenarios
