  question: Walk through the 5G PDU Session Establishment procedure (16 steps).
  answer: The UE sends PDU Session Establishment Request (NAS); AMF invokes Nsmf_PDUSession_CreateSMContext
    (HTTP/2 POST); SMF fetches SM subscription from UDM and PCC rules from PCF; SMF
    sends PFCP Session Establishment Request to UPF with PDRs, FARs, QERs, URRs, and
    gets UPF F-TEID; SMF returns context to AMF, which sends NGAP PDU Session Resource
    Setup Request to gNB; gNB configures DRB and responds with gNB F-TEID; AMF forwards
    gNB tunnel info to SMF, which sends PFCP Session Modification Request to UPF updating
    the FAR's downlink F-TEID. After step 16, GTP-U tunnels are fully established.
  spec: TS 23.502 §4.3.2, TS 24.501 §6.4, TS 29.244
  simulator_trigger: 5G PDU session command — 16-step flow traced in 5g_pdu_session_handler.cpp
  interview_context: 5G equivalent of the LTE Create Session walkthrough — senior-level
    expectation in any SMF/UPF role
- id: q145
  domain: 5g
  subdomain: auth_security
  tags:
  - smf
  - pdu-session
  - upf
  level: senior
  question: What are the three SSC (Session and Service Continuity) modes in 5G?
  answer: 'SSC Mode 1: the UPF anchor never changes for the PDU session lifetime —
    use for VoNR and enterprise VPN requiring a stable IP. SSC Mode 2: the network
    releases the old session and creates a new one (break-before-make) — for best-effort
    internet browsing. SSC Mode 3: the network creates a new session before releasing
    the old (make-before-break) — for video streaming or gaming requiring minimal
    interruption. SSC mode is negotiated at session establishment; UDM subscription
    data may restrict allowed modes per DNN.'
  spec: TS 23.501 §5.6.9, TS 23.502 §4.3.3
  simulator_trigger: 5G PDU session command — simulator tests SSC Mode 1/2/3 behavior
    during UPF relocation in mobility scenarios
  interview_context: Tests 5G session continuity model knowledge that has no direct
    4G equivalent
- id: q146
  domain: 5g
  subdomain: auth_security
  tags:
  - upf
  - pfcp
  - n4
  - smf
  - pdu-session
  level: senior
  question: What are PDRs, FARs, QERs, and URRs in PFCP? What does each do?
  answer: 'PDR (Packet Detection Rule) matches incoming packets using criteria such
    as source interface, SDF filter (IP 5-tuple), or TEID — each PDR has a precedence
    and points to a FAR. FAR (Forwarding Action Rule) specifies what to do with matched
    packets: forward (with destination IP/TEID), drop, buffer (for idle UE), or duplicate
    — updated when the gNB TEID becomes known. QER (QoS Enforcement Rule) enforces
    MBR, GBR, and gate status per QoS flow via token-bucket policing. URR (Usage Reporting
    Rule) triggers volume/time/event-based usage reports to SMF for CHF charging.'
  spec: TS 29.244 §7.5–7.8
  simulator_trigger: 5G PDU session command — PFCP rules installed in UPF simulator
    via N4 in pfcp_session_manager.cpp
  interview_context: Tests PFCP rule knowledge essential for UPF implementation and
    N4 interface debugging
