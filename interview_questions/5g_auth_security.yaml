  level: senior
  question: Explain end-to-end network slicing in 5G — how do RAN, Core, and Transport
    slices work together?
  answer: 'End-to-end slicing isolates networks logically on shared physical infrastructure
    across three domains: RAN uses S-NSSAI-based scheduler differentiation, dedicated
    bandwidth parts, or dedicated DRBs per slice; the 5GC deploys dedicated or shared
    NF instances per S-NSSAI with per-slice NF registration in the NRF; and the transport
    network uses DSCP or FlexE/VLAN-based isolation in backhaul and fronthaul. The
    NSSF orchestrates core slice selection; Allowed NSSAI in the Registration Accept
    propagates RAN-level slice awareness via NGAP. IETF/3GPP transport slicing maps
    5QI values to DSCP/CoS markings.'
  spec: TS 23.501 §5.15, TR 28.530
  simulator_trigger: network-slicing command — simulator validates end-to-end slice
    isolation across RAN, CN, and transport simulators
  interview_context: Tests architect-level understanding of end-to-end slicing — needed
    for network slice design roles
- id: q151
  domain: 5g
  subdomain: auth_security
  tags:
  - network-slicing
  - nssai
  - sst
  - nssf
  level: senior
  question: What are the security isolation challenges unique to 5G network slicing?
  answer: Slices share physical infrastructure, enabling cross-slice resource exhaustion
    attacks where a UE flooding one slice can degrade another if shared NFs like AMF
    are not slice-aware rate-limited. Authentication credentials (SUPI, AUSF) are
    shared across slices, so slice isolation must be enforced at NF and data plane
    level rather than at the identity level. Misconfigured NSSAI mapping could allow
    a low-security IoT slice subscriber to access a high-security URLLC slice's NFs.
    The NRF's slice-specific deployment must prevent NF producers in one slice from
    being discoverable by consumers in another.
  spec: TS 33.501 §9, TS 23.501 §5.15.6
  simulator_trigger: network-slicing command with cross_slice_attack=true — simulator
    verifies AMF rate-limiting and NRF slice isolation
  interview_context: Architect-level question testing ability to reason about security
    invariants across slice boundaries
