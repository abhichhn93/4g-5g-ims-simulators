  level: senior
  question: What is the AUSF, and what is its role in 5G authentication?
  answer: The AUSF (Authentication Server Function) resides in the HPLMN and handles
    UE authentication for 3GPP and non-3GPP access. When SEAF (in AMF) requests authentication,
    AUSF contacts UDM for the 5G HE AV, computes HXRES* (hashed expected response),
    and sends the 5G SE AV (with RAND, AUTN, HXRES*) to SEAF. Only after SEAF confirms
    HRES* = HXRES* and forwards RES* does AUSF verify RES* = XRES* and send K_SEAF
    + SUPI to the serving network. This dual confirmation prevents a rogue serving
    network from falsely claiming authentication success.
  spec: TS 33.501 §6.1, TS 29.509
  simulator_trigger: 5G REG command — AUSF receives SUCI from AMF, contacts UDM, returns
    5G SE AV in ausf_node.cpp
  interview_context: Tests 5G-AKA two-phase verification understanding — the most
    architecturally distinct 5G security feature
- id: q142
  domain: 5g
  subdomain: auth_security
  tags:
  - udm
  - ausf
  - 5g-auth
  - suci
  - supi
  level: senior
  question: What are the ARPF and SIDF, and where do they reside in 5G?
  answer: The ARPF (Authentication credential Repository and Processing Function)
    stores the long-term subscriber key (K) and SQN, and performs AKA cryptographic
    computations generating RAND, AUTN, XRES*, CK, IK, and K_AUSF. The SIDF (Subscription
    Identifier De-concealing Function) holds the Home Network private key and uses
    it to decrypt SUCI back to SUPI using ECIES. Both are logical functions co-located
    within the UDM node — not deployed as separate network elements — ensuring the
    home network retains exclusive control of subscriber credentials.
  spec: TS 33.501 §5.2.5, §6.12.2
  simulator_trigger: 5G REG command — UDM/ARPF generates 5G HE AV; UDM/SIDF decrypts
    SUCI to SUPI in udm_node.cpp
  interview_context: Tests UDM internal functional decomposition knowledge expected
    at senior security engineering level
