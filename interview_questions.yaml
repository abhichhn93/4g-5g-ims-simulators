    level: "engineer"
    question: "What are the key functions of the SGW in LTE?"
    answer: "The SGW is the user-plane anchor for intra-LTE mobility and the control-plane relay for session management. Its functions include user-plane routing (forwarding user data between eNodeB via S1-U GTP-U and PGW via S5/S8 GTP-U), mobility anchoring during X2 handover path switches, downlink buffering for idle UEs triggering paging, DSCP packet marking based on QCI, and lawful intercept. The SGW holds both S11 (GTPv2-C from MME) and S1-U (GTP-U to eNB) — it is a cross-layer node."
