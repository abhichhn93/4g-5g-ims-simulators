    question: "How do you prevent deadlocks in a multi-threaded C++ program?"
    answer: "A deadlock requires four Coffman conditions: mutual exclusion, hold-and-wait, no preemption, and circular wait — breaking any one prevents it. Practical strategies include always acquiring multiple locks in a consistent global order; using std::scoped_lock (C++17) which atomically acquires multiple mutexes in a deadlock-free manner; and applying try_lock_for timeouts so threads can back off and retry. Detect potential lock-acquisition cycles during code review."
    spec: null
