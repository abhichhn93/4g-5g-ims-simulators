    level: "engineer"
    question: "What is the override and final specifier in C++?"
    answer: "override on a derived-class function signals intent to override a base virtual; the compiler emits an error if no matching virtual exists in the base class. final on a virtual function prevents further overriding; final on a class prevents subclassing. Both improve clarity and catch signature-mismatch bugs at compile time."
    spec: null
