      - "virtual"
      - "polymorphism"
    level: "engineer"
    question: "What is the difference between virtual functions and pure virtual functions?"
    answer: "A virtual function has a definition in the base class and can be overridden in derived classes; derived classes are not required to override it. A pure virtual function is declared with = 0, has no base-class body, and must be overridden by any concrete derived class. A class with at least one pure virtual function is abstract and cannot be instantiated directly."
    spec: null
    simulator_trigger: "Any simulator node base class with virtual dispatch (e.g., NodeBase in simulator node hierarchy)"
    interview_context: "Baseline OOP check — every C++ engineer must know this cleanly"

  - id: "q002"
    domain: "cpp"
    subdomain: "oop"
    tags:
      - "cpp-oop"
      - "virtual"
      - "polymorphism"
    level: "senior"
    question: "Explain how the vtable (virtual table) mechanism works in C++."
    answer: "When a class declares at least one virtual function, the compiler generates a per-class vtable — a static array of function pointers, one per virtual function. Each object carries a hidden vptr pointing to its class's vtable. When a virtual function is called through a base-class pointer, the runtime follows object → vptr → vtable → function pointer. This is dynamic dispatch and enables runtime polymorphism."
    spec: null
    simulator_trigger: "Simulator node polymorphism — e.g., MmeNode and AmfNode both derive from a common ProtocolNode base"
    interview_context: "Tests understanding of the internals behind runtime polymorphism"

  - id: "q003"
    domain: "cpp"
    subdomain: "oop"
    tags:
      - "cpp-oop"
      - "virtual"
      - "polymorphism"
    level: "senior"
    question: "Why can't constructors be virtual? Why should destructors in polymorphic base classes be virtual?"
    answer: "Constructors cannot be virtual because virtual dispatch requires a fully constructed object with a valid vptr, which does not yet exist during construction. Destructors in a polymorphic base class must be virtual so that deleting a derived object via a base-class pointer calls the derived destructor first, preventing resource leaks in the derived part."
    spec: null
    simulator_trigger: "Resource cleanup in simulator node teardown — NodeBase destructor must be virtual"
    interview_context: "Detects knowledge of a common real-world bug in polymorphic hierarchies"

