      - "p-cscf"
      - "pcrf"
      - "qci1"
      - "volte-bearer"
    level: "senior"
    question: "What Diameter commands are used on the Rx interface and for what purpose?"
    answer: "The Rx interface (App-ID 16777236) uses: AAR/AAA (AA-Request/Answer) — P-CSCF provides SDP-derived media information and requests QoS authorization, sent at call setup on both MO and MT sides; RAR/RAA (Re-Auth) — PCRF triggers media/flow updates mid-session; STR/STA (Session-Termination) — P-CSCF terminates the Rx session on SIP BYE, triggering bearer teardown; ASR/ASA (Abort-Session) — PCRF-initiated session abort (e.g., policy violation). The AAR carries Media-Component-Description AVPs with SDP-derived flow info."
