    question: "What is CRTP (Curiously Recurring Template Pattern) and when do you use it?"
    answer: "CRTP is a compile-time polymorphism technique where a base template class takes the derived class as its own template parameter: template<class D> class Base { void interface() { static_cast<D*>(this)->impl(); } }; class Concrete : public Base<Concrete>. The base can call derived methods via static_cast at zero runtime cost — no vtable overhead. Use CRTP for performance-critical libraries and static duck typing; the trade-off is you cannot store heterogeneous CRTP types in a vector<Base*>."
