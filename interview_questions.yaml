  # ---------------------------------------------------------------------------
  # IMS / VoLTE — Emergency Calls (q120–q122)
  # ---------------------------------------------------------------------------

  - id: "q120"
    domain: "ims"
    subdomain: "emergency"
    tags:
      - "sip"
      - "p-cscf"
      - "s-cscf"
      - "ims-epc"
    level: "senior"
    question: "Describe the IMS emergency call architecture. What are the E-CSCF and LRF?"
    answer: "IMS emergency calls use two additional elements beyond normal IMS. The E-CSCF (Emergency CSCF) routes emergency SIP sessions to the correct PSAP (Public Safety Answering Point) — when P-CSCF detects an emergency URN (urn:service:sos), it routes the INVITE to the E-CSCF, which retrieves UE location from the LRF and forwards to the correct PSAP. The LRF (Location Retrieval Function) retrieves UE location (GPS, Cell-ID) and uses the RDF (Routing Determination Function) to map location to the correct PSAP, providing an ESQK in North America."
    spec: "TS 23.167, TS 24.229"
    simulator_trigger: "CALL command with emergency=true — P-CSCF routes to E-CSCF simulator for PSAP lookup"
    interview_context: "Tests emergency IMS architecture knowledge required for regulatory compliance testing"

  - id: "q121"
    domain: "ims"
    subdomain: "emergency"
    tags:
      - "sip"
      - "ims-register"
      - "p-cscf"
      - "ims-epc"
    level: "senior"
    question: "What are the procedures for a UE initiating a VoLTE emergency call when not IMS-registered?"
    answer: "An unregistered UE performs emergency attach (even without a valid SIM in some regions), then IMS APN PDN connection for emergency. If the UE has credentials it performs emergency IMS registration with an sos indication in the Contact header; if not, it sends an anonymous SIP INVITE directly to P-CSCF with the sos URN — no registration required, as P-CSCF routes directly to E-CSCF. The QCI=1 emergency bearer uses ARP priority 1 with preemption capability to guarantee resources under congestion; if IMS emergency fails, the UE must retry via CS domain (CSFB)."
    spec: "TS 23.167 §7.1, TS 24.229"
    simulator_trigger: "CALL command with emergency=true and unregistered UE — anonymous SIP INVITE to E-CSCF path"
    interview_context: "Tests IMS emergency call edge cases required for regional regulatory compliance (e.g., FCC, OFCOM)"

  - id: "q122"
    domain: "ims"
    subdomain: "emergency"
    tags:
      - "sip"
      - "p-cscf"
      - "s-cscf"
    level: "senior"
    question: "What SIP headers carry location information in an IMS emergency call?"
    answer: "The Geolocation header (RFC 6442) contains a URI pointing to a PIDF-LO (Presence Information Data Format — Location Object) XML body attached to the SIP message or a dereferenceable HTTP URL; the PIDF-LO carries geodetic or civic location. The P-Access-Network-Info (PANI) header is inserted by the P-CSCF with access-network-specific location (e.g., 3GPP-E-UTRAN-FDD; utran-cell-id=<PLMN><TAC><CellID>); this is lower accuracy but always available. The E-CSCF provides the Geolocation reference to the LRF for precise PSAP routing."
    spec: "TS 23.167, TS 24.229, RFC 6442, RFC 4119"
    simulator_trigger: "CALL command emergency path — PANI header inserted by p_cscf_node.cpp; Geolocation header in SIP INVITE body"
    interview_context: "Tests SIP emergency location header knowledge required for E911/emergency service implementation"

  # ---------------------------------------------------------------------------
  # IMS / VoLTE — IMS-EPC Interaction (q123–q130)
  # ---------------------------------------------------------------------------

  - id: "q123"
    domain: "ims"
    subdomain: "ims-epc"
    tags:
      - "ims-epc"
      - "ims-register"
      - "p-cscf"
      - "s-cscf"
    level: "senior"
    question: "What is SGW relocation during a VoLTE call and how does it affect IMS?"
    answer: "SGW relocation occurs during handover when the UE moves to a cell served by a different SGW; the PGW remains as the IP anchor so the UE's IP address and QCI=1 bearer are preserved and from the IMS perspective the SIP session is completely unaffected (P-CSCF sees the same UE IP throughout). The relocation involves a Create Session Request cycle establishing new S5/S8 tunnels between the new SGW and PGW. The critical point for VoLTE: the GBR QCI=1 bearer must be re-established on the new SGW with the same QoS parameters — if that fails, SRVCC may trigger."
    spec: "TS 23.401 §5.3.3.1, TS 23.216"
    simulator_trigger: "TAU with SGW relocation during active CALL — simulator verifies QCI=1 bearer is re-established on new SGW"
    interview_context: "Tests understanding of IMS-EPC interaction under mobility — a real-world VoLTE drop root-cause scenario"

  - id: "q124"
    domain: "ims"
    subdomain: "ir92"
    tags:
      - "volte-call"
      - "sip"
      - "ims-register"
      - "sip-register"
    level: "engineer"
    question: "What is the re-registration requirement in IR.92, and why must the UE re-register before expiry?"
    answer: "IR.92 requires the UE to re-register before the SIP registration expiry timer to maintain continuous IMS registration. If the UE fails to re-register before expiry, the S-CSCF removes the IMPU binding and the UE becomes unreachable for incoming calls — all incoming SIP INVITEs will return 480 Temporarily Unavailable. The UE typically re-registers at 50%–60% of the expiry time. Network restarts (e.g., S-CSCF failover) also require immediate re-registration since S-CSCF state is lost."
    spec: "GSMA IR.92, TS 24.229"
    simulator_trigger: "REGISTER command — simulator times re-registration at 60% of Expires value via registration_timer.cpp"
    interview_context: "Tests IMS registration maintenance knowledge needed for UE registration robustness testing"

  - id: "q125"
    domain: "ims"
    subdomain: "cx-interface"
    tags:
      - "cx"
      - "s-cscf"
      - "hss"
      - "ims-register"
    level: "senior"
    question: "What is the RTR (Registration-Termination-Request) in the Cx interface and when is it sent?"
    answer: "The RTR (Registration-Termination-Request) is an HSS-initiated Diameter Cx command sent to the S-CSCF to force deregistration of an IMS subscriber. It is sent when: the subscriber's service is removed or suspended by the operator; the HSS is migrated; or the subscription expires. The S-CSCF responds with RTA, deregisters the UE, sends a SIP NOTIFY to the UE (reg event package) informing it of deregistration, and sends SAR with assignment type TIMEOUT or USER_DEREGISTRATION to clean up the HSS binding. The UE will attempt re-registration after receiving the NOTIFY."
    spec: "TS 29.228, TS 29.229"
    simulator_trigger: "REGISTER command — HSS simulator sends RTR to S-CSCF when operator disables subscription during session"
    interview_context: "Tests knowledge of HSS-initiated IMS deregistration flows important for subscriber lifecycle management"

  - id: "q126"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "p-cscf"
      - "s-cscf"
      - "sip"
    level: "engineer"
    question: "What is an implicit registration set in IMS, and how does it affect SUBSCRIBE/NOTIFY?"
    answer: "An implicit registration set is a group of IMPUs that are always registered and deregistered together as a unit — when one IMPU in the set is registered, all others are automatically registered simultaneously. The HSS stores the implicit registration set and delivers all IMPUs to the S-CSCF in the SAA user profile. After registration, when the UE subscribes to the reg event package, the S-CSCF sends a NOTIFY containing the registration status of all IMPUs in the implicit registration set — the UE learns all its registered identities in a single NOTIFY."
    spec: "TS 23.228, TS 24.229"
    simulator_trigger: "REGISTER command — S-CSCF sends NOTIFY with all IMPUs in implicit set after SAR/SAA completes"
    interview_context: "Tests implicit registration set semantics often misunderstood in multi-IMPU subscriber scenarios"

  - id: "q127"
