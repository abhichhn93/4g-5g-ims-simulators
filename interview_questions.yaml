  # ---------------------------------------------------------------------------
  # 4G EPC — GTPv2 (q083–q085)
  # ---------------------------------------------------------------------------

  - id: "q083"
    domain: "4g"
    subdomain: "gtpv2"
    tags:
      - "gtpv2"
      - "teid"
      - "tunnel"
      - "sgw"
      - "pgw"
    level: "senior"
    question: "What is a TEID and how is it used in GTP tunnels?"
    answer: "A TEID (Tunnel Endpoint Identifier) is a 32-bit value that uniquely identifies a GTP tunnel endpoint at a given node. When Node A sends a GTP packet to Node B, it uses Node B's TEID in the header — this tells Node B which tunnel the packet belongs to for demultiplexing. TEIDs are locally significant to the assigning node. For each EPS bearer there is a chain of GTP-U TEIDs: eNB↔SGW (S1-U) and SGW↔PGW (S5/S8); GTPv2-C also uses TEIDs to match requests/responses. Nodes exchange TEIDs in Create Session Request/Response."
    spec: "TS 29.274 §5.1, TS 29.281"
    simulator_trigger: "4G ATTACH command — TEID allocation and exchange logged in gtpv2_session_manager.cpp"
    interview_context: "Tests GTP tunnel endpoint identification knowledge — fundamental for bearer path debugging"

  - id: "q084"
    domain: "4g"
    subdomain: "gtpv2"
    tags:
      - "gtpv2"
      - "teid"
      - "tunnel"
      - "4g-bearer"
      - "pgw"
      - "sgw"
      - "mme"
    level: "senior"
    question: "What GTPv2-C messages are used to establish, modify, and release a dedicated EPS bearer?"
    answer: "For dedicated bearer establishment, the PCRF sends PCC rules to PGW via Gx RAR; the PGW sends Create Bearer Request (GTPv2) to SGW then MME, which configures the radio bearer. For modification, the PGW sends Update Bearer Request chain through SGW to MME, which updates radio and responds. For release, the PGW initiates Delete Bearer Request chain (network-initiated), or the UE requests via NAS Bearer Resource Modification Request resulting in a Delete Bearer Request from PGW; PCRF is notified of the final outcome via Gx."
    spec: "TS 23.401 §5.4.2, TS 29.274"
    simulator_trigger: "CALL command — dedicated bearer (QCI=1) Create Bearer Request chain from PGW through SGW to MME to eNB"
    interview_context: "Tests end-to-end dedicated bearer lifecycle knowledge combining GTPv2, PCRF, and IMS interactions"

