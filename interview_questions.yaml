    level: "senior"
    question: "What is the difference between std::move and std::forward?"
    answer: "std::move unconditionally casts its argument to an rvalue reference, signaling that the object's resources may be transferred rather than copied — it does not actually move anything itself. std::forward is used inside template functions to perform perfect forwarding, conditionally casting to lvalue or rvalue depending on the original value category of the caller's argument. Use move for explicit ownership transfer; use forward in forwarding-reference templates."
    spec: null
    simulator_trigger: "Simulator message passing — moving PDU buffers into packet queues to avoid deep copies on the hot path"
    interview_context: "Tests understanding of value categories and their performance implications in message pipelines"

