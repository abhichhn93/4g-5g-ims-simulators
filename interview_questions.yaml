    level: "engineer"
    question: "What is operator overloading, and what are its restrictions?"
    answer: "Operator overloading lets you redefine the behavior of built-in operators for user-defined types by defining operator@ as a member or friend function. You cannot create new operators, cannot change arity or precedence, and certain operators (::, ., .*, ?:, sizeof) cannot be overloaded. The overloaded operator should semantically match its mathematical or linguistic meaning."
    spec: null
    simulator_trigger: "Simulator message comparison operators — operator== for matching PDU types in test assertions"
