    level: "senior"
    question: "What is GTP echo and why is it important in LTE?"
    answer: "GTP Echo Request/Response is a keep-alive mechanism used on GTPv2-C and GTP-U interfaces to verify that remote GTP peers are alive and tunnels are functional. If no response is received within timeout and retry count, the tunnel is considered failed and recovery procedures trigger. Critically, the Echo Response carries a Restart Counter — if a peer has restarted, its counter will have changed, alerting the sending node to clear stale tunnel state and re-establish sessions, preventing stale GTP contexts after node failures."
    spec: "TS 29.274 §7.2.1, TS 29.281"
    simulator_trigger: "Simulator node restart — GTP echo restart counter change triggers stale context cleanup in gtp_peer_manager.cpp"
    interview_context: "Tests fault-detection mechanism knowledge needed for simulator resilience and CHAOS testing"

  # ---------------------------------------------------------------------------
  # 4G EPC — Diameter Protocol (q086–q088)
  # ---------------------------------------------------------------------------

  - id: "q086"
    domain: "4g"
    subdomain: "diameter"
    tags:
      - "diameter"
      - "avp"
      - "command-code"
    level: "senior"
    question: "What are AVPs in Diameter and how are they structured?"
    answer: "AVPs (Attribute-Value Pairs) are the fundamental data units in Diameter messages. Each AVP has a 32-bit AVP Code, an AVP Flags byte (M-bit mandates rejection if unrecognized, V-bit indicates vendor-specific), a 24-bit AVP Length, an optional 32-bit Vendor-ID (3GPP uses 10415), and variable-length data padded to a 4-byte boundary. AVPs can be grouped to contain nested AVPs, enabling complex structures. Key examples include User-Name (AVP 1 = IMSI), Session-Id (263), and Auth-Application-Id (258)."
    spec: "RFC 6733, TS 29.272"
    simulator_trigger: "4G ATTACH command — Diameter AIR message decoded in diameter_codec.cpp showing AVP structure"
    interview_context: "Tests Diameter protocol encoding knowledge needed for AVP-level message debugging in the simulator"

  - id: "q087"
    domain: "4g"
    subdomain: "diameter"
    tags:
      - "diameter"
      - "avp"
      - "command-code"
      - "s6a"
    level: "senior"
    question: "How does a Diameter session work? What is a Session-ID AVP?"
    answer: "A Diameter session represents a logical service interaction identified by the Session-Id AVP (code 263), which must be globally unique and is typically constructed as <DiameterIdentity>;<high-32>:<low-32>. Sessions are established with an initial CCR (CC-Request-Type = INITIAL_REQUEST), maintained via interim updates, and terminated with a CCR TERMINATION_REQUEST. Destination-Host and Destination-Realm AVPs route messages; hop-by-hop routing is via DRAs; end-to-end identification uses End-to-End-Identifier."
    spec: "RFC 6733, TS 29.212, TS 29.272"
    simulator_trigger: "Gx CCR-Initial session in gx_session_manager.cpp — Session-Id generated at PDN connection establishment"
    interview_context: "Tests Diameter session lifecycle needed for Gx/Rx/S6a session debugging in the simulator"

  - id: "q088"
    domain: "4g"
    subdomain: "diameter"
    tags:
      - "diameter"
      - "dra"
      - "s6a"
      - "hss"
    level: "senior"
    question: "What is a Diameter Routing Agent (DRA) and when is it needed?"
    answer: "A DRA is a Diameter proxy or redirect agent that centralizes routing between Diameter peers, avoiding full-mesh connectivity. In a real network, an MME connecting to dozens of HSSs uses a single DRA that routes to the correct HSS based on Destination-Realm/Host, Session-Id, or IMSI range. DRAs also provide load balancing, failover, and in IMS, route Cx messages to the correct HSS in multi-HSS environments. DRAs are mandatory in large operator networks where full-mesh connections are impractical."
    spec: "TS 29.272, RFC 6733"
    simulator_trigger: "Simulator DRA node in multi-HSS test scenarios — diameter_routing_agent.cpp in the simulator topology"
    interview_context: "Tests operational Diameter topology knowledge for large-scale EPC deployment roles"

