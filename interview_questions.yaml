    answer: "The NRF (Network Repository Function) is the service registry and discovery broker for the 5GC. NFs register their NF Profile (type, instance ID, PLMN ID, supported services, capacity, IP/FQDN) at startup. When an NF consumer needs a service, it sends Nnrf_NFDiscovery_Request specifying target NF type and optional S-NSSAI/DNN filters; NRF returns matching NF instances. The NRF also supports subscription notifications — NFs subscribe to topology change events without polling. In slicing deployments, multiple NRFs may be hierarchically deployed at PLMN, shared-slice, and slice-specific levels."
    spec: "TS 23.501 §6.2.6, TS 29.510"
