    answer: "S1AP (S1 Application Protocol) is the control-plane protocol on the S1-MME interface between eNodeB and MME, running over SCTP/IP. NAS messages (Attach Request, Authentication Request) are carried transparently as the NAS-PDU IE inside S1AP messages such as Initial UE Message, Downlink NAS Transport, and Uplink NAS Transport. The eNodeB does not parse NAS content — only the MME terminates NAS. This separation of RAN and CN signaling is a key EPS design principle."
