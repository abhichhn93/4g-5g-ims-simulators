    answer: "The UE sends an Attach Request (containing IMSI or GUTI) inside an S1AP Initial UE Message to the MME over S1-MME. The MME fetches subscriber data from the HSS over S6a (Diameter AIR/AIA, then ULR/ULA), performs EPS-AKA authentication, and establishes NAS security. The MME then sends Create Session Request to SGW over S11 (GTPv2-C); the SGW relays it to the PGW over S5/S8, which allocates an IP address, applies PCRF policy via Gx, and returns Create Session Response back through SGW to MME. Finally the MME sends Initial Context Setup Request (S1AP) to the eNodeB to set up the radio bearer, and the UE receives an Attach Accept with GUTI, TAI list, and PDN address."
