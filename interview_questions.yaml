    level: "senior"
    question: "What is the Rule of Five, and what is the Rule of Zero?"
    answer: "If a class manually manages a resource, you must define or explicitly delete all five special members: destructor, copy constructor, copy assignment, move constructor, and move assignment — because the compiler-generated defaults will cause double-frees or leaks. The Rule of Zero says prefer RAII types (smart pointers, containers) so your class needs no custom resource management and the compiler can generate all five correctly by default."
    spec: null
    simulator_trigger: "Simulator node base classes managing raw socket/file descriptors — must apply Rule of Five explicitly"
    interview_context: "Tests resource management discipline essential for long-running telecom daemon code"

