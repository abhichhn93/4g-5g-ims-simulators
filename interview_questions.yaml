    answer: "The MME is the primary control-plane node in EPC handling: NAS termination (registration, authentication, attach/detach, TAU, paging); authentication and security (EPS-AKA via S6a, K_eNB distribution); mobility management (UE state, handovers, SGW/PGW selection); bearer management (EPS bearer establishment via S11); and session management (PDN connections, UE IP address). The MME is on the control plane only — no user data flows through it."
