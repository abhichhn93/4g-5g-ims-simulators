      - "cpp-concurrency"
      - "atomic"
    level: "senior"
    question: "What is lock-free programming, and what is the ABA problem in a lock-free stack?"
    answer: "Lock-free programming uses atomic operations (typically compare-and-swap) instead of mutexes; at least one thread always makes progress, eliminating deadlocks and reducing contention under high load. A lock-free stack stores an atomic head pointer; push creates a new node and uses compare_exchange_weak in a loop to swap it as the new head. The ABA problem occurs when a pointer appears unchanged but the underlying object was replaced — solved with tagged pointers or hazard pointers."
    spec: null
    simulator_trigger: "High-throughput simulator message queues using CAS-based lock-free ring buffers for zero-contention event dispatch"
    interview_context: "Tests advanced concurrency knowledge appropriate for performance-critical simulator paths"

  - id: "q026"
    domain: "cpp"
    subdomain: "multithreading"
    tags:
      - "cpp-concurrency"
      - "atomic"
    level: "senior"
    question: "Explain C++ memory ordering: memory_order_relaxed, acquire/release, and seq_cst."
    answer: "memory_order_relaxed provides atomicity for a single variable but no synchronization between threads — use only for independent counters. memory_order_acquire on a load ensures no subsequent reads/writes are reordered before it; memory_order_release on a store ensures no prior operations are reordered after it — together they form a publish/subscribe pattern. memory_order_seq_cst (the default) gives a single total order across all seq_cst operations; it is safest but can slow performance on weakly-ordered architectures like ARM."
    spec: null
    simulator_trigger: "Simulator atomic flags using acquire/release for lock-free ready signals between producer and consumer threads"
    interview_context: "Architect-level question probing memory model knowledge needed for correct lock-free simulator code"

