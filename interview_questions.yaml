    subdomain: "interfaces"
    tags:
      - "gy"
      - "diameter"
      - "pgw"
    level: "senior"
    question: "What is the Gy interface and how does it differ from Rf in LTE?"
    answer: "Gy is the online charging interface between the PGW and OCS (Online Charging System), using Diameter Credit-Control Application — it checks and reserves credit before delivering service; if credit runs out, the service is immediately terminated or throttled. Rf is the offline charging interface using Diameter Accounting messages (ACR/ACA) to deliver CDRs post-session for batch billing reconciliation. Online (Gy) = pre-paid / real-time credit control; Offline (Rf) = post-paid / batch CDR delivery."
    spec: "TS 32.299, TS 32.240"
    simulator_trigger: "CALL command with charging=online flag — PGW sends Diameter CCR to OCS simulator over Gy"
    interview_context: "Tests online vs offline charging model distinction fundamental to billing architecture roles"

