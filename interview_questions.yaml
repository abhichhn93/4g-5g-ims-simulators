    level: "senior"
    question: "List and describe the Diameter Cx interface commands between CSCF and HSS."
    answer: "The Cx interface (App-ID 16777216) uses: UAR/UAA (User-Authorization-Request/Answer) — I-CSCF queries HSS for S-CSCF address or capabilities; SAR/SAA (Server-Assignment-Request/Answer) — S-CSCF registers S-CSCF assignment and downloads user profile (iFC); LIR/LIA (Location-Info-Request/Answer) — I-CSCF finds assigned S-CSCF for routing incoming SIP; MAR/MAA (Multimedia-Auth-Request/Answer) — S-CSCF fetches IMS authentication vectors; RTR/RTA (Registration-Termination) — HSS-initiated deregistration; PPR/PPA (Push-Profile) — HSS pushes updated user profile to S-CSCF."
    spec: "TS 29.228, TS 29.229"
    simulator_trigger: "REGISTER command — Cx MAR/MAA for auth vectors; SAR/SAA for profile download in cx_client.cpp"
