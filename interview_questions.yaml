    question: "Describe the EPS-AKA procedure. What vectors does the HSS generate, and what does each field represent?"
    answer: "The HSS generates an EPS Authentication Vector containing four values: RAND (128-bit random challenge), AUTN (Authentication Token enabling mutual authentication), XRES (Expected Response used by the MME to verify the UE), and K_ASME (the top-level session key derived from CK, IK, SQN, and serving network ID). The MME sends RAND and AUTN to the UE; the UE verifies AUTN, computes RES, and returns it. The MME validates RES == XRES, and both sides independently derive K_ASME which is never transmitted over the air."
