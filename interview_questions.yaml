    question: "What is a race condition, and how do you prevent it in C++?"
    answer: "A race condition occurs when two or more threads access shared mutable state, at least one access is a write, and the accesses are unsynchronized — the result depends on unpredictable thread scheduling. Prevention strategies include mutual exclusion via std::mutex, atomic operations via std::atomic for single-variable updates, immutable data structures, and thread-local storage. For complex invariants spanning multiple variables a mutex is correct; for simple counters std::atomic avoids lock overhead."
    spec: null
