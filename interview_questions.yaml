    answer: "PDR (Packet Detection Rule) matches incoming packets using criteria such as source interface, SDF filter (IP 5-tuple), or TEID — each PDR has a precedence and points to a FAR. FAR (Forwarding Action Rule) specifies what to do with matched packets: forward (with destination IP/TEID), drop, buffer (for idle UE), or duplicate — updated when the gNB TEID becomes known. QER (QoS Enforcement Rule) enforces MBR, GBR, and gate status per QoS flow via token-bucket policing. URR (Usage Reporting Rule) triggers volume/time/event-based usage reports to SMF for CHF charging."
