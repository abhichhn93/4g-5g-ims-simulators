      - "s5s8"
      - "gtpv2"
      - "mme"
      - "sgw"
      - "pgw"
    level: "engineer"
    question: "What is the difference between the S11 and S5/S8 interfaces in LTE?"
    answer: "S11 is between MME and SGW, uses GTPv2-C for control-plane bearer management (Create/Modify/Delete Session requests), and carries no user-plane traffic. S5 is between SGW and PGW within the same PLMN (non-roaming), carrying both GTPv2-C and GTP-U user data. S8 is functionally identical to S5 but crosses PLMN boundaries for roaming scenarios — an IPX provider typically sits between S8 peers. The SGW acts as a relay, forwarding GTPv2-C messages from S11 to S5 with TEID updates."
    spec: "TS 29.274, TS 23.401"
    simulator_trigger: "4G ATTACH command — Create Session Request chain: MME → SGW (S11) → PGW (S5) in gtpv2_handler.cpp"
    interview_context: "Tests ability to distinguish the control and user plane stacks on each interface"

  - id: "q076"
