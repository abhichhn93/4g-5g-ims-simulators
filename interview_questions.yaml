    subdomain: "ir92"
    tags:
      - "volte-call"
      - "qci1"
      - "volte-bearer"
      - "sip"
    level: "senior"
    question: "What is GSMA IR.92 and what are its key mandatory requirements for VoLTE?"
    answer: "GSMA IR.92 (IMS Profile for Voice and SMS) defines the minimum mandatory feature set for interoperable VoLTE deployment. Key requirements: QCI=5 default bearer for IMS signaling, QCI=1 GBR dedicated bearer for voice, QCI=9 for internet data; AMR-WB (HD Voice) and AMR-NB codecs; SIP extensions PRACK (100rel), preconditions (RFC 3312), UPDATE, and session timers; PCO-based P-CSCF discovery; SMS over IMS (IP-SM-GW); SRVCC; and 20ms packetization time for AMR-WB. Late ringing (precondition mode) is recommended with ≤4 second call setup target."
    spec: "GSMA IR.92 v20.0 (2024), TS 26.114"
    simulator_trigger: "CALL command — simulator validates IR.92 compliance including codec negotiation, PRACK, and preconditions"
    interview_context: "Tests IR.92 profile knowledge required for VoLTE interoperability and commercial deployment roles"

  - id: "q114"
    domain: "ims"
    subdomain: "ir92"
    tags:
      - "volte-call"
      - "sdp"
    level: "engineer"
    question: "What codecs are mandatory in IR.92 and why is AMR-WB significant for VoLTE?"
    answer: "IR.92 mandates AMR-WB (Adaptive Multi-Rate Wideband, G.722.2) as the primary codec for VoLTE and AMR-NB as fallback for 2G/3G interoperability. AMR-WB operates at 16kHz sampling rate delivering HD Voice quality; it supports multiple bitrate modes (6.60–23.85kbps) with 12.65kbps most commonly deployed, and uses DTX with Comfort Noise Generation during silence. Later IR.92 versions also mandate EVS (Enhanced Voice Services) supporting 32kHz super-wideband and 48kHz fullband. Codec negotiation occurs in SDP offer/answer during call setup."
    spec: "TS 26.114, TS 26.445, GSMA IR.92"
    simulator_trigger: "CALL command — SDP offer from UE simulator lists AMR-WB/EVS codecs; answer selects AMR-WB 12.65kbps"
    interview_context: "Tests codec knowledge relevant to VoLTE audio quality analysis and IR.92 certification"

  # ---------------------------------------------------------------------------
  # IMS / VoLTE — SIP Methods (q115–q117)
  # ---------------------------------------------------------------------------

  - id: "q115"
