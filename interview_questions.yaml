    level: "beginner"
    question: "What is the difference between function overriding and function overloading?"
    answer: "Overloading defines multiple functions with the same name but different parameter lists in the same scope; the compiler selects the correct version at compile time. Overriding redefines a base-class virtual function in a derived class with the same signature; the correct version is selected at runtime. Use the override specifier in C++11 to let the compiler catch signature mismatches."
    spec: null
    simulator_trigger: "Simulator event handler methods — distinguishing overloaded event constructors from overridden handlers"
