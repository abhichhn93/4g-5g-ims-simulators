    subdomain: "interfaces"
    tags:
      - "s6a"
      - "diameter"
      - "mme"
      - "hss"
      - "4g-auth"
    level: "senior"
    question: "What Diameter commands are exchanged on the S6a interface between MME and HSS?"
    answer: "The S6a interface uses Diameter (3GPP Multimedia application, App-ID 16777251). Key command pairs are: AIR/AIA (Authentication-Information-Request/Answer) — MME fetches EPS authentication vectors; ULR/ULA (Update-Location-Request/Answer) — MME registers UE and receives subscription data; CLR/CLA (Cancel-Location-Request/Answer) — HSS deregisters UE from old MME; IDR/IDA (Insert-Subscriber-Data) — HSS pushes updated subscription data; PUR/PUA (Purge-UE) — MME deregisters UE after detach."
    spec: "TS 29.272"
    simulator_trigger: "4G ATTACH command step 4 — Diameter AIR/AIA; step 5 — ULR/ULA on s6a_client.cpp"
    interview_context: "Tests Diameter S6a command knowledge required for HSS troubleshooting in attach failure scenarios"

  - id: "q075"
