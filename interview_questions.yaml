    level: "engineer"
    question: "Describe the S1-MME interface: protocol stack, messages, and its role."
    answer: "S1-MME is the control-plane interface between eNodeB and MME, carrying S1AP messages over SCTP/IP. SCTP provides reliable, ordered transport with multi-homing support. Key S1AP messages include UE-associated (Initial UE Message, Initial Context Setup Request/Response, UE Context Release Command) and non-UE-associated (S1 Setup Request/Response, Paging, Reset). NAS PDUs are carried as transparent IEs — the eNodeB does not interpret them. A single eNodeB typically has S1-MME connections to 2–3 MMEs for redundancy."
    spec: "TS 36.413, TS 23.401"
    simulator_trigger: "4G ATTACH command — S1AP InitialUEMessage is the first message from gNB simulator to MME simulator"
    interview_context: "Tests precise S1 interface knowledge needed for debugging S1AP setup and UE context issues"

  - id: "q074"
