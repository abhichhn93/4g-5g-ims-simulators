    answer: "End-to-end slicing isolates networks logically on shared physical infrastructure across three domains: RAN uses S-NSSAI-based scheduler differentiation, dedicated bandwidth parts, or dedicated DRBs per slice; the 5GC deploys dedicated or shared NF instances per S-NSSAI with per-slice NF registration in the NRF; and the transport network uses DSCP or FlexE/VLAN-based isolation in backhaul and fronthaul. The NSSF orchestrates core slice selection; Allowed NSSAI in the Registration Accept propagates RAN-level slice awareness via NGAP. IETF/3GPP transport slicing maps 5QI values to DSCP/CoS markings."
