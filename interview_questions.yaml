    question: "How does std::condition_variable work, and what is its classic use case?"
    answer: "std::condition_variable allows a thread to block until a condition becomes true, atomically releasing the mutex while waiting and re-acquiring it before returning. The waiting thread calls cv.wait(lock, predicate) — the predicate guards against spurious wakeups. A notifying thread modifies shared state under the mutex, then calls cv.notify_one() or cv.notify_all(). The classic use case is a bounded producer-consumer queue where producers block when full and consumers block when empty."
    spec: null
    simulator_trigger: "Simulator event queue — worker threads waiting on condition_variable for new protocol events to process"
