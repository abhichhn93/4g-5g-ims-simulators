    question: "What are the three SSC (Session and Service Continuity) modes in 5G?"
    answer: "SSC Mode 1: the UPF anchor never changes for the PDU session lifetime — use for VoNR and enterprise VPN requiring a stable IP. SSC Mode 2: the network releases the old session and creates a new one (break-before-make) — for best-effort internet browsing. SSC Mode 3: the network creates a new session before releasing the old (make-before-break) — for video streaming or gaming requiring minimal interruption. SSC mode is negotiated at session establishment; UDM subscription data may restrict allowed modes per DNN."
    spec: "TS 23.501 §5.6.9, TS 23.502 §4.3.3"
