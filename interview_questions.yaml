      - "pgw"
      - "pcrf"
      - "4g-bearer"
      - "qci"
    level: "senior"
    question: "What is the Gx interface and what protocol does it use?"
    answer: "Gx connects the PGW (acting as PCEF) to the PCRF, using Diameter (App-ID 16777238) over TCP/SCTP. When a UE attaches and a PDN connection is established, the PGW opens a Gx session with CCR (CC-Request) INITIAL_REQUEST; the PCRF responds with CCA containing PCC Rules (QCI, ARP, GBR, MBR, flow descriptions, charging keys). The PCRF can push updated rules mid-session using RAR (Re-Auth-Request); the PGW responds with RAA. Gx enables dynamic QoS enforcement — e.g., when IMS triggers a dedicated bearer via Rx."
    spec: "TS 29.212"
    simulator_trigger: "4G ATTACH command — PGW sends Gx CCR-Initial to PCRF; CALL command — Gx RAR pushing QCI=1 PCC rule"
    interview_context: "Tests Gx/PCC understanding critical for debugging VoLTE bearer establishment failures"

  - id: "q077"
