    subdomain: "sip-methods"
    tags:
      - "sip"
      - "sip-invite"
      - "sip-register"
      - "prack"
    level: "engineer"
    question: "What is the purpose of each key SIP method in VoLTE: INVITE, REGISTER, BYE, CANCEL, OPTIONS, PRACK, UPDATE?"
    answer: "REGISTER registers the UE's IMPU-to-IP binding and initiates IMS-AKA; INVITE initiates a call with an SDP offer and can re-INVITE for hold or codec change; BYE terminates an established call and triggers QCI=1 bearer teardown; CANCEL cancels a pending unanswered INVITE. OPTIONS queries SIP entity capabilities and is used for P-CSCF keep-alive in LTE; PRACK (provisional ACK per 100rel) acknowledges 1xx provisional responses like 183 Session Progress — mandatory per IR.92; UPDATE modifies session parameters mid-call (e.g., precondition status) without changing dialog state."
    spec: "RFC 3261, RFC 3262, RFC 3311, TS 24.229"
    simulator_trigger: "CALL command — INVITE/PRACK/UPDATE/BYE sequence visible in sip_call_flow_tracer.cpp"
    interview_context: "Tests comprehensive SIP method knowledge across the full VoLTE call lifecycle"

  - id: "q116"
    domain: "ims"
    subdomain: "sip-methods"
    tags:
      - "sip"
      - "sip-invite"
      - "prack"
      - "sdp"
    level: "engineer"
    question: "What is the difference between SIP 180 Ringing and 183 Session Progress in VoLTE?"
    answer: "Both are 1xx provisional responses from the terminating side. 180 Ringing indicates the remote UA is alerting the called party but carries no SDP — in early ringing mode it is sent before bearers are established. 183 Session Progress carries an SDP answer with media parameters and is used when early media or precondition status updates are needed; in VoLTE with preconditions, the 183 triggers bearer establishment on both sides before 180 Ringing is sent. PRACK (if 100rel is required) acknowledges the 183."
    spec: "RFC 3261, TS 24.229, GSMA IR.92"
    simulator_trigger: "CALL command — 183 Session Progress triggers Rx AAR in p_cscf_node.cpp for QCI=1 bearer setup"
    interview_context: "Tests understanding of the SIP provisional response role in VoLTE bearer establishment ordering"

  - id: "q117"
    domain: "ims"
    subdomain: "sip-methods"
    tags:
      - "sip"
      - "subscribe"
      - "notify"
      - "ims-register"
    level: "senior"
    question: "Explain SIP SUBSCRIBE/NOTIFY and their role in IMS/VoLTE."
    answer: "SIP SUBSCRIBE allows a UA to subscribe to event notifications from another entity; SIP NOTIFY is the server-sent event notification. In IMS, key uses include the reg event package (UE subscribes to own registration status; S-CSCF sends NOTIFY with registration state for all IMPUs in the implicit set), presence (UE subscribes to contact presence; AS sends NOTIFY with presence documents), and MWI (voicemail Message Waiting Indicator). SUBSCRIBEs establish SIP dialogs; NOTIFYs are sent within those dialogs."
    spec: "RFC 3265, TS 24.229, TS 24.615"
    simulator_trigger: "REGISTER command — UE sends SUBSCRIBE to reg event package after 200 OK; S-CSCF sends NOTIFY"
    interview_context: "Tests event notification mechanism knowledge needed for IMS presence and voicemail integration"

