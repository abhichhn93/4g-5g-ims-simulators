      - "cpp-memory"
      - "raii"
      - "smart-ptr"
    level: "senior"
    question: "Compare unique_ptr, shared_ptr, and weak_ptr. When do you use each?"
    answer: "unique_ptr represents exclusive single ownership; it cannot be copied, only moved, and has zero overhead — it is the default choice. shared_ptr provides shared ownership through an atomic reference count; the object is deleted when the last owner goes out of scope — use it only when multiple components genuinely co-own the same object. weak_ptr is a non-owning observer that does not increment the count; call lock() to get a temporary shared_ptr — use it to break cyclic references and in caches."
    spec: null
    simulator_trigger: "unique_ptr in simulator node factories; shared_ptr for shared UE context accessed across MME and SGW simulators"
    interview_context: "Tests ownership reasoning critical for memory-safe telecom node simulation"

