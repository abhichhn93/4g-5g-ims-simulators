    answer: "K_ASME (Access Security Management Entity Key) is the master key for EPS security, derived jointly by the UE and HSS from CK, IK, SQN, and the Serving Network Identity — never transmitted over the air. From K_ASME, three second-level keys are derived: K_NASenc (NAS encryption), K_NASint (NAS integrity), and K_eNB (forwarded to the eNodeB). From K_eNB, the eNodeB further derives K_RRCenc, K_RRCint, and K_UPenc."
