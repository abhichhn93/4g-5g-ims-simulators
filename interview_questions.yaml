    level: "senior"
    question: "How does OAuth2-based authorization work for NF service access in 5G?"
    answer: "3GPP uses OAuth 2.0 client credentials grant for SBI authorization. An NF consumer obtains an access token from NRF via POST to Nnrf_AccessToken_Get, specifying its NF type, target NF type, and required service scope; the NRF verifies the requester's identity via mutual TLS and issues a signed JWT. The consumer includes this bearer token in the Authorization HTTP header of every service request; the producer validates the token signature and scope before processing. This prevents unauthorized NFs from calling any service and enables fine-grained access control."
    spec: "TS 29.510 §5.22, TS 33.501 §13.3"
