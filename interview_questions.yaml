    level: "engineer"
    question: "Compare std::vector, std::list, and std::deque. When do you use each?"
    answer: "std::vector is a contiguous dynamic array with O(1) random access and amortized O(1) push_back; it is cache-friendly and the default choice. std::list is a doubly-linked list with O(1) insertion/deletion anywhere but O(n) index access and poor cache behavior — use it for stable iterators and frequent mid-list modifications. std::deque is a segmented buffer with O(1) push/pop at both ends and O(1) random access — use it for queue-like structures with indexing."
    spec: null
