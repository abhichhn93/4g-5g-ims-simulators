    answer: "The ARPF (Authentication credential Repository and Processing Function) stores the long-term subscriber key (K) and SQN, and performs AKA cryptographic computations generating RAND, AUTN, XRES*, CK, IK, and K_AUSF. The SIDF (Subscription Identifier De-concealing Function) holds the Home Network private key and uses it to decrypt SUCI back to SUPI using ECIES. Both are logical functions co-located within the UDM node — not deployed as separate network elements — ensuring the home network retains exclusive control of subscriber credentials."
    spec: "TS 33.501 §5.2.5, §6.12.2"
