      - "suci"
    level: "senior"
    question: "What is the AUSF, and what is its role in 5G authentication?"
    answer: "The AUSF (Authentication Server Function) resides in the HPLMN and handles UE authentication for 3GPP and non-3GPP access. When SEAF (in AMF) requests authentication, AUSF contacts UDM for the 5G HE AV, computes HXRES* (hashed expected response), and sends the 5G SE AV (with RAND, AUTN, HXRES*) to SEAF. Only after SEAF confirms HRES* = HXRES* and forwards RES* does AUSF verify RES* = XRES* and send K_SEAF + SUPI to the serving network. This dual confirmation prevents a rogue serving network from falsely claiming authentication success."
    spec: "TS 33.501 §6.1, TS 29.509"
    simulator_trigger: "5G REG command — AUSF receives SUCI from AMF, contacts UDM, returns 5G SE AV in ausf_node.cpp"
    interview_context: "Tests 5G-AKA two-phase verification understanding — the most architecturally distinct 5G security feature"

