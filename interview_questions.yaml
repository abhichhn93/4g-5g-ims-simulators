    question: "What is the difference between stack and heap allocation in C++?"
    answer: "Stack memory is allocated and deallocated automatically when functions are entered and exited; it is very fast but limited in size (~1–8 MB). Heap memory is dynamically allocated with new/delete, can be as large as available RAM, but is slower due to allocator overhead and must be explicitly managed. Modern C++ prefers smart pointers and containers over raw new/delete."
    spec: null
