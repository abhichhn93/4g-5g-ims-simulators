  - id: "q089"
    domain: "4g"
    subdomain: "attach"
    tags:
      - "4g-attach"
      - "nas"
      - "emm"
      - "mme"
    level: "engineer"
    question: "What is the difference between ECM-IDLE and ECM-CONNECTED states in LTE, and what transitions them?"
    answer: "ECM-IDLE (EPS Connection Management Idle) means the UE has no S1 signaling connection — bearers are suspended and the UE is reachable only via paging. ECM-CONNECTED means an active S1 signaling connection exists between UE, eNodeB, and MME — user data can flow and bearers are active. The UE moves from IDLE to CONNECTED when it sends a Service Request (triggered by uplink data or network paging); it moves back to IDLE after an inactivity timer expires and the network releases the RRC connection via S1 UE Context Release."
    spec: "TS 23.401 §5.3.5"
    simulator_trigger: "4G ATTACH command — UE transitions to ECM-CONNECTED; idle timer expiry triggers ECM-IDLE and S1 release"
    interview_context: "Tests UE state machine knowledge fundamental to understanding paging, power saving, and data session management"

  - id: "q090"
    domain: "4g"
    subdomain: "interfaces"
    tags:
      - "s1-mme"
      - "mme"
      - "nas"
      - "emm"
    level: "engineer"
    question: "What is a Tracking Area List (TAI List) and why does the MME assign multiple TAs to a UE?"
    answer: "A Tracking Area List (TAI list) is a set of Tracking Area Identities (TAIs) assigned by the MME to the UE in the Attach Accept and TAU Accept messages. Instead of requiring a TAU every time the UE moves to an adjacent cell in a neighboring TA, the UE only triggers a TAU when it enters a TA not on its list — reducing TAU signaling load. The MME balances TAI list size: too small causes frequent TAUs under mobility; too large increases paging overhead since the network must page in all TAs of the list simultaneously."
    spec: "TS 23.401 §5.3.3"
    simulator_trigger: "4G ATTACH command completion — TAI list assigned in Attach Accept message by mme_node.cpp"
    interview_context: "Tests network-level mobility optimization trade-offs important for MME dimensioning roles"

  - id: "q091"
    domain: "4g"
    subdomain: "node-roles"
    tags:
      - "mme"
      - "nas"
      - "emm"
      - "4g-attach"
    level: "engineer"
    question: "What is the difference between EMM (EPS Mobility Management) and ESM (EPS Session Management) sub-layers in NAS?"
    answer: "NAS in LTE has two sub-layers: EMM (EPS Mobility Management) handles UE registration, authentication, attach/detach, TAU, paging, and ECM/EMM state machines — these are UE-level procedures. ESM (EPS Session Management) handles PDN connection establishment, default and dedicated EPS bearer setup, modification, and release — these are bearer-level procedures and can run in parallel for different PDN connections. Both sub-layers use the same NAS message transport over S1-MME but have separate message types and states."
    spec: "TS 24.301"
    simulator_trigger: "4G ATTACH command — simultaneous EMM Attach and ESM PDN Connectivity procedures inside the same NAS exchange"
    interview_context: "Tests understanding of NAS sublayer separation often misunderstood by junior 4G engineers"

  - id: "q092"
    domain: "4g"
    subdomain: "bearer"
    tags:
      - "4g-bearer"
      - "pgw"
      - "mme"
      - "gtpv2"
    level: "engineer"
    question: "What is a TFT (Traffic Flow Template) and what role does it play in bearer selection?"
    answer: "A TFT (Traffic Flow Template) is a set of packet filter rules that maps IP flows to an EPS bearer based on the 5-tuple (source/destination IP, port, protocol) or 6-tuple (including ToS/DSCP). For dedicated bearers, TFTs ensure that specific flows (e.g., RTP voice to a specific destination port range) are mapped to the QCI=1 bearer instead of the default QCI=9 bearer. TFTs are provisioned by the PGW and programmed in the UE; in VoLTE, the IMS address/port of the media stream is used as the TFT filter."
    spec: "TS 23.401 §5.4.2, TS 24.301"
    simulator_trigger: "CALL command — QCI=1 dedicated bearer TFT matching RTP 5-tuple from SDP answer in bearer_tft_manager.cpp"
    interview_context: "Tests traffic classification knowledge needed for debugging why voice traffic falls to the wrong bearer"

  - id: "q093"
    domain: "4g"
    subdomain: "interfaces"
    tags:
      - "diameter"
      - "s6a"
      - "hss"
      - "mme"
    level: "senior"
    question: "What is the difference between HSS-initiated and MME-initiated procedures on the S6a interface?"
    answer: "MME-initiated procedures include AIR/AIA (fetching auth vectors during attach), ULR/ULA (registering UE location and obtaining subscriber data), PUR/PUA (purging UE after detach), and NOR/NOA (notifying HSS of UE status changes). HSS-initiated procedures include CLR/CLA (Cancel Location — HSS deregisters UE from an MME when the UE registers at a new MME), IDR/IDA (Insert-Subscriber-Data — HSS pushes updated subscription data to the MME mid-session), and DSR/DSA (Delete-Subscriber-Data). Understanding the direction is critical for correct S6a interface implementation."
    spec: "TS 29.272"
    simulator_trigger: "Inter-MME TAU — HSS sends CLR to old MME simulator after new MME sends ULR in s6a_server.cpp"
    interview_context: "Tests bidirectional S6a interface knowledge including rarely-discussed HSS-initiated flows"

  - id: "q094"
    domain: "4g"
    subdomain: "node-roles"
    tags:
      - "pgw"
      - "gx"
      - "pcrf"
      - "4g-bearer"
    level: "senior"
    question: "What is the SGi interface, and what protocols can it carry?"
    answer: "The SGi interface connects the PGW to external Packet Data Networks (PDN) — the internet, IMS core, or enterprise networks. It is a plain IP interface without GTP encapsulation. For internet APN, it carries standard IPv4/IPv6 traffic to the internet. For IMS APN, it carries SIP/RTP traffic to the IMS P-CSCF (the PGW is connected to the IMS core IP network). The PGW can also apply NAT on SGi for IPv4 subscribers behind private addresses, and perform DPI to detect applications for policy enforcement."
    spec: "TS 23.401 §4.6.3"
    simulator_trigger: "4G ATTACH command — PGW SGi interface simulator connecting to internet and IMS network simulators"
    interview_context: "Tests interface boundary knowledge at the PGW — an often-overlooked interface in EPC troubleshooting"

  - id: "q095"
    domain: "4g"
    subdomain: "bearer"
    tags:
      - "4g-bearer"
      - "qci"
      - "ims-epc"
      - "volte-bearer"
      - "pgw"
    level: "senior"
    question: "What is the difference between UE-initiated and network-initiated dedicated bearer establishment?"
    answer: "In network-initiated dedicated bearer establishment, the PCRF pushes a PCC rule to the PGW via Gx RAR (typically triggered by the P-CSCF via Rx during VoLTE call setup); the PGW sends Create Bearer Request through SGW to MME without any UE request. In UE-initiated dedicated bearer establishment, the UE sends a NAS Bearer Resource Allocation Request to the MME requesting a new bearer with specific QoS/TFT parameters; the MME validates it against the subscription, contacts the PCRF via PGW, and only if the PCRF authorizes does the network proceed to create the bearer. Network-initiated is the standard VoLTE path; UE-initiated is used for certain enterprise services."
    spec: "TS 23.401 §5.4.1, §5.4.2, TS 24.301"
    simulator_trigger: "CALL command — network-initiated QCI=1 bearer via Gx/Rx chain; test scenarios with UE-initiated bearer requests"
    interview_context: "Tests understanding of the two-path dedicated bearer creation model needed for VoLTE and enterprise APN roles"

  # ---------------------------------------------------------------------------
  # IMS / VoLTE — Registration (q096–q102)
  # ---------------------------------------------------------------------------

  - id: "q096"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "sip-register"
      - "cx"
      - "p-cscf"
      - "s-cscf"
      - "i-cscf"
      - "hss"
      - "diameter"
    level: "senior"
    question: "Walk through the complete IMS SIP registration procedure step by step, naming all interfaces."
    answer: "The UE sends an unauthenticated SIP REGISTER to P-CSCF; P-CSCF forwards to I-CSCF, which queries HSS via Cx UAR/UAA to locate or select an S-CSCF. The S-CSCF fetches IMS-AKA auth vectors from HSS via Cx MAR/MAA and challenges the UE with 401 Unauthorized (RAND, AUTN). The UE responds with a second REGISTER carrying credentials (RES); the S-CSCF verifies RES, registers the S-CSCF assignment with HSS via SAR/SAA (receiving iFC and user profile), and returns 200 OK. The S-CSCF then invokes iFC to register with Application Servers (e.g., MTAS) for supplementary services."
    spec: "TS 23.228, TS 24.229, TS 29.228"
    simulator_trigger: "REGISTER command — SIP REGISTER from UE through P-CSCF to S-CSCF with Cx Diameter exchanges to HSS"
    interview_context: "End-to-end IMS registration knowledge expected at senior level in any IMS/VoLTE role"

  - id: "q097"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "p-cscf"
      - "s-cscf"
    level: "engineer"
    question: "What is the difference between IMPI and IMPU in IMS?"
    answer: "IMPI (IMS Private Identity) is the permanent, private identity of the IMS subscriber formatted as a NAI (user@domain) — used for authentication in the SIP REGISTER Authorization header and never visible to other users. IMPU (IMS Public Identity) is the user-visible identity used for communications — a SIP URI (sip:+1234@operator.com) or TEL URI (tel:+1234). One IMPI can have multiple IMPUs; IMPUs in the same implicit registration set are all registered simultaneously when any one is registered."
    spec: "TS 23.003, TS 23.228"
    simulator_trigger: "REGISTER command — IMPI in SIP Authorization header, IMPU in From/To headers in sip_register_handler.cpp"
    interview_context: "Tests IMS identity model fundamental to IMS registration and service routing"

  - id: "q098"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "s-cscf"
      - "mtas"
      - "cx"
      - "hss"
    level: "senior"
    question: "What is an Initial Filter Criteria (iFC) and when is it triggered in IMS?"
    answer: "An iFC is a trigger condition stored in the S-CSCF (received from HSS in the user profile via SAA) that determines when a SIP message should be forwarded to an Application Server. Each iFC has a Priority, Trigger Point (conditions on SIP method, headers, URI), AS URI, and Default Handling (session-continued or terminated if AS unreachable). The S-CSCF evaluates iFC for every SIP REGISTER, INVITE, or SUBSCRIBE passing through it, forking to the AS if conditions match via the ISC interface."
    spec: "TS 23.218, TS 24.229"
    simulator_trigger: "REGISTER command — S-CSCF evaluates iFC from user profile, triggers MTAS for MMTel service registration"
    interview_context: "Tests service routing mechanism that connects IMS core to Application Servers for supplementary services"

  - id: "q099"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "p-cscf"
      - "s-cscf"
      - "ims-epc"
    level: "engineer"
    question: "How does P-CSCF discovery work in LTE/VoLTE?"
    answer: "P-CSCF discovery in LTE occurs during IMS PDN connection establishment via PCO (Protocol Configuration Options) in the PDN Connectivity Accept NAS message: the PGW inserts P-CSCF IPv4/IPv6 addresses into the PCO IE, provisioned per IMS APN. GSMA IR.92 mandates PCO-based discovery as the primary method; DNS-based discovery (NAPTR/SRV lookup) is a fallback. The MME forwards PCO transparently between UE and PGW; the UE stores the P-CSCF address for all subsequent SIP signaling."
    spec: "TS 23.228 §5.1.1.1, GSMA IR.92"
    simulator_trigger: "4G ATTACH command — PGW inserts P-CSCF address in PCO in the IMS APN Create Session Response"
    interview_context: "Tests the EPC-IMS boundary knowledge of how the UE first learns where to send SIP signaling"

