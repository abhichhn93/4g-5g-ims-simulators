    answer: "The PGW is the anchor between EPC and external PDNs. Key functions include IP address allocation (per APN), PCEF — enforcing PCC rules from PCRF via Gx (QoS, charging, flow gating), deep packet inspection for service detection, charging interfaces to OCS (Gy) and CDF (Rf), SGi interface to the external PDN, and UE IP mobility anchor across SGW changes. In 5G, PGW-C evolves to SMF and PGW-U to UPF."
