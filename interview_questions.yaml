      - "raii"
      - "smart-ptr"
    level: "engineer"
    question: "What is RAII, and why does it matter in C++?"
    answer: "RAII (Resource Acquisition Is Initialization) ties a resource's lifetime to an object's: the constructor acquires the resource and the destructor releases it. Because the C++ runtime guarantees destructors run when objects go out of scope, even during exception unwinding, RAII provides automatic exception-safe cleanup without manual try-finally blocks. Examples include unique_ptr (heap memory), lock_guard (mutex), and fstream (file handle)."
    spec: null
    simulator_trigger: "RAII in socket_wrapper.h — socket file descriptor acquired in constructor, released in destructor"
    interview_context: "Core C++ idiom check; essential for writing safe telecom code"

