# STRUCTURE:
#   Each entry is a list item with these fields:
#     id               : Unique identifier (q001–q170)
#     domain           : Top-level domain — cpp | 4g | ims | 5g | system_design | devops
#     subdomain        : Specific topic within the domain
#     tags             : List of strings used at runtime to match questions to
