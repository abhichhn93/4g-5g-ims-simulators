    subdomain: "sip-methods"
    tags:
      - "sip"
      - "prack"
      - "update"
      - "sip-invite"
      - "volte-call"
    level: "senior"
    question: "What is the role of SIP PRACK and UPDATE in VoLTE call setup, and why does IR.92 require them?"
    answer: "PRACK (Provisional ACK, RFC 3262) provides reliable delivery of 1xx provisional responses (e.g., 183 Session Progress) — without it, the originating UE cannot confirm the terminating side's SDP answer was received and cannot safely proceed with QoS precondition establishment. UPDATE (RFC 3311) modifies session parameters (e.g., SDP for precondition status) mid-dialog without changing the dialog state or call direction. IR.92 requires both PRACK (100rel extension) and UPDATE to ensure reliable precondition negotiation and bearer confirmation before the phone rings, preventing ghost rings."
    spec: "RFC 3262, RFC 3311, TS 24.229, GSMA IR.92"
    simulator_trigger: "CALL command — PRACK sent by originating UE after 183; UPDATE sent to confirm QoS preconditions met"
    interview_context: "Tests detailed SIP signaling knowledge for VoLTE precondition-based call setup reliability"

  - id: "q128"
    domain: "ims"
    subdomain: "ims-epc"
    tags:
      - "ims-epc"
      - "volte-bearer"
      - "qci1"
      - "rx-interface"
      - "gx"
    level: "senior"
    question: "What is the IMS APN in LTE and what bearers does it carry?"
    answer: "The IMS APN is a dedicated LTE APN (access point name) used exclusively for IMS signaling and media traffic, separate from the internet APN. When the UE connects to the IMS APN, a QCI=5 non-GBR default bearer is established immediately for SIP signaling (REGISTER, INVITE, BYE). During a VoLTE call, a dedicated QCI=1 GBR bearer is added to carry RTP voice media; for video calls a QCI=2 GBR bearer is added for video RTP. The IMS APN may be provisioned separately in the HSS with restricted MBR/AMBR values configured for IMS traffic only."
    spec: "TS 23.203, GSMA IR.92"
    simulator_trigger: "4G ATTACH command — UE connects to IMS APN establishing QCI=5 bearer; CALL command adds QCI=1 bearer"
    interview_context: "Tests IMS APN and bearer coexistence model needed for VoLTE deployment and troubleshooting roles"

  - id: "q129"
    domain: "ims"
    subdomain: "sip-methods"
    tags:
      - "sip"
      - "sip-invite"
      - "volte-call"
    level: "engineer"
    question: "What happens when a SIP INVITE receives a 486 Busy Here response in VoLTE?"
    answer: "A 486 Busy Here response from the terminating UE or MTAS indicates the called party is busy and cannot accept the call. The originating S-CSCF forwards the 486 to the originating UE, which generates a SIP ACK to complete the three-way handshake for the failed INVITE (per RFC 3261, error responses to INVITE must be ACKed). No QCI=1 dedicated bearer is ever established; the originating UE may play a busy tone locally. If call waiting is not active on the terminating UE or the UE is truly occupied, the MTAS sends the 486."
    spec: "RFC 3261, TS 24.229"
    simulator_trigger: "CALL command to busy UE — 486 returned by MTAS; simulator verifies no QCI=1 bearer created on MO side"
    interview_context: "Tests SIP error handling and bearer management knowledge in call rejection scenarios"

  - id: "q130"
    domain: "ims"
    subdomain: "ims-registration"
    tags:
      - "ims-register"
      - "p-cscf"
      - "sip-register"
      - "ims-epc"
    level: "senior"
    question: "What is network-initiated session release in IMS, and how does the P-CSCF detect UE loss of connectivity?"
    answer: "Network-initiated session release occurs when the network detects the UE is unreachable and proactively terminates the SIP session. The P-CSCF detects UE loss of connectivity by: monitoring subscription to the reg event package (if the UE's registration expires without renewal); detecting bearer loss on the EPC side (the PGW/PCRF notifies P-CSCF via Rx ASR of PDN connection release); or missing SIP OPTIONS keep-alive responses. When detected, the P-CSCF sends a SIP BYE to the S-CSCF to clean up all active dialogs, and the S-CSCF sends SIP NOTIFY (deregistered) to any remaining subscriptions."
    spec: "TS 23.228, TS 24.229, TS 29.214"
    simulator_trigger: "CHAOS command — simulator kills UE bearer and verifies P-CSCF sends SIP BYE for active call cleanup"
    interview_context: "Tests fault-handling knowledge needed for VoLTE session cleanup in network failure scenarios"

  # ---------------------------------------------------------------------------
  # 5G Core — Architecture (q131–q135)
  # ---------------------------------------------------------------------------

  - id: "q131"
    domain: "5g"
    subdomain: "sba-architecture"
    tags:
      - "5g-sba"
      - "sbi"
      - "http2"
      - "nf-services"
    level: "engineer"
    question: "What is the Service-Based Architecture (SBA) in 5G Core, and how does it differ from 4G EPC?"
    answer: "In 4G EPC, NFs communicate over fixed bilateral reference points (S11, S6a, Gx) where each pair has a dedicated bespoke interface. In 5G SBA, every NF exposes RESTful services over HTTP/2 (the SBI), so any authorized NF can discover and consume any other NF's service via the NRF without bilateral configuration. This makes the 5GC modular and loosely coupled — NFs can scale independently, deploy as containers, and upgrade without re-wiring every peer. The SBI uses JSON-encoded OpenAPI 3.0 specifications from the TS 29.5xx series."
    spec: "TS 23.501 §4.2, TS 29.500"
    simulator_trigger: "5G REG command — AMF calls AUSF over HTTP/2 SBI instead of Diameter used in 4G ATTACH"
    interview_context: "Foundational 5G architecture question expected at beginner-to-engineer level in any 5GC role"

  - id: "q132"
    domain: "5g"
    subdomain: "sba-architecture"
    tags:
      - "5g-sba"
