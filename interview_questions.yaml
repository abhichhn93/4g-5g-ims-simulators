    answer: "A thread pool is a fixed set of pre-created threads that pick tasks from a shared queue, avoiding the overhead of creating and destroying a thread per task — important when task submission rate is high. A typical implementation uses a std::queue of std::function<void()> tasks protected by a mutex, a condition_variable to wake idle threads, and an atomic stop flag for graceful shutdown. In the simulator, the thread pool handles concurrent protocol event processing without the kernel overhead of per-event thread creation."
    spec: null
